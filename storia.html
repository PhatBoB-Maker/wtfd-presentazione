  {
    id: 'S11',
    title: { it: 'Scena 11 — Il Fagotto di Cuoio', en: 'Scene 11 — The Leather Bundle' },
    panels: [
      { img: 'assets/storia/scena11/panel-01.jpg', text: { it: `Il fabbro è nella bottega quando Rinaldo ci passa davanti. Non sta lavorando — è seduto sulla panca all'ingresso, le mani in grembo, la fucina spenta da ore. Lo vede arrivare con il sacco in spalla. Non dice niente per un momento.

Poi: *[F]"Verso la nebbia."*

Non è una domanda.

Rinaldo si ferma. *[R]"Sì."*

Il fabbro annuisce lentamente — non approvazione, riconoscimento. Si alza dalla panca senza aggiungere altro e rientra nella bottega. Rinaldo aspetta fuori, senza capire bene cosa stia aspettando.

Quando il fabbro torna ha in mano un fagotto di cuoio legato con una cinghia. Lo posa sulla panca tra loro. Lo apre.

Una spada corta — vecchia, la guardia consumata, ma buona nell'acciaio. Un coltello da lato. Un giaco di cuoio indurito, leggero da portare, spesso abbastanza da servire a qualcosa. Un paio di guanti da lavoro pesante.

*[F]"Erano miei,"* dice il fabbro. *[F]"Prima di questo."*

Non spiega altro. Non serve — c'è nel modo in cui li ha posati, la precisione di chi conosce ogni oggetto come si conoscono le cose che hanno fatto parte di un'altra vita.

Rinaldo guarda le armi. Guarda le proprie mani.

*[R]"Non so usarla,"* dice, indicando la spada.

*[F]"Lo so."* Il fabbro piega il giaco e lo rimette nel fagotto con la stessa cura con cui lo aveva tolto. *[F]"Ma fa differenza lo stesso, tenerla in mano quando incontri qualcosa."*`, en: `The blacksmith is in his shop when Rinaldo passes by. He isn't working — he's sitting on the bench by the entrance, hands in his lap, the forge cold for hours now. He sees him coming with the sack on his shoulder. He says nothing for a moment.

Then: *[F]"Toward the fog."*

It isn't a question.

Rinaldo stops. *[R]"Yes."*

The blacksmith nods slowly — not approval, recognition. He gets up from the bench without adding anything and goes back into the shop. Rinaldo waits outside, not quite understanding what he's waiting for.

When the blacksmith returns he's carrying a leather bundle tied with a strap. He sets it on the bench between them. Opens it.

A short sword — old, the guard worn, but good steel. A side knife. A hardened leather jerkin, light to wear, thick enough to be of some use. A pair of heavy work gloves.

*[F]"They were mine,"* the blacksmith says. *[F]"Before this."*

He explains nothing else. He doesn't need to — it's in the way he set them down, the precision of someone who knows every object the way you know things that belonged to another life.

Rinaldo looks at the weapons. Looks at his own hands.

*[R]"I don't know how to use it,"* he says, pointing at the sword.

*[F]"I know."* The blacksmith folds the jerkin and puts it back in the bundle with the same care he took it out with. *[F]"But it still makes a difference, holding it in your hand when you meet something."*` } },
      { img: 'assets/storia/scena11/panel-02.jpg', text: { it: `Rinaldo tira fuori quello che gli resta nella borsa — pochi soldi — e li posa sulla panca. Il fabbro li guarda. Non li prende.

*[F]"Era una brava donna,"* dice. *[F]"Non ho fatto niente."*

Resta in silenzio un momento, come se aspettasse che Rinaldo gli dica qualcosa — che lo assolva, o che lo accusi, una delle due. Rinaldo non dice niente. Non ha niente da dire su quello, non oggi, non a lui — il fabbro è l'unico, tra tutti, che ha già dato quello che poteva dare.

Prende il fagotto.

Il fabbro resta sulla panca mentre si allontana. Rinaldo non si volta, ma sente che non è rientrato nella bottega. È ancora lì, fermo, a guardare.`, en: `Rinaldo takes out what's left in his purse — a few coins — and sets them on the bench. The blacksmith looks at them. Doesn't take them.

*[F]"She was a good woman,"* he says. *[F]"I didn't do anything."*

He stays silent a moment, as if waiting for Rinaldo to say something to him — to absolve him, or to accuse him, one or the other. Rinaldo says nothing. He has nothing to say about that, not today, not to him — the blacksmith is the only one, of all of them, who has already given what he could give.

He takes the bundle.

The blacksmith stays on the bench as he walks away. Rinaldo doesn't turn around, but he can feel that he hasn't gone back into the shop. He's still there, still, watching.` } },
      { img: 'assets/storia/scena11/panel-02b.jpg', text: { it: `Torna in casa un'ultima volta. Ha bisogno di cose dal laboratorio — non nel senso domestico. Ha bisogno di quello che sa fare. Prende con cura: qualcosa per le ferite, qualcosa per il dolore, piccoli fasci ben avvolti, che pesano poco e possono servire. Niente di eroico — gli strumenti di chi cura, non di chi combatte.

Prende anche il Conium. Non molto — solo quello rimasto sul banco. Non sa ancora perché. Forse perché è parte della storia, e la storia va portata con sé. Forse perché se c'è qualcosa là fuori che usa quelle piante, vale la pena conoscerlo bene.

Potrebbe restare. Fermarsi in paese un'ultima notte, ripartire domani con la luce del mattino — un tetto sopra la testa invece del fango di un fosso. Ma restare vuol dire dormire in mezzo a loro: gli stessi villani che l'hanno vista bruciare, o hanno guardato altrove mentre bruciava — la stessa gente che ha creduto, o ha lasciato credere agli altri, che sua moglie fosse un mostro. Un'altra notte sotto quegli occhi, dopo tutto quello che ha sentito oggi, non gli sembra riposo. Gli sembra un'altra condanna da scontare.

Restare qui, tra le sue cose, non è meglio. La porta non è più sigillata da quando l'hanno portata via — potrebbe dormirci, in mezzo a quello che resta. Ma la casa ha troppo dentro: le coperte piegate in un modo che non è il suo, i barattoli in un ordine che non ha senso toccare, il chiodo vuoto accanto alla porta del laboratorio. Troppi ricordi per una notte sola, troppo presto.

Meglio partire adesso, e dormire dove lo prenderà la stanchezza — un fosso, un argine, non importa dove. Quello che ha davanti è comunque ignoto. Tanto vale cominciare a conoscerlo subito, invece di rimandarlo di un'altra notte.

Chiude la porta senza serrare il chiavistello. Non ha senso chiudere a chiave quello che è già vuoto.`, en: `He returns to the house one last time. He needs things from the workshop — not in the domestic sense. He needs what he knows how to do. He takes with care: something for wounds, something for pain, small well-wrapped bundles, light to carry and useful. Nothing heroic — the tools of a healer, not a fighter.

He also takes the Conium. Not much — only what's left on the bench. He doesn't yet know why. Maybe because it's part of the story, and the story has to be carried with him. Maybe because if there's something out there that uses those plants, it's worth knowing it well.

He could stay. Stop in the village one last night, set off again tomorrow with the morning light — a roof over his head instead of the mud of a ditch. But staying means sleeping among them: the same villagers who watched her burn, or looked away while she burned — the same people who believed, or let others believe, that his wife was a monster. Another night under those eyes, after everything he's heard today, doesn't feel like rest to him. It feels like another sentence to serve.

Staying here, among his things, isn't better. The door hasn't been sealed since they took her away — he could sleep here, among what's left. But the house holds too much: the blankets folded in a way that isn't his, the jars in an order that makes no sense to disturb, the empty nail beside the workshop door. Too many memories for a single night, too soon.

Better to leave now, and sleep wherever tiredness takes him — a ditch, an embankment, it doesn't matter where. What lies ahead is unknown regardless. Might as well start getting to know it now, instead of putting it off another night.

He closes the door without fastening the latch. There's no point locking what's already empty.` } },
      { img: 'assets/storia/scena11/panel-03.jpg', text: { it: `La strada che esce dal villaggio verso i campi è la stessa che aveva percorso otto mesi prima in direzione contraria — stessa terra battuta, stessi pioppi lungo il canale, stesso orizzonte basso che in Romagna non lascia mai molto spazio tra le cose e il cielo.

È sera. La nebbia sta tornando dai campi bassi — nel tardo pomeriggio di quella stagione risale sempre, riprende il territorio che il sole le aveva tolto per qualche ora. Non sparisce mai del tutto. Aspetta.

Rinaldo cammina senza voltarsi. Non per la stessa ragione per cui non si era voltato otto mesi prima — voltarsi non cambia quello che si ha alle spalle, e quello che ha davanti richiede di guardare avanti.

Sa, a grandi linee, dove andare. Non perché abbia una mappa — non ne esiste una utile per quello che sta cercando. Ma la Borda ha un territorio: i canali, le zone paludose, i margini dove la nebbia si addensa anche d'estate, dove le ombrellifere crescono senza che nessuno le pianti. Lo sa dai racconti, lo sa dalla botanica, lo sa da come Beatrice ha descritto quelle settimane nel diario.

È un territorio, non un posto preciso. Si entra, si cammina, e si capisce dove si sta andando da quello che si trova lungo la strada.

Non è un buon piano.

È l'unico piano.`, en: `The road out of the village toward the fields is the same one he walked eight months before, in the opposite direction — the same packed earth, the same poplars along the canal, the same low horizon that in Romagna never leaves much room between things and the sky.

It's evening. The fog is coming back up from the low fields — in that season's late afternoon it always rises again, reclaiming the ground the sun had taken from it for a few hours. It never disappears entirely. It waits.

Rinaldo walks without looking back. Not for the same reason he hadn't looked back eight months before — looking back doesn't change what's behind you, and what's ahead demands looking forward.

He knows, roughly, where to go. Not because he has a map — none exists that would help with what he's looking for. But the Borda has a territory: the canals, the marshy stretches, the edges where fog thickens even in summer, where umbellifers grow without anyone planting them. He knows it from the stories, from botany, from how Beatrice described those weeks in her diary.

It's a territory, not a precise place. You go in, you walk, and you understand where you're headed from what you find along the way.

It isn't a good plan.

It's the only plan.` } }
    ]
  },
  {
    id: 'S11B',
    title: { it: 'Scena 11B — Il Primo Cippo', en: 'Scene 11B — The First Waystone' },
    panels: [
      { img: 'assets/storia/scena11b/panel-01.jpg', text: { it: `Cammina finché il villaggio non è solo una sagoma bassa alle sue spalle. Il terreno è ancora quello che conosce — campi, argini, lo stesso canale che costeggiava da ragazzo — ma la luce sta calando, e più avanti, oltre una fila di pioppi radi, l'aria comincia già a perdere nettezza.

Lungo il sentiero, piantata di taglio nella terra, c'è una pietra — consumata, isolata, chiaramente posta lì da mano d'uomo e non dal caso. Il primo cippo che incontra nel suo cammino.

Rinaldo non conosce ancora il significato di quella pietra. Ma il modo in cui è piantata — dritta, sola, a bordo strada — gli dice che è un punto pensato per fermarsi.`, en: `He walks until the village is nothing but a low shape behind him. The ground is still the one he knows — fields, embankments, the same canal he walked beside as a boy — but the light is fading, and further on, past a thin row of poplars, the air is already starting to lose its edge.

Along the path, planted upright in the earth, there's a stone — worn, solitary, clearly placed there by human hand and not by chance. The first waystone he meets on his path.

Rinaldo doesn't yet know the meaning of that stone. But the way it's planted — upright, alone, at the roadside — tells him it's a place meant for stopping.` } },
      { img: 'assets/storia/scena11b/panel-02.jpg', text: { it: `Trova un avvallamento riparato accanto al cippo, un albero da un lato, abbastanza erba secca da fare un giaciglio che non sia nuda terra. Raccoglie qualche ramo, accende un fuoco piccolo — abbastanza da tenere lontano il freddo, non abbastanza da farsi notare da lontano. Si sdraia con il sacco sotto la testa e il campanellino alla cintura.

Si addormenta prima di quanto si aspettasse.`, en: `He finds a sheltered hollow beside the waystone, a tree on one side, enough dry grass to make a bed that isn't bare earth. He gathers a few branches, lights a small fire — enough to keep off the cold, not enough to be noticed from a distance. He lies down with the sack under his head and the campanellino at his belt.

He falls asleep sooner than he expected.` } },
      { img: 'assets/storia/scena11b/panel-03.jpg', text: { it: `Il campanellino comincia a muoversi mentre dorme.

Non per il vento — l'aria è ferma. Si agita da solo, piano, con un tintinnio leggero che si perde nel silenzio dei campi. Poi qualcosa comincia a prendere forma vicino a lui — non dalla nebbia, non dal buio: dalla luce piccola del fuoco, come se quella luce avesse deciso di raccogliersi in un punto solo.

Una mano gli sfiora la faccia.

Rinaldo apre gli occhi, ancora dentro il sonno che si rompe.

Beatrice è lì — o qualcosa che porta il suo peso, la sua misura, il modo in cui una presenza nota si fa sentire prima ancora di essere vista con chiarezza. Non un viso disegnato con nettezza, non stanotte: una forma raccolta nella luce del fuoco, vapore più che carne, i contorni che si muovono appena come fa la fiamma da cui sembra nata. Non la nebbia che assume una forma, non un dormiveglia che scivola nel sogno senza avvisare — qualcosa di più presente di entrambe le cose, anche se non riesce a metterlo a fuoco.`, en: `The campanellino begins to move while he sleeps.

Not from the wind — the air is still. It stirs on its own, softly, with a light chime that fades into the silence of the fields. Then something begins to take shape near him — not from the fog, not from the dark: from the small light of the fire, as if that light had decided to gather itself into a single point.

A hand brushes his face.

Rinaldo opens his eyes, still inside the sleep that's breaking.

Beatrice is there — or something carrying her weight, her measure, the way a known presence makes itself felt before it's even clearly seen. Not a face drawn sharply, not tonight: a shape gathered in the firelight, vapor more than flesh, its edges shifting slightly the way the flame it seems born from does. Not fog taking a shape, not a half-sleep sliding into a dream without warning — something more present than either of those, even if he can't bring it into focus.` } },
      { img: 'assets/storia/scena11b/panel-04.jpg', text: { it: `Alza la mano verso di lei — un gesto che non decide, che gli viene prima di ogni pensiero, per cercare la mano che gli tocca la guancia.

Non la trova. Le dita chiudono aria, o qualcosa che non oppone la resistenza che una mano dovrebbe opporre.

Non dice niente. Lei non dice niente.

Lo sguardo gli resta fisso su quella forma indefinita — non con dolore, non con paura. Con qualcosa di più quieto di entrambe, e con un incanto che non gli somiglia: lui che mette sempre le cose in ordine, che nomina, che classifica. Qui non c'è niente da nominare, e in quel momento non gli importa.

Poi non c'è più.`, en: `He raises a hand toward her — a gesture that isn't decided, that comes before any thought, reaching for the hand touching his cheek.

He doesn't find it. His fingers close on air, or on something that offers none of the resistance a hand should offer.

He says nothing. She says nothing.

His gaze stays fixed on that indistinct shape — not with pain, not with fear. With something quieter than either, and with a wonder that isn't like him: a man who always puts things in order, who names, who classifies. Here there's nothing to name, and in that moment he doesn't care.

Then she's gone.` } },
      { img: 'assets/storia/scena11b/panel-05.jpg', text: { it: `Rinaldo resta fermo a lungo, la mano ancora sospesa a mezz'aria, come se aspettasse che tornasse a toccarla.

Non cerca di spiegarsi quello che ha visto. È un uomo che mette da parte le cose per cui non ha ancora gli strumenti, e ci torna quando ne ha di più.

Ma la mano sulla faccia non riesce a metterla da parte allo stesso modo.

Si porta le dita alla guancia. Sente ancora qualcosa lì — o crede di sentirlo, che sono due cose diverse, ma in quel momento non riesce a distinguerle.

Non sa se ha dormito. Non sa se ha sognato.`, en: `Rinaldo stays still for a long while, his hand still suspended in midair, as if waiting for it to come back and touch it.

He doesn't try to explain to himself what he's seen. He's a man who sets aside things he doesn't yet have the tools for, and comes back to them when he has more.

But the hand on his face he can't set aside the same way.

He brings his fingers to his cheek. He still feels something there — or believes he feels it, which are two different things, but in that moment he can't tell them apart.

He doesn't know if he slept. He doesn't know if he dreamed.` } }
    ]
  },
  {
    id: 'S12',
    title: { it: 'Scena 12 — Nella Nebbia', en: 'Scene 12 — Into the Fog' },
    panels: [
      { img: 'assets/storia/scena12/panel-01.jpg', text: { it: `Il fuoco è cenere fredda quando si sveglia. Non c'è altro segno della notte, a parte quello che si porta addosso — la mano sulla guancia, il non sapere se ha dormito o sognato. Non ci pensa più di tanto, non ora: rimette il fagotto in spalla e riprende a camminare.

Cammina per un'ora verso est, lungo il canale, prima che la nebbia cominci a ispessirsi intorno a lui.

Non è il tipo di nebbia che sale dal basso e cresce — è il tipo che si trova quando ci si avvicina a lei. Come se ci fosse un confine, un punto oltre il quale le cose cambiano qualità. I pioppi diventano meno distinti. Il canale smette di riflettere il cielo. Il suono dei passi si fa più ovattato, come quando l'aria è troppo satura d'acqua per portare le cose lontano.

Si ferma un momento. Porta la mano al campanellino alla cintura — non per usarlo, solo per sentirlo lì, un peso familiare in un posto che comincia a sembrargli tutto uguale. Non sa se si aspetta che faccia qualcosa. Non fa niente. Lo lascia dov'è e riprende a camminare.

La nebbia lo riceve senza cerimonie.

Non c'è un momento drammatico — nessuna soglia visibile, nessuna resistenza. Semplicemente, a un certo punto, il villaggio non si vede più. I pioppi sono sagome. Il canale è un suono. Il cielo è bianco e il campo è bianco e la strada davanti è bianca quanto quella dietro — l'unica differenza tra avanti e indietro è la direzione in cui sta camminando.

Questa nebbia non è come quella del villaggio.

Quella la conosce da trent'anni — sa come si muove, dove si addensa, a che ora comincia a ritirarsi. Ha una logica, anche quando sembra non averla: segue il canale, risale dai campi bassi, si ferma dove il terreno sale anche di poco. È nebbia di pianura padana. È normale.

Questa è diversa. Non nella sostanza — è sempre aria e acqua, non ha colore né peso proprio. È diversa nel comportamento. Non si muove con il vento. Non si dirada dove il terreno cambia. Sta ferma intorno a lui con una qualità che non è meteorologica — è intenzionale, anche se sa che pensarlo è irrazionale, e lo pensa lo stesso.

Dopo mezz'ora comincia ad avere problemi a orientarsi.

Non è una cosa che gli capita spesso. Ha la testa fatta per i riferimenti — il sole, l'ombra, la direzione dell'acqua nei canali, la posizione degli alberi rispetto ai punti cardinali. Strumenti che usa senza pensarci, come si usa la vista o l'udito. Qui non funzionano.

Il sole non si vede. Non si vede niente sopra di lui tranne bianco. Il canale ha smesso di fare rumore da un po' — o si è allontanato, o la nebbia assorbe i suoni abbastanza da renderli inutili. I pioppi sono spariti. Sta camminando su terra battuta diventata terra non battuta, poi erba, poi qualcosa di più umido che cede leggermente sotto i piedi senza cedere del tutto.

Si ferma. Guarda da dove è venuto. È identico a dove sta andando.

Non è panico — non ancora, non di quel tipo. È il disagio preciso di chi ha sempre letto il mondo attraverso i suoi strumenti e si trova in un posto dove gli strumenti non danno lettura. Come aprire un libro e trovare le pagine bianche.

Non ha altro modo per procedere che scegliere una direzione e tenerla — un piede dopo l'altro, contando i passi per darsi almeno l'illusione di una misura, correggendo quando il terreno sotto i piedi cambia, più duro o più molle, in salita o in discesa, come fosse l'unica bussola rimasta. Non è un metodo. È l'unica cosa che gli resta.

Cammina per un tempo che non riesce a misurare — senza sole, senza ombre, senza suoni che si avvicinino o si allontanino, è impossibile capire quanto sia passato. I piedi trovano terra più solida. Poi erba corta. Poi il profilo basso di un muro a secco che emerge dalla nebbia a meno di tre passi da lui, senza preavviso.`, en: `The fire is cold ash when he wakes. There's no other sign of the night, apart from what he carries on him — the hand on his cheek, not knowing if he slept or dreamed. He doesn't dwell on it, not now: he shoulders the bundle again and starts walking.

He walks east for an hour, along the canal, before the fog begins to thicken around him.

It isn't the kind of fog that rises from below and grows — it's the kind you find when you're getting close to her. As if there were a boundary, a point beyond which things change quality. The poplars grow less distinct. The canal stops reflecting the sky. The sound of his footsteps grows muffled, the way it does when the air is too saturated with water to carry things far.

He stops for a moment. Puts a hand to the campanellino at his belt — not to use it, just to feel it there, a familiar weight in a place that's starting to feel all the same. He doesn't know if he expects it to do something. It does nothing. He leaves it where it is and walks on.

The fog receives him without ceremony.

There's no dramatic moment — no visible threshold, no resistance. Simply, at some point, the village is no longer visible. The poplars are shapes. The canal is a sound. The sky is white and the field is white and the road ahead is as white as the one behind — the only difference between forward and back is the direction he's walking.

This fog isn't like the one at the village.

That one he's known for thirty years — he knows how it moves, where it thickens, what hour it starts to withdraw. It has a logic, even when it seems not to: it follows the canal, rises from the low fields, stops where the ground climbs even slightly. It's Po valley fog. It's ordinary.

This is different. Not in substance — it's still air and water, no color or weight of its own. It's different in behavior. It doesn't move with the wind. It doesn't thin where the ground changes. It stands still around him with a quality that isn't meteorological — it's intentional, even though he knows the thought is irrational, and he thinks it anyway.

After half an hour he starts having trouble orienting himself.

It isn't something that happens to him often. His mind is built for reference points — the sun, shadow, the direction of water in the canals, the position of trees against the cardinal points. Tools he uses without thinking, the way you use sight or hearing. Here they don't work.

The sun can't be seen. There's nothing above him but white. The canal has been silent for a while — either it's gone further away, or the fog absorbs sound enough to make it useless. The poplars are gone. He's walking on packed earth that's become unpacked earth, then grass, then something wetter that gives slightly underfoot without giving all the way.

He stops. Looks back the way he came. It's identical to where he's going.

It isn't panic — not yet, not that kind. It's the precise unease of someone who has always read the world through his instruments, finding himself in a place where the instruments give no reading. Like opening a book and finding blank pages.

He has no way to proceed except to choose a direction and hold it — one foot after another, counting steps to give himself at least the illusion of a measure, correcting when the ground underfoot changes, harder or softer, uphill or down, as if it were the only compass left. It isn't a method. It's the only thing he has left.

He walks for a length of time he can't measure — with no sun, no shadows, no sounds coming closer or moving away, it's impossible to tell how much has passed. His feet find firmer ground. Then short grass. Then the low profile of a dry-stone wall emerging from the fog less than three steps away, without warning.` } },
      { img: 'assets/storia/scena12/panel-02.jpg', text: { it: `Si ferma. Aspetta.

Oltre il muro c'è una cascina.

È in piedi — non crollata, non bruciata, non devastata nel modo delle cose che hanno subito qualcosa di violento. È semplicemente vuota, nel senso sbagliato. La porta è socchiusa. Le imposte di una finestra sono aperte su un interno buio. Nel cortile c'è un secchio rovesciato vicino al pozzo, e accanto al secchio c'è qualcosa che è stato un fuoco — cenere ancora grigia, non nera, non abbastanza vecchia.`, en: `He stops. Waits.

Beyond the wall is a farmhouse.

It's standing — not collapsed, not burned, not devastated the way things are when something violent has happened to them. It's simply empty, in the wrong sense. The door is ajar. The shutters of a window are open onto a dark interior. In the yard there's an overturned bucket near the well, and beside the bucket something that was once a fire — ash still grey, not black, not old enough.` } },
      { img: 'assets/storia/scena12/panel-03.jpg', text: { it: `Prima di entrare, qualcosa vicino allo stipite gli cattura l'occhio: un segno inciso nel legno, poco sopra l'altezza della mano — linee semplici, un cerchio attraversato, il tipo di marchio che si intaglia per proteggere una casa, non per decorarla. Ne ha visti altri uguali, in altri portali, in altri anni. Non ha mai chiesto a nessuno cosa significassero davvero — erano lì da prima che nascesse, come i segni di croce sugli architravi. Qualcuno, in questa casa, aveva avuto paura abbastanza da inciderlo. Non è servito.`, en: `Before entering, something near the doorframe catches his eye: a mark carved into the wood, just above hand height — simple lines, a circle crossed through, the kind of mark carved to protect a house, not to decorate it. He's seen others like it, on other doorways, in other years. He's never asked anyone what they really mean — they were there before he was born, like the signs of the cross on lintels. Someone, in this house, had been afraid enough to carve it. It didn't help.` } },
      { img: 'assets/storia/scena12/panel-04.jpg', text: { it: `Rimane fermo fuori per un momento. Poi entra.

La cucina ha i segni di una partenza che non è stata pianificata. Il tavolo con le scodelle ancora sopra — tre scodelle, due piccole e una grande, con qualcosa seccato sul fondo che era stato minestra. Una sedia rovesciata. Vicino al fuoco spento, una calza di lana da bambino.`, en: `He stays still outside a moment. Then goes in.

The kitchen shows the signs of a departure that wasn't planned. The table with the bowls still on it — three bowls, two small and one large, something dried at the bottom that had been soup. An overturned chair. Near the dead fire, a child's wool sock.` } },
      { img: 'assets/storia/scena12/panel-05.jpg', text: { it: `Va nell'altra stanza.

Ci sono due pagliericci piccoli. Le coperte sono ancora lì — una tirata su, una rimasta come era stata lasciata, con la forma di un corpo che si era alzato in fretta o non si era alzato del tutto. Sul pavimento vicino al primo pagliericcio c'è un giocattolo di legno — una figura rozza, intagliata male, il tipo che si fa con un coltello da cucina e un pezzo di ramo.

Il campanellino alla cintura fa un suono — secco, chiaro, uno solo. Non l'ha toccato, non l'ha scosso: è rimasto fermo per tutto il cammino, silenzioso anche quando lui si fermava, quando dubitava, quando cercava un segno che non arrivava. Suona adesso, da solo, esattamente come la notte prima al fuoco.

Rinaldo non tocca niente.

Resta in piedi nel mezzo della stanza e guarda i pagliericci per un lungo momento. Conosce quella forma. Conosce cosa significa trovare un letto con ancora dentro la sagoma di qualcuno che non c'è più.

Sulla trave bassa vicino al secondo pagliericcio c'è qualcosa graffiato col carbone — non lettere, un disegno. Una mano di bambino, poco ferma: una forma senza volto, alta, avvolta in qualcosa che potrebbe essere un mantello o potrebbe essere niente, i bordi tracciati e ritracciati come se la mano si fosse fermata più volte a pensare come renderla. Accanto, più piccola, un'altra figura con le braccia alzate — a coprirsi il viso, o a proteggersi.`, en: `He goes into the other room.

There are two small pallets. The blankets are still there — one pulled up, one left as it was, with the shape of a body that had gotten up quickly or not gotten up at all. On the floor near the first pallet there's a wooden toy — a crude figure, badly carved, the kind made with a kitchen knife and a piece of branch.

The campanellino at his belt makes a sound — sharp, clear, just once. He hasn't touched it, hasn't shaken it: it stayed still the whole walk, silent even when he stopped, when he doubted, when he looked for a sign that didn't come. It rings now, on its own, exactly like the night before at the fire.

Rinaldo touches nothing.

He stands in the middle of the room and looks at the pallets for a long moment. He knows that shape. He knows what it means to find a bed still holding the outline of someone who's no longer there.

On the low beam near the second pallet something is scratched in charcoal — not letters, a drawing. A child's hand, unsteady: a faceless shape, tall, wrapped in something that could be a cloak or could be nothing, the edges traced and retraced as if the hand had stopped more than once to think about how to render it. Beside it, smaller, another figure with its arms raised — covering its face, or protecting itself.` } },
      { img: 'assets/storia/scena12/panel-06.jpg', text: { it: `Rinaldo la guarda a lungo. Non ha bisogno di chiedere a nessuno cosa avesse disegnato quella bambina, o quel bambino. Lo sa già. Lo sa da quando ha lasciato il suo villaggio.

Esce.

Nel cortile si ferma vicino al fuoco spento e fa i conti.

La cenere è grigia e asciutta, ma non ha avuto il tempo di disperdersi — è ancora compatta, non ancora polvere. Qualche giorno, forse una settimana. Non di più. I bambini sono spariti di recente — non è una storia vecchia, non è qualcosa successo mesi fa. Sta succedendo adesso, in questo momento, in questo territorio.

Il suo villaggio non è l'unico.

Lo sapeva già — i racconti lungo la strada maestra, le storie di altri posti. Ma saperlo come voce e vederlo come cenere grigia in un cortile vuoto sono due cose diverse.

Vicino al pozzo, mezza affondata nel fango secco dove qualcuno l'aveva lasciata cadere senza fermarsi a raccoglierla, c'è una bambola di pezza — cucita in casa, i tratti del viso ricamati a punti larghi, un braccio slegato dalla spalla e ormai staccato del tutto. Non è vecchia quanto sembra: è solo stata lasciata alla pioggia per qualche giorno.

Rinaldo non la raccoglie. Non c'è niente da fare per una bambola.

Resta un momento a guardarla comunque — non saprebbe dire perché. Forse perché è più facile fermarsi su un oggetto piccolo e innocuo che sul pensiero che gli è passato per la testa entrando in questo cortile: che da qualche parte, in questo stesso territorio, ci sono altri Ludovico, altre Isabella. Non hanno smesso di sparire quando ha smesso di succedere a lui.`, en: `Rinaldo looks at it a long while. He doesn't need to ask anyone what that little girl, or boy, had drawn. He already knows. He's known since he left his village.

He goes out.

In the yard he stops by the dead fire and does the math.

The ash is grey and dry, but it hasn't had time to scatter — it's still compact, not yet dust. A few days, maybe a week. No more. The children disappeared recently — this isn't an old story, something that happened months ago. It's happening now, in this moment, in this territory.

His village isn't the only one.

He already knew that — the tales along the main road, stories of other places. But knowing it as a rumor and seeing it as grey ash in an empty yard are two different things.

Near the well, half sunk in dry mud where someone had let it fall without stopping to pick it up, there's a rag doll — homemade, its face stitched in wide loops, one arm loose at the shoulder and now come away entirely. It isn't as old as it looks: it's just been left out in the rain a few days.

Rinaldo doesn't pick it up. There's nothing to be done for a doll.

He stays a moment looking at it anyway — he couldn't say why. Maybe because it's easier to dwell on a small, harmless object than on the thought that crossed his mind entering this yard: that somewhere, in this same territory, there are other Ludovicos, other Isabellas. They didn't stop disappearing when it stopped happening to him.` } },
      { img: 'assets/storia/scena12/panel-07.jpg', text: { it: `Si rimette il sacco in spalla.

Prima di uscire dal cortile si gira verso la cascina un'ultima volta. Guarda la finestra aperta, le imposte che si muovono appena in qualcosa che non è vento. Guarda la calza di lana che si vede ancora attraverso la porta socchiusa.

Non sa il nome di quei bambini. Non sa il nome dei genitori. Non sa quanti fossero, che età avessero, da quanto tempo fossero spariti. Non sa niente di loro tranne la forma dei loro letti, un giocattolo intagliato male e il disegno di qualcosa che non ha nome ma che tutti, in questo territorio, riconoscerebbero. Non è abbastanza per fare niente, tranne continuare.

Esce dal cortile e riprende a camminare nella nebbia.

Adesso ha una direzione.`, en: `He shoulders the sack again.

Before leaving the yard he turns toward the farmhouse one last time. Looks at the open window, the shutters stirring slightly in something that isn't wind. Looks at the wool sock still visible through the half-open door.

He doesn't know the names of those children. Doesn't know the parents' names. Doesn't know how many there were, what ages, how long they've been gone. He knows nothing about them except the shape of their beds, a badly carved toy, and the drawing of something with no name that everyone, in this territory, would recognize. It isn't enough to do anything, except keep going.

He leaves the yard and starts walking again into the fog.

Now he has a direction.` } }
    ]
  },
  {
    id: 'S13',
    title: { it: "Scena 13 — L'Eremita", en: 'Scene 13 — The Hermit' },
    panels: [
      { img: 'assets/storia/scena13/panel-01.jpg', text: { it: `Cammina a lungo prima che qualcosa cambi.

Il campanellino alla cintura comincia a scaldarsi — non un calore che si vede, un calore che si sente attraverso il cuoio, come una mano poggiata lì da qualcun altro. Rinaldo si ferma, ci mette sopra le dita. È vero. Non se lo sta immaginando.`, en: `He walks a long while before anything changes.

The campanellino at his belt begins to warm — not a heat you can see, a heat you feel through the leather, like a hand resting there that isn't his own. Rinaldo stops, puts his fingers over it. It's real. He isn't imagining it.` } },
      { img: 'assets/storia/scena13/panel-02.jpg', text: { it: `Poco più avanti, dove il bianco dovrebbe restare bianco, c'è una macchia di colore diverso — giallo, fioco, tremolante. Una luce.

Cammina verso di essa.`, en: `A little further on, where the white should stay white, there's a patch of different color — yellow, faint, flickering. A light.

He walks toward it.` } },
      { img: 'assets/storia/scena13/panel-03.jpg', text: { it: `La nebbia si dirada quel tanto che basta a mostrargli cosa la genera: una costruzione bassa, di pietra, addossata a un argine — invisibile finché non gli è quasi addosso, come tutto in questo posto. Una finestra piccola, chiusa da un'imposta di legno, lascia passare la luce del fuoco attraverso le fessure. Non c'è comignolo che fumi, non c'è niente che gridi "qui vive qualcuno" da lontano. Solo quella luce, e il campanellino che continua a scaldarsi contro la sua pelle.

Si avvicina alla porta. Bussa.`, en: `The fog thins just enough to show him what's making it: a low stone structure, built against an embankment — invisible until it's almost on top of him, like everything in this place. A small window, shuttered with wood, lets firelight through the cracks. No smoking chimney, nothing that shouts "someone lives here" from a distance. Just that light, and the campanellino still warming against his skin.

He walks up to the door. Knocks.` } },
      { img: 'assets/storia/scena13/panel-04.jpg', text: { it: `Non risponde nessuno subito — e poi la porta si apre, prima che Rinaldo abbia il tempo di bussare una seconda volta, come se qualcuno l'avesse già sentito arrivare da un pezzo. Un uomo anziano lo guarda dalla soglia. Non sorpreso. Non spaventato. Lo guarda come si guarda qualcuno che si aspettava, anche se non avrebbe saputo dire quando.

*[E]"Sei arrivato"*, dice, non come domanda. Si scosta dalla porta. *[E]"Entra, prima che la nebbia decida di seguirti dentro."*`, en: `No one answers right away — then the door opens, before Rinaldo has time to knock a second time, as if someone had already heard him coming from a way off. An old man looks at him from the threshold. Not surprised. Not afraid. He looks at him the way you look at someone you were expecting, even if you couldn't say when.

*[E]"You've arrived,"* he says, not as a question. He steps back from the door. *[E]"Come in, before the fog decides to follow you inside."*` } },
      { img: 'assets/storia/scena13/panel-05.jpg', text: { it: `Dentro, un fuoco basso scalda una stanza piccola — un tavolo, un letto in un angolo, mazzi di erbe essiccate appesi alle travi che riempiono l'aria di un odore secco, vecchio. L'uomo non ha l'aria di un guaritore né di un fabbro né di niente che si possa nominare con un mestiere. Ha l'aria di qualcuno che ha passato talmente tanto tempo da solo da aver smesso di aver bisogno di essere qualcosa per qualcun altro.

Gli indica una sedia. Rinaldo non si siede — resta in piedi, una mano ancora vicino al campanellino, che adesso è caldo quanto la pelle sotto la camicia.

*[R]"Chi sei tu?"*

*[E]"Qualcuno che è rimasto, quando tutti gli altri sono andati via — o sono stati presi."* Una pausa. *[E]"La Borda prende chi vuole, quando vuole. Io sono solo... rimasto."*

Il nome cade nella stanza come un sasso in un pozzo — Rinaldo l'ha sentito sussurrare per settimane, mai detto così, mai detto da qualcuno che sembra saperne il peso per esperienza diretta.

*[E]"E tu?"* dice il vecchio, prima che Rinaldo trovi la sua prossima domanda. *[E]"So chi sei, per quanto vale sentito dire — la donna bruciata a marzo. I bambini mai trovati."* Non lo dice con crudeltà, solo come un fatto che gli è arrivato e che non ha dimenticato. *[E]"Sei venuto a cercare vendetta, o qualcos'altro?"*

Rinaldo non risponde subito. *[R]"Non lo so ancora."*

Il vecchio annuisce, come se fosse la risposta che si aspettava — o l'unica risposta onesta possibile.

*[R]"Cos'è la Borda?"*

*[E]"È antica."* Il vecchio si siede, lasciando Rinaldo in piedi. *[E]"Molto più antica dei villaggi — più antica, probabilmente, del nome che le hanno dato."* Una pausa. *[E]"Cambia — questo lo so per certo, l'ho visto io stesso, una volta, tanti anni fa. Ma perché cambi, o se sia lei a deciderlo, o se accada e basta, come una stagione che finisce e un'altra comincia — questo non l'ho mai capito. Nessuno che sia stato abbastanza vicino da saperlo è mai tornato a spiegarlo."* Una pausa più lunga. *[E]"Quella che ho visto io era una donna. Una madre. Ma non ti direi mai che è sempre così — sarebbe una certezza che non mi sono guadagnato."*

*[R]"L'hai mai vista, quando arriva?"*

*[E]"Più di una volta. Da lontano."* La voce del vecchio si fa più bassa, non per paura — per abitudine, come chi ha imparato a non pronunciare certe cose a voce alta. *[E]"Incappucciata. Informe, sotto quel cappuccio. Qualcosa che striscia dietro di lei, sul terreno."* Una pausa. *[E]"Da vicino, no. Da vicino non si racconta."*

*[R]"È già successo prima?"*

*[E]"Sì, anni fa. Nei villaggi a sud."* Il vecchio guarda il fuoco, non Rinaldo. *[E]"Bambini spariti, una donna accusata, lo stesso silenzio dopo."* Una pausa. *[E]"La Borda non rimane mai nello stesso posto a lungo."*

*[R]"Come lo sai, con tanta certezza?"*

Il vecchio non risponde subito. Quando lo fa, qualcosa nella sua voce è cambiato — non più il tono di chi racconta una leggenda sentita, ma di chi la porta addosso.`, en: `Inside, a low fire warms a small room — a table, a bed in one corner, bundles of dried herbs hanging from the beams that fill the air with a dry, old smell. The man doesn't have the look of a healer, or a blacksmith, or anything you could name with a trade. He has the look of someone who's spent so long alone he's stopped needing to be anything for anyone else.

He points him to a chair. Rinaldo doesn't sit — he stays standing, one hand still near the campanellino, which is now as warm as the skin beneath his shirt.

*[R]"Who are you?"*

*[E]"Someone who stayed, when everyone else went away — or was taken."* A pause. *[E]"The Borda takes who she wants, when she wants. I just... stayed."*

The name drops into the room like a stone into a well — Rinaldo has heard it whispered for weeks, never spoken like this, never spoken by someone who seems to know its weight firsthand.

*[E]"And you?"* the old man says, before Rinaldo can find his next question. *[E]"I know who you are, for what it's worth secondhand — the woman burned in March. The children never found."* He doesn't say it cruelly, just as a fact that reached him and that he hasn't forgotten. *[E]"Have you come looking for vengeance, or something else?"*

Rinaldo doesn't answer right away. *[R]"I don't know yet."*

The old man nods, as if it were the answer he expected — or the only honest one possible.

*[R]"What is the Borda?"*

*[E]"She's ancient."* The old man sits, leaving Rinaldo standing. *[E]"Much older than the villages — older, probably, than the name they gave her."* A pause. *[E]"She changes — that much I know for certain, I saw it myself, once, many years ago. But why she changes, or whether it's her choice, or whether it simply happens, the way one season ends and another begins — that I've never understood. No one who's been close enough to know has ever come back to explain it."* A longer pause. *[E]"The one I saw was a woman. A mother. But I'd never tell you it's always so — that would be a certainty I haven't earned."*

*[R]"Have you ever seen her, when she comes?"*

*[E]"More than once. From a distance."* The old man's voice drops lower, not from fear — from habit, like someone who's learned not to say certain things aloud. *[E]"Hooded. Shapeless, under that hood. Something dragging behind her, along the ground."* A pause. *[E]"Not up close, no. Up close isn't told."*

*[R]"Has this happened before?"*

*[E]"Yes, years ago. In the villages to the south."* The old man looks at the fire, not at Rinaldo. *[E]"Children vanished, a woman accused, the same silence after."* A pause. *[E]"The Borda never stays in the same place long."*

*[R]"How do you know, with such certainty?"*

The old man doesn't answer right away. When he does, something in his voice has changed — no longer the tone of someone recounting a legend he's heard, but of someone who carries it.` } },
      { img: 'assets/storia/scena13/panel-06.jpg', text: { it: `*[E]"Perché c'ero."* Lascia cadere il silenzio per un momento più lungo del necessario. *[E]"Ero un bambino, allora."* Una pausa. *[E]"Un istante, niente di più, ma l'ho vista anche io, quella notte. Mia madre cantava — eravamo tanti, in quella stanza, e cantava per tutti insieme. Poi il villaggio ha preso fuoco, da un'altra parte, e sono venuti a portarci fuori prima che finisse il canto."* Una pausa più lunga. *[E]"Quell'istante prima — quello l'ho visto. Non l'ho più dimenticato, da allora."*

*[R]"Quale canto?"*

*[E]"Una ninna nanna."* Una pausa. *[E]"Non saprei dirti quale — ce ne sono tante, e si somigliano tutte, in questa terra. Ma quella sì, era quella. Quella che si canta per far dormire un bambino."* Un'altra pausa, più lunga. *[E]"Ho passato anni a chiedermi se sia lei ad attirarla, o se la Borda ci sia già, sempre, e il canto sia solo... una porta che si apre per un istante."* Una pausa. *[E]"Mia madre non ha mai fatto del male a nessuno di noi. Eppure la Borda è venuta lo stesso, quella notte, per tutti quelli che eravamo in quella stanza."* Una pausa più lunga. *[E]"Questo non l'ho mai capito fino in fondo. E non credo che lo capirò mai."*`, en: `*[E]"Because I was there."* He lets the silence fall for a moment longer than necessary. *[E]"I was a child, then."* A pause. *[E]"An instant, no more, but I saw her too, that night. My mother was singing — there were many of us, in that room, and she sang for all of us together. Then the village caught fire, somewhere else, and they came to get us out before the song ended."* A longer pause. *[E]"That instant before — that's what I saw. I never forgot it, after that."*

*[R]"What song?"*

*[E]"A lullaby."* A pause. *[E]"I couldn't tell you which one — there are so many, and they all sound alike, in this land. But that one, yes. The one you sing to put a child to sleep."* Another pause, longer. *[E]"I've spent years wondering whether it's the song that draws her, or whether the Borda is already there, always, and the song is only... a door that opens for an instant."* A pause. *[E]"My mother never harmed any of us. And yet the Borda came all the same, that night, for all of us who were in that room."* A longer pause. *[E]"I've never fully understood it. And I don't think I ever will."*` } },
      { img: 'assets/storia/scena13/panel-06b.jpg', text: { it: `Il vecchio si alza, lascia il fuoco e attraversa la stanza fino a un baule basso, addossato alla parete opposta. Lo apre — dentro, fogli su fogli, alcuni ingialliti, altri più recenti, scritti fitti in una grafia minuta che riempie ogni margine. Ne prende un fascio, torna verso Rinaldo, ma non glielo porge: lo tiene stretto, come si tiene qualcosa di prezioso a cui non si è ancora pronti a rinunciare.

*[E]"Non sono solo ricordi."* Batte due dita sui fogli. *[E]"Anni di appunti. Avvistamenti — dove, quando, in quale stagione. Come si muove nella nebbia, cosa segue, cosa evita. Il modo in cui il freddo cambia nell'aria un'ora prima che arrivi. Le urla dei bambini, quando ci sono — e quando invece non c'è nessun suono, il che è peggio."* Una pausa. *[E]"Non l'ho mai capita del tutto. Ma l'ho studiata più di chiunque altro sia rimasto vivo per raccontarlo."*

Rinaldo non dice niente per un momento. C'è qualcosa nel modo in cui l'uomo lo racconta — piatto, esercitato, come una pietra levigata da troppe volte che ci si passa sopra il pollice — che gli fa capire quanto tempo ci sia voluto per arrivare a dirlo così.

*[R]"Da quanto tempo vivi qui?"*

*[E]"Da prima che tu nascessi, credo."* Un accenno di qualcosa che in un'altra faccia sarebbe stato un sorriso. *[E]"Ho perso il conto degli inverni."*

*[R]"Perché vivi solo, lontano da tutti?"*

*[E]"Perché a un certo punto ho smesso di essere il bambino sopravvissuto, e sono diventato il bambino pazzo."* Una pausa. *[E]"Dicevo a chiunque volesse ascoltare che la Borda era reale. Nessuno voleva ascoltare."*

*[R]"Cosa ti è successo, dopo?"*

*[E]"Me ne sono andato. Restare significava essere guardato come si guarda un cane malato."* Una pausa. *[E]"Ho passato il resto della vita a cercare chiunque avesse visto quello che ho visto io. A capire come si muove, cosa segue, cosa lascia dietro di sé."* Un'altra pausa. *[E]"Non per coraggio. Per non restare di nuovo quel bambino a cui nessuno credeva."*

Rinaldo lo guarda — un uomo che ha costruito un'intera vita intorno a un istante di paura che nessun altro ha voluto credere. Non sa ancora se è un avvertimento su cosa potrebbe diventare lui stesso, o solo un vecchio solo in una casa di pietra. Forse le due cose non si escludono.

*[R]"E la donna?"*

*[E]"Non lo so."* Il vecchio scuote la testa, piano. *[E]"Nessuno di quelli che la conoscevano è mai tornato per raccontarlo."*

Non aggiunge altro. Rinaldo aspetta un momento, ma capisce che non arriverà nient'altro da quella domanda — solo un vuoto, lasciato apposta o no.

*[R]"E i bambini?"*

*[E]"Li porta con sé — nell'istante in cui muoiono."* Una pausa. *[E]"Non li ha mai trovati nessuno."*

Qualcosa si stringe nel petto di Rinaldo — un pensiero che comincia a formarsi e che lui stesso rifiuta di lasciar finire. Non lo dice a voce alta. Non a un estraneo, non ancora a sé stesso.`, en: `The old man gets up, leaves the fire, and crosses the room to a low chest against the far wall. He opens it — inside, page after page, some yellowed, others more recent, written in a cramped hand that fills every margin. He takes out a bundle, comes back toward Rinaldo, but doesn't hand it over: he holds it close, the way you hold something precious you're not yet ready to give up.

*[E]"These aren't just memories."* He taps two fingers against the pages. *[E]"Years of notes. Sightings — where, when, in which season. How she moves through the fog, what she follows, what she avoids. The way the cold changes in the air an hour before she comes. The children's cries, when there are any — and when there's no sound at all, which is worse."* A pause. *[E]"I've never fully understood her. But I've studied her more than anyone else alive to tell of it."*

Rinaldo says nothing for a moment. There's something in the way the man tells it — flat, practiced, like a stone worn smooth from being turned over too many times under a thumb — that makes him understand how long it took to be able to say it like this.

*[R]"How long have you lived here?"*

*[E]"Since before you were born, I think."* A hint of something that on another face would have been a smile. *[E]"I've lost count of the winters."*

*[R]"Why do you live alone, away from everyone?"*

*[E]"Because at some point I stopped being the child who survived, and became the mad child."* A pause. *[E]"I told anyone who'd listen that the Borda was real. No one wanted to listen."*

*[R]"What happened to you, after?"*

*[E]"I left. Staying meant being looked at the way you look at a sick dog."* A pause. *[E]"I spent the rest of my life looking for anyone who'd seen what I'd seen. Learning how she moves, what she follows, what she leaves behind."* Another pause. *[E]"Not for courage. So I wouldn't be, again, that child no one believed."*

Rinaldo looks at him — a man who built an entire life around one instant of fear that no one else would believe. He doesn't know yet if it's a warning about what he himself could become, or just a lonely old man in a stone house. Maybe the two aren't mutually exclusive.

*[R]"And the woman?"*

*[E]"I don't know."* The old man shakes his head, slowly. *[E]"None of those who knew her ever came back to tell of it."*

He adds nothing more. Rinaldo waits a moment, but understands nothing else is coming from that question — only an emptiness, whether left on purpose or not.

*[R]"And the children?"*

*[E]"She carries them with her — the instant they die."* A pause. *[E]"No one has ever found them."*

Something tightens in Rinaldo's chest — a thought beginning to form that he himself refuses to let finish. He doesn't say it aloud. Not to a stranger, not yet to himself.` } },
      { img: 'assets/storia/scena13/panel-06c.jpg', text: { it: `*[R]"C'è una cosa che devo chiederti."* Rinaldo esita, poi decide di dirlo. *[R]"Ieri notte, al fuoco — il campanellino ha cominciato a muoversi da solo. E poi qualcosa ha preso forma. Un viso, quasi. Una mano sulla guancia, calda, anche se non c'era nessuno."* Una pausa. *[R]"Non era la Borda. Non aveva niente della Borda. Era... gentile. Familiare."*

Il vecchio ascolta senza smettere di tenere i fogli in mano — ma quando Rinaldo finisce, li posa sul tavolo, con cura, come se non servissero più per quello che sta per dire.

*[E]"Uno spirito, forse."* Una pausa. *[E]"Ne ho sentito parlare — mai da chi l'ha visto con i suoi occhi, solo storie, tramandate da chi le aveva sentite a sua volta. Si dice che quando qualcuno muore con troppo amore ancora da dare, o troppo dolore non ancora finito, un pezzo di lui a volte non segue il resto nel mondo dei morti. Resta legato a qualcosa — un oggetto, un luogo, qualcuno rimasto indietro."* Un'altra pausa. *[E]"Se il tuo campanellino ha davvero fatto uscire qualcosa, come dici... forse è più di un oggetto, per te."* Un'ultima pausa. *[E]"Non so se è vero, nessuna di queste cose. Non le ho mai viste coi miei occhi. Ma in questo mestiere ho imparato a non dire mai 'non è possibile' troppo in fretta."*

Rinaldo non dice il nome che gli è venuto in mente. Non ancora. Non a un estraneo, non a sé stesso.

*[R]"Si può fermare?"*

*[E]"Non so di nessuno che ci sia riuscito."* Il vecchio lo guarda per la prima volta con qualcosa che assomiglia a compassione. *[E]"Ma non so di nessuno che abbia provato nel modo in cui sembra voglia provare tu."*

*[R]"Tu ci hai provato?"*

*[E]"Studiare non è provare."* Una pausa. *[E]"Io ho solo guardato, per tutta la vita."* Un'altra pausa, più lunga. *[E]"Tu sei il primo che ho visto andarci incontro."*`, en: `*[R]"There's something I have to ask you."* Rinaldo hesitates, then decides to say it. *[R]"Last night, at the fire — the campanellino started moving on its own. And then something took shape. A face, almost. A hand on my cheek, warm, even though no one was there."* A pause. *[R]"It wasn't the Borda. It had nothing of the Borda in it. It was... gentle. Familiar."*

The old man listens without letting go of the pages in his hand — but when Rinaldo finishes, he sets them down on the table, carefully, as if they weren't needed for what he's about to say.

*[E]"A spirit, perhaps."* A pause. *[E]"I've heard of it — never from someone who saw it with their own eyes, only stories, passed down from those who'd heard them in turn. They say that when someone dies with too much love still to give, or too much grief not yet finished, a piece of them sometimes doesn't follow the rest into the world of the dead. It stays bound to something — an object, a place, someone left behind."* Another pause. *[E]"If your campanellino really did bring something out, the way you say... maybe it's more than an object, for you."* One last pause. *[E]"I don't know if any of it is true. I've never seen it with my own eyes. But in this trade I've learned never to say 'it's not possible' too quickly."*

Rinaldo doesn't say the name that came to mind. Not yet. Not to a stranger, not to himself.

*[R]"Can it be stopped?"*

*[E]"I don't know of anyone who has."* The old man looks at him for the first time with something that resembles compassion. *[E]"But I don't know of anyone who's tried the way you seem to want to try."*

*[R]"Have you tried?"*

*[E]"Studying isn't trying."* A pause. *[E]"I've only watched, my whole life."* Another pause, longer. *[E]"You're the first I've seen walk toward it."*` } },
      { img: 'assets/storia/scena13/panel-07.jpg', text: { it: `Le parole restano sospese nella stanza più a lungo di quanto servirebbe. Rinaldo non sa se è un complimento, un avvertimento, o solo un fatto detto senza enfasi da un uomo che ha smesso da tempo di provare a impressionare qualcuno.

Fuori, il campanellino ha smesso di scaldarsi. È tornato quello di sempre — un peso familiare, silenzioso, alla cintura.

Il vecchio lo accompagna alla porta. Non gli augura fortuna — sembra il tipo di parola che ha smesso di usare da molto tempo.

*[E]"Segui il campanellino"*, dice invece, come se fosse l'unica cosa sensata da dire. *[E]"Io ho solo guardato. Tu, a quanto pare, no."*

Rinaldo esce. La porta si richiude dietro di lui, e in pochi passi la casa di pietra è già inghiottita dal bianco, come se non fosse mai stata lì.

Riprende a camminare.`, en: `The words hang in the room longer than they need to. Rinaldo doesn't know if it's a compliment, a warning, or just a fact stated plainly by a man who stopped trying to impress anyone long ago.

Outside, the campanellino has stopped warming. It's back to its usual self — a familiar weight, silent, at his belt.

The old man walks him to the door. He doesn't wish him luck — it seems like the kind of word he stopped using long ago.

*[E]"Follow the campanellino,"* he says instead, as if it were the only sensible thing to say. *[E]"I only watched. You, it seems, didn't."*

Rinaldo goes out. The door closes behind him, and within a few steps the stone house is already swallowed by the white, as if it had never been there.

He starts walking again.` } }
    ]

  {
    id: 'S14',
    title: { it: 'Scena 14 — L\'Oggetto della Rabbia', en: 'Scene 14 — The Object of the Rage' },
    panels: [
      { img: 'assets/storia/scena14/panel-01.jpg', text: { it: `Cammina senza una direzione che non sia "lontano dall'eremo". Il campanellino è silenzioso alla cintura, come sempre quando non ha nulla da segnalare. La nebbia qui si è fatta più bassa, quasi al livello del petto — vede il terreno sotto di sé con più chiarezza di quanto veda davanti.`, en: `He walks with no direction beyond "away from the hermitage." The campanellino is silent at his belt, as always when it has nothing to signal. The fog here has settled lower, almost chest-height — he can see the ground beneath him more clearly than what lies ahead.` } },
      { img: 'assets/storia/scena14/panel-02.jpg', text: { it: `Si ferma perché il campanellino si muove — una volta sola, un colpo secco contro il suo fianco, poi niente. Non il tintinnio leggero di poco prima. Qualcosa di più simile a un avvertimento che a una presenza.

Guarda nella direzione in cui sembra essersi girato, quasi da solo, contro la cintura.

A un centinaio di passi, dove la nebbia si dirada abbastanza da lasciar intuire la linea di una siepe, qualcosa si muove che non è nebbia.`, en: `He stops because the campanellino moves — once, a sharp knock against his hip, then nothing. Not the light chime from before. Something closer to a warning than a presence.

He looks in the direction it seems to have turned, almost on its own, against his belt.

A hundred paces off, where the fog thins just enough to hint at the line of a hedge, something moves that isn't fog.` } },
      { img: 'assets/storia/scena14/panel-03.jpg', text: { it: `Non ha una forma che si possa dire con certezza. Un cappuccio, o qualcosa che ne ha la sagoma — sotto, niente che assomigli a un corpo con delle proporzioni conosciute, solo peso e movimento, come se il buio sotto quel cappuccio fosse più fitto del resto della nebbia intorno. Dietro di lei — non sa perché pensa "lei", lo pensa e basta — qualcosa striscia sul terreno, una linea sottile che il terreno bagnato incide per un istante prima che la nebbia la richiuda.`, en: `It has no shape you could name with certainty. A hood, or something with the shape of one — beneath it, nothing that resembles a body with recognizable proportions, only weight and movement, as if the dark under that hood were denser than the rest of the fog around it. Behind her — he doesn't know why he thinks "her," he just does — something drags along the ground, a thin line the wet earth carves for an instant before the fog closes over it again.` } },
      { img: 'assets/storia/scena14/panel-04.jpg', text: { it: `Rinaldo non si muove. Non decide di non muoversi — il corpo lo fa per lui, come si fa con un rumore in casa nel cuore della notte: prima si resta immobili, poi si pensa.

Si abbassa dietro un cespuglio spoglio, lentamente, un gesto da uomo che ha passato la vita a non farsi notare dai cani da guardia più che dai nemici.

La cosa non si volta verso di lui. Non accelera, non rallenta. Attraversa quel taglio di visibilità come se stesse semplicemente andando da un posto a un altro — un lavoro, quasi, più che una caccia — e in pochi passi la nebbia se la richiude addosso, prima ancora che Rinaldo riesca a decidere se quello che ha visto era davvero una cosa sola o due.

Il campanellino resta muto per tutto il tempo. Non un suono, non un movimento — come se anche lui stesse trattenendo il fiato.`, en: `Rinaldo doesn't move. He doesn't decide not to move — his body does it for him, the way you do with a noise in the house in the dead of night: first you go still, then you think.

He crouches behind a bare bush, slowly, the gesture of a man who's spent his life avoiding notice from guard dogs more than from enemies.

The thing doesn't turn toward him. It doesn't speed up, doesn't slow down. It crosses that gap in visibility as if it were simply going from one place to another — a task, almost, more than a hunt — and within a few steps the fog closes back over it, before Rinaldo can even decide whether what he saw was truly one thing or two.

The campanellino stays silent the whole time. Not a sound, not a movement — as if it, too, were holding its breath.` } },
      { img: 'assets/storia/scena14/panel-05.jpg', text: { it: `Passa del tempo prima che si rialzi — non sa dire quanto. Le gambe gli tremano in un modo che lo imbarazza anche se non c'è nessuno a vederlo.`, en: `Some time passes before he gets up again — he couldn't say how much. His legs shake in a way that embarrasses him even though no one is there to see.` } },
      { img: 'assets/storia/scena14/panel-06.jpg', text: { it: `Cammina a lungo prima di rendersi conto che ha smesso di pensare al pericolo appena passato e ha cominciato, senza accorgersene, a costruire una spiegazione.

Il vecchio ha detto che cambia, che sceglie. Ha detto "sempre" e poi si è corretto da solo, ha detto "il mio caso, non una legge". Ma Rinaldo non è fatto per vivere dentro un forse — non l'ha mai saputo fare, nemmeno quando gli conveniva. Ha bisogno che i pezzi si tengano insieme, anche se i pezzi non gli appartengono.

*Ti ha scelta*, pensa, e il pensiero ha la forma di un'accusa anche se non sa bene contro chi. *Ti ha presa e ti ha usata — per arrivare a loro, per portarli via mentre tu cantavi senza saperlo per chi.* Non gli viene in mente una parola migliore di "strumento". Non gli piace, ma è quella che resta.

E poi, perché la mente cerca sempre la porta più gentile quando ne trova due: *Forse dormivano, quando lei li ha portati via. Forse credevano ancora che fosse la ninna nanna a farli addormentare.* Non sa da dove gli venga questo pensiero, solo che una volta arrivato non lo lascia andare più. È più facile vivere in un mondo dove i suoi figli dormono da qualche parte, anche sotto la custodia di una cosa che striscia nella nebbia, che in uno dove hanno smesso di respirare in una stanza che lui non ha mai visto.

Non lo dice a voce alta. Non c'è nessuno a cui dirlo. Ma per la prima volta da quando è tornato, la rabbia che porta da settimane — informe quanto la cosa che ha appena visto, senza una direzione precisa in cui scaricarsi — ha qualcosa a cui aggrapparsi. Non un nome. Non ancora. Ma una forma, incappucciata e silenziosa, che si allontana nella nebbia davanti a lui nella stessa direzione in cui deve continuare a camminare.

Non è sollievo. Ma somiglia a qualcosa che si può usare.`, en: `He walks a long while before realizing he's stopped thinking about the danger just passed and has started, without noticing, building an explanation.

The old man said she changes, that she chooses. He said "always" and then corrected himself, said "my case, not a law." But Rinaldo isn't built to live inside a maybe — he's never known how, not even when it would have served him. He needs the pieces to hold together, even when the pieces don't belong to him.

*She chose you*, he thinks, and the thought takes the shape of an accusation even though he isn't sure against whom. *She took you and used you — to reach them, to carry them off while you sang without knowing for whom.* No word better than "tool" comes to mind. He doesn't like it, but it's the one that stays.

And then, because the mind always looks for the gentler door when it finds two: *Maybe they were sleeping, when she carried them off. Maybe they still thought it was the lullaby putting them to sleep.* He doesn't know where the thought comes from, only that once it arrives it won't let go. It's easier to live in a world where his children sleep somewhere, even in the keeping of something that drags itself through the fog, than in one where they stopped breathing in a room he never saw.

He doesn't say it aloud. There's no one to say it to. But for the first time since he came back, the anger he's carried for weeks — as shapeless as the thing he just saw, with no precise direction to spend itself — has something to hold on to. Not a name. Not yet. But a shape, hooded and silent, moving away into the fog ahead of him, in the same direction he must keep walking.

It isn't relief. But it resembles something he can use.` } }
    ]
  },
  {
    id: 'S15',
    title: { it: 'Scena 15 — La Creatura (primo scontro)', en: 'Scene 15 — The Creature (first encounter)' },
    panels: [
      { img: 'assets/storia/scena15/panel-01.jpg', text: { it: `Il sentiero si stringe tra due argini bassi, la nebbia qui più fitta che altrove — abbastanza da nascondere il terreno sotto i piedi, non abbastanza da nascondere il resto. Cammina da ore, o forse solo da minuti allungati fino a sembrare ore: nella nebbia il tempo ha smesso di essere una cosa affidabile.

Il campanellino non ha detto niente per tutto il cammino. Non che significhi molto: non gli ha mai segnalato un pericolo fisico, solo le cose che contano per la storia in cui è finito — mai una volta gli ha detto se c'è qualcosa di pronto a saltargli addosso. Ma dopo quello che ha visto poco prima, la sagoma incappucciata che attraversava la radura come se avesse un lavoro da sbrigare, il silenzio ha smesso comunque di sembrargli innocuo. È solo l'assenza di un segnale, non la garanzia che non ci sia nulla da temere.`, en: `The path narrows between two low embankments, the fog thicker here than elsewhere — enough to hide the ground underfoot, not enough to hide the rest. He's been walking for hours, or maybe only minutes stretched thin enough to feel like hours: in the fog, time has stopped being something you can trust.

The campanellino has said nothing the whole way. Not that it means much: it's never once signaled a physical danger, only the things that matter to the story he's caught in — never once has it told him whether something is about to lunge at him. But after what he saw a little while ago, the hooded shape crossing the clearing as if it had a job to finish, the silence has stopped feeling harmless all the same. It's only the absence of a signal, not a guarantee there's nothing to fear.` } },
      { img: 'assets/storia/scena15/panel-02.jpg', text: { it: `Il rumore arriva prima della cosa: un tirare fuori dall'acqua bassa, umido e pesante, che non è il verso di nessun animale che Rinaldo conosca — e per un istante, prima ancora di vedere niente, il corpo capisce quello che la mente non ha ancora finito di elaborare: qualcosa di sbagliato si sta muovendo verso di lui.

Poi è già addosso, e non c'è più tempo per capire cosa sia davvero — non un balzo pulito, un lanciarsi disordinato, troppe zampe o troppo poche, impossibile dire quali sotto lo strato di fango che le riveste come una seconda pelle.`, en: `The sound arrives before the thing itself: a hauling out of the shallow water, wet and heavy, that isn't the cry of any animal Rinaldo knows — and for an instant, before he sees anything at all, his body understands what his mind hasn't finished processing yet: something wrong is moving toward him.

Then it's already on him, and there's no more time to work out what it really is — not a clean lunge, a disordered throwing of itself, too many legs or too few, impossible to say which beneath the layer of mud that coats it like a second skin.` } },
      { img: 'assets/storia/scena15/panel-03.jpg', text: { it: `Rinaldo indietreggia, la lama del fabbro fuori dal fodero prima ancora di deciderlo — le mani sanno tenerla dritta, questo almeno gliel'ha insegnato Beatrice, maneggiare ferri più piccoli e più precisi nel laboratorio di casa, ma nessuno gli ha mai insegnato a colpire per uccidere qualcosa che vuole ucciderlo per primo. Il primo fendente parte troppo largo, troppo lento: taglia solo aria, e la cosa lo scaraventa contro l'argine con una spinta che non sembra nemmeno intenzionale, solo peso puro, il peso di qualcosa che non si preoccupa di dove va a finire chi ha davanti.`, en: `Rinaldo staggers back, the blacksmith's blade out of its sheath before he decides it — his hands know how to hold it straight, at least Beatrice taught him that much, handling smaller, more precise tools in the workshop at home, but no one ever taught him to strike to kill something that wants to kill him first. The first swing goes too wide, too slow: it cuts only air, and the thing throws him against the embankment with a shove that doesn't even feel intentional, only pure weight — the weight of something that doesn't care where whoever's in front of it ends up.` } },
      { img: 'assets/storia/scena15/panel-04.jpg', text: { it: `Il fiato gli esce tutto insieme all'impatto. Si rialza più per la paura di restare a terra — di quello che significherebbe restare a terra — che per un vero coraggio. Il secondo colpo va a segno, un taglio superficiale su qualcosa che dovrebbe essere un fianco, ma la creatura non rallenta, non sembra nemmeno accorgersene: il sangue, se di sangue si tratta, scompare subito nel fango scuro senza cambiare nulla nel suo movimento. Lo prende per la caviglia — una stretta che sembra fatta di troppe dita, o di nessuna dita affatto, solo pressione — e lo trascina di un passo, la faccia vicina all'argine bagnato, l'odore di terra marcia e acqua stagnante che gli riempie la bocca prima ancora dei pensieri.

Rinaldo capisce, con quella lucidità improvvisa e fredda che a volte arriva un attimo prima di perderla per sempre, che non ha più margine. Non c'è un terzo colpo pronto. Non c'è tempo per trovarne uno. C'è solo il fango contro la guancia, il peso sopra di lui, e un pensiero che non è nemmeno più paura, ormai — solo constatazione: *è qui che succede.*`, en: `The breath goes out of him all at once with the impact. He gets up more from the fear of staying down — of what staying down would mean — than from any real courage. The second blow lands, a shallow cut across what should be a flank, but the creature doesn't slow, doesn't even seem to notice: the blood, if it is blood, vanishes at once into the dark mud without changing anything in its movement. It grabs his ankle — a grip that feels made of too many fingers, or no fingers at all, only pressure — and drags him a step closer, his face near the wet earth of the embankment, the smell of rotting soil and standing water filling his mouth before the thoughts even arrive.

Rinaldo understands, with that sudden, cold clarity that sometimes arrives a moment before losing it for good, that he has no margin left. There's no third strike ready. There's no time to find one. There's only the mud against his cheek, the weight on top of him, and a thought that isn't even fear anymore, by now — only a plain fact: *this is where it happens.*` } },
      { img: 'assets/storia/scena15/panel-05.jpg', text: { it: `Poi il calore.

Non lo capisce subito per quello che è — in quell'istante pensa solo che qualcosa lo abbia aperto, che quel bruciore al fianco sia il proprio sangue che si raffredda contro la pelle. Ma il sangue non scalda. Questo sì — un calore vero, pieno, che gli attraversa la stoffa e la carne come una mano tenuta ferma contro il suo fianco per tutto il tempo passato in quella nebbia, in attesa solo di questo momento per farsi sentire.

Poi la luce. Bianca. Calda — non il bianco piatto e senza fondo della nebbia che lo insegue da giorni, ma un bianco che sembra venire da dentro una casa, da un fuoco acceso apposta per lui. Per un istante il fango sparisce, l'argine sparisce, la cosa che lo sta trascinando sparisce — resta solo quella luce, e sotto la paura, per una frazione di secondo troppo breve per essere un pensiero vero, qualcosa che somiglia a un sollievo che Rinaldo conosce già, da un posto più vecchio di lui.`, en: `Then the heat.

He doesn't understand it at first for what it is — in that instant he thinks only that something has opened him up, that the burning at his side is his own blood cooling against his skin. But blood doesn't warm you. This does — a real heat, full, passing through cloth and flesh like a hand held steady against his side through all the time spent in that fog, waiting only for this moment to make itself known.

Then the light. White. Warm — not the flat, bottomless white of the fog that has chased him for days, but a white that seems to come from inside a house, from a fire lit just for him. For an instant the mud disappears, the embankment disappears, the thing dragging him disappears — only the light remains, and beneath the fear, for a fraction of a second too brief to be a real thought, something that resembles a relief Rinaldo already knows, from somewhere older than himself.` } },
      { img: 'assets/storia/scena15/panel-06.jpg', text: { it: `La cosa si ritrae con un verso che questa volta somiglia davvero a un dolore — non il ringhio meccanico di poco prima, qualcosa di più simile a uno strappo. Si allontana di qualche passo, disorientata più che ferita, il corpo che si contorce lontano dalla luce come se quella chiarezza improvvisa le avesse tolto qualcosa di essenziale, il modo stesso in cui vedeva nel buio sotto la nebbia. Per la prima volta da quando è iniziato tutto questo, non sembra più una forza della natura. Sembra qualcosa che può avere paura.`, en: `The thing recoils with a sound that this time truly resembles pain — not the mechanical snarl from a moment ago, something closer to a tearing. It draws back a few steps, disoriented more than hurt, its body twisting away from the light as if that sudden clarity had taken something essential from it, the very way it saw in the dark beneath the fog. For the first time since all this began, it no longer looks like a force of nature. It looks like something that can be afraid.` } },
      { img: 'assets/storia/scena15/panel-07.jpg', text: { it: `Rinaldo non capisce cosa sia successo — solo che è successo in tempo, e che il tempo per capire verrà dopo, se ci sarà un dopo. Si tira su, la lama ancora stretta in una mano che trema ma non molla la presa, e questa volta il fendente non trema con lei: la creatura, ancora accecata, non si scansa abbastanza in fretta. Non muore in modo pulito — nessuno scontro muore in modo pulito, qualunque cosa raccontino le storie dei soldati tornati dalla guerra — si dissolve indietro nel canneto, nella nebbia, in un rumore d'acqua che si richiude sopra qualcosa che un attimo prima era vivo, o comunque abbastanza vivo da volerlo morto.

Rinaldo resta in piedi. Il petto gli si alza e si abbassa troppo in fretta, la lama gli pesa in mano più di quanto pesasse un minuto prima, e per un momento lungo e vuoto non pensa a niente — non al pericolo appena scampato, non al calore che gli brucia ancora contro il fianco. C'è solo il corpo che continua a funzionare, ostinato, mentre la mente si riprende il proprio posto un pezzo alla volta.`, en: `Rinaldo doesn't understand what happened — only that it happened in time, and that the time to understand will come later, if there is a later. He pulls himself up, blade still gripped in a hand that shakes but doesn't loosen its hold, and this time the swing doesn't shake with it: the creature, still blinded, doesn't move aside fast enough. It doesn't die cleanly — no fight ever dies cleanly, whatever the stories soldiers tell when they come home from war — it dissolves back into the reeds, into the fog, in a sound of water closing over something that a moment ago was alive, or at least alive enough to want him dead.

Rinaldo stays on his feet. His chest rises and falls too fast, the blade heavier in his hand than it was a minute ago, and for one long, empty moment he doesn't think about anything at all — not the danger just escaped, not the heat still burning at his side. There's only the body going on, stubborn, while the mind takes its place back one piece at a time.` } },
      { img: 'assets/storia/scena15/panel-08.jpg', text: { it: `Il respiro di Rinaldo non si è ancora calmato quando si accorge che lei è ancora lì.

Non sparisce come ha fatto quella notte nei campi — un battito di ciglia, e poi solo il vuoto dove un istante prima c'era qualcosa. Questa volta resta. La stessa forma di vapore e luce calda di sempre, i contorni che si muovono piano come fiamma senza vento, ma ferma — immobile in un modo che sembra una scelta, non un'assenza di movimento.

Rinaldo non osa muoversi, come se il minimo gesto potesse farla scivolare via insieme al resto della notte.

*"Io ti conosco,"* dice lei.

È la prima parola che le ha mai sentito dire. In tutte le volte che è comparsa — la notte nei campi, il tocco sulla guancia al bivacco — non aveva mai avuto una voce, solo presenza, solo calore. Sentirla parlare ora gli si pianta nel petto con più forza di qualunque colpo preso poco prima.

Rinaldo si volta di scatto verso di lei, come se distogliere lo sguardo per un solo istante potesse far sparire quella voce insieme a tutto il resto. *[R]"Tu chi sei?"*`, en: `Rinaldo's breathing hasn't slowed yet when he realizes she's still there.

She doesn't vanish the way she did that night in the fields — a blink, and then only the emptiness where a moment ago there was something. This time she stays. The same shape of vapor and warm light as always, its edges moving slowly like flame with no wind, but still — motionless in a way that feels like a choice, not an absence of movement.

Rinaldo doesn't dare move, as if the smallest gesture might make her slip away along with the rest of the night.

*"I know you,"* she says.

It's the first word he's ever heard her speak. In every appearance before this — that night in the fields, the touch on his cheek at the campfire — she never had a voice, only presence, only warmth. Hearing her speak now lands in his chest harder than any blow taken a moment ago.

Rinaldo turns sharply toward her, as if looking away for even an instant might make that voice disappear along with everything else. *[R]"Who are you?"*` } },
      { img: 'assets/storia/scena15/panel-08b.jpg', text: { it: `Nella luce tremula del vapore, per un istante, qualcosa si mette a fuoco che un attimo prima non c'era — un dettaglio solo, nitido in mezzo a tutto quel resto indistinto: una ciocca di capelli bianchi, sopra la tempia sinistra. La stessa che ha baciato mille volte senza pensarci, la stessa che i suoi figli si divertivano a tirare per gioco quando pensavano che lei non se ne accorgesse.

Il mondo, per un istante, smette di avere il fango, la nebbia, il fiato corto. C'è solo quel dettaglio, e tutto quello che porta con sé.
