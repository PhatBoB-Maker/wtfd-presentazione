<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Where the Fog Dies — Storia</title>
<!--
  USO INTERNO — non linkato da external.html.
  Struttura dati scene: vedi array SCENES più in basso.
  Per aggiungere una scena: copiare i pannelli (jpg, ~1600px lato lungo)
  in assets/storia/scenaN/panel-01.jpg ecc., poi aggiungere un blocco
  { id, title:{it,en}, panels:[{img, text:{it,en}}, ...] } all'array SCENES.
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          #080705;
  --bg2:         #0d0b09;
  --surface:     #131109;
  --surface2:    #1a1714;
  --accent:      #7a3232;
  --accent-dim:  rgba(122, 50, 50, 0.25);
  --text:        #e0d7ca;
  --text-mid:    #7d756c;
  --text-low:    #3a3530;
  --border:      rgba(120, 110, 98, 0.13);
  --border-acc:  rgba(122, 50, 50, 0.35);
  --serif:       'Cormorant Garamond', 'Garamond', 'Georgia', serif;
  --sans:        'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-weight: 300;
  overflow: hidden;
}

/* ---------- Top bar ---------- */
#topbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  z-index: 20;
  gap: 16px;
}
#topbar a { color: var(--text-mid); text-decoration: none; font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; white-space: nowrap; }
#topbar a:hover { color: var(--text); }
#scene-title { font-family: var(--serif); font-size: 18px; color: var(--text); letter-spacing: 0.02em; text-align: center; flex: 1; }
#topbar-right { display: flex; align-items: center; gap: 18px; }
#progress-label { font-size: 12px; color: var(--text-mid); letter-spacing: 0.06em; white-space: nowrap; }
#lang-toggle {
  background: transparent;
  border: 1px solid var(--border-acc);
  color: var(--text);
  font-family: var(--sans);
  font-size: 11px;
  letter-spacing: 0.08em;
  padding: 6px 12px;
  cursor: pointer;
  border-radius: 3px;
  transition: background 0.2s, color 0.2s;
}
#lang-toggle:hover { background: var(--accent); color: #fff; }

#chapters-toggle {
  background: transparent;
  border: 1px solid var(--border-acc);
  color: var(--text);
  font-family: var(--sans);
  font-size: 11px;
  letter-spacing: 0.08em;
  padding: 6px 12px;
  cursor: pointer;
  border-radius: 3px;
  transition: background 0.2s, color 0.2s;
  white-space: nowrap;
}
#chapters-toggle:hover { background: var(--accent); color: #fff; }

/* ---------- Chapter menu ---------- */
#chapters-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(4,3,2,0.75);
  z-index: 40;
  align-items: flex-start;
  justify-content: center;
  padding-top: 90px;
}
#chapters-overlay.open { display: flex; }
#chapters-panel {
  background: var(--surface2);
  border: 1px solid var(--border-acc);
  width: min(480px, 90vw);
  max-height: 70vh;
  overflow-y: auto;
  padding: 8px 0;
}
.chapter-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 24px;
  cursor: pointer;
  border-bottom: 1px solid var(--border);
  font-family: var(--serif);
  font-size: 17px;
  transition: background 0.15s;
}
.chapter-item:last-child { border-bottom: none; }
.chapter-item:hover { background: var(--accent-dim); }
.chapter-item .chip {
  font-family: var(--sans);
  font-size: 11px;
  color: var(--text-mid);
  letter-spacing: 0.06em;
}

/* ---------- Resume banner ---------- */
#resume-banner {
  display: none;
  position: fixed;
  top: 64px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--surface2);
  border: 1px solid var(--border-acc);
  padding: 10px 18px;
  font-size: 12px;
  color: var(--text-mid);
  z-index: 30;
  gap: 14px;
  align-items: center;
}
#resume-banner.open { display: flex; }
#resume-banner a { color: var(--text); text-decoration: underline; cursor: pointer; }

/* ---------- Main stage ---------- */
#stage { position: absolute; top: 56px; bottom: 84px; left: 0; right: 0; display: flex; }
#panel-col { flex: 1.3; display: flex; align-items: center; justify-content: center; background: #000; position: relative; overflow: hidden; }
#panel-col img { max-width: 100%; max-height: 100%; object-fit: contain; opacity: 0; transition: opacity 0.5s ease; }
#panel-col img.visible { opacity: 1; }

#text-col { flex: 1; background: var(--surface); border-left: 1px solid var(--border); display: flex; align-items: flex-start; padding: clamp(24px, 4vw, 64px); overflow-y: auto; }
#text-inner { max-width: 560px; opacity: 0; transform: translateY(8px); transition: opacity 0.5s ease, transform 0.5s ease; }
#text-inner.visible { opacity: 1; transform: translateY(0); }
#panel-text { font-family: var(--serif); font-weight: 400; font-size: clamp(17px, 2vw, 22px); line-height: 1.8; color: var(--text); white-space: pre-line; }
#panel-text em { color: #b98a6a; font-style: italic; }
#panel-text em.spk-R { color: #7fa3c9; }
#panel-text em.spk-I { color: #d99a86; }
#panel-text em.spk-L { color: #8fae8a; }
#panel-text em.spk-F { color: #9b7bb0; }
#panel-text em.spk-P { color: #8a8fa3; }
#panel-text em.spk-M { color: #a8a37a; }
#panel-text em.spk-C { color: #9c8560; }
#panel-text em.spk-E { color: #c9ab52; }
#panel-text em.spk-LP { color: #a8433e; }
#panel-text em.spk-BA { color: #6e7b7d; }

/* ---------- Controls ---------- */
#controls {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 84px;
  background: var(--bg2);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 28px;
  z-index: 20;
}
.ctrl-btn {
  background: transparent;
  border: 1px solid var(--border-acc);
  color: var(--text);
  font-family: var(--sans);
  cursor: pointer;
  border-radius: 50%;
  width: 44px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  transition: background 0.2s, color 0.2s;
}
.ctrl-btn:hover { background: var(--accent); color: #fff; }
#play-btn { width: 56px; height: 56px; font-size: 20px; }

@media (max-width: 820px) {
  #stage { flex-direction: column; top: 56px; bottom: 96px; }
  #panel-col { flex: 1.1; }
  #text-col { flex: 1; border-left: none; border-top: 1px solid var(--border); }
  #panel-text { font-size: 16px; }
  #scene-title { font-size: 14px; }
}

/* ---------- Mobile portrait: il topbar (Indietro / titolo / Capitoli / lingua)
   in una riga sola di 56px stringeva troppi elementi e il bottone lingua
   usciva dai bordi senza modo di raggiungerlo (niente scroll, body overflow:hidden).
   Si comprime tutto e si aggiunge uno scroll orizzontale di riserva solo sul
   gruppo destro dei bottoni. ---------- */
@media (max-width: 480px) {
  #topbar { padding: 0 10px; gap: 8px; }
  #topbar-right { gap: 8px; max-width: 55vw; overflow-x: auto; scrollbar-width: none; -ms-overflow-style: none; }
  #topbar-right::-webkit-scrollbar { display: none; }
  #progress-label { display: none; }
  #scene-title { font-size: 12px; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #topbar a { font-size: 10px; }
  #chapters-toggle, #lang-toggle { padding: 5px 8px; font-size: 10px; }
}
</style>
</head>
<body>

<div id="topbar">
  <a href="index.html">&larr; Indietro</a>
  <div id="scene-title"></div>
  <div id="topbar-right">
    <div id="progress-label"></div>
    <button id="chapters-toggle">&#9776; Capitoli</button>
    <button id="lang-toggle">EN</button>
  </div>
</div>

<div id="resume-banner">
  <span id="resume-text"></span>
  <a id="resume-restart">Ricomincia da capo</a>
</div>

<div id="chapters-overlay">
  <div id="chapters-panel"></div>
</div>

<div id="stage">
  <div id="panel-col"><img id="panel-img" src="" alt=""></div>
  <div id="text-col"><div id="text-inner"><p id="panel-text"></p></div></div>
</div>

<div id="controls">
  <button class="ctrl-btn" id="prev-btn" title="Pannello precedente">&#9664;</button>
  <button class="ctrl-btn" id="play-btn" title="Play / Pausa">&#9654;</button>
  <button class="ctrl-btn" id="next-btn" title="Pannello successivo">&#9654;&#9654;</button>
</div>

<script>
/* ============================================================
   DATI SCENE — aggiungere qui le scene successive
   Traduzioni EN fatte a mano, non con MT grezza, per restare
   coerenti col tono già usato nel resto del sito.
   ============================================================ */
const SCENES = [
  {
    id: 'S1',
    title: { it: 'Scena 1 — Il Mercato', en: 'Scene 1 — The Market' },
    panels: [
      {
        img: 'assets/storia/scena1/panel-01.jpg',
        text: {
          it: `Il mercato di un villaggio medievale romagnolo in un mattino d'autunno tardivo. Il terreno è fango indurito dal gelo della notte, segnato da solchi di carri. Le bancarelle sono poche — lana grezza, ortaggi avvizziti, un coltellino su un panno — e i colori sono quelli dell'inverno che arriva: ocra, marrone, grigio. L'aria odora di legna bruciata e di fieno bagnato.

Beatrice cammina tra la gente. Ha ventisei, ventisette anni — il viso di chi lavora all'aperto, le mani segnate da anni di erbe, decotti, terra. Porta un cesto sul braccio.`,
          en: `The market of a medieval Romagna village on a late autumn morning. The ground is mud hardened by the night's frost, rutted by cart wheels. The stalls are few — raw wool, wilted vegetables, a small knife laid on a cloth — and the colors are those of coming winter: ochre, brown, grey. The air smells of burnt wood and wet hay.

Beatrice walks among the people. She is twenty-six, twenty-seven — the face of someone who works outdoors, hands marked by years of herbs, decoctions, soil. She carries a basket on her arm.`
        }
      },
      {
        img: 'assets/storia/scena1/panel-02.jpg',
        text: {
          it: `Alcuni la salutano con calore: la moglie del fabbro le tocca il braccio, una vecchia le sorride da lontano, due bambini le corrono incontro e lei si abbassa ad accarezzarli, ride. Lei conosce tutti e tutti la conoscono. Ma non tutti la salutano: il parroco la guarda passare senza gesti, con la faccia chiusa. Una donna si gira appena, mormora qualcosa alla vicina. Beatrice lo nota. Non lo mostra.

Si ferma un momento dalla moglie del fabbro, che le racconta di una bambina con la febbre da tre giorni. Beatrice ascolta, fa domande precise. Alla fine dice cosa provare — non come se stesse prescrivendo, ma come se stesse ricordando a voce alta quello che sa. La moglie del fabbro la ringrazia con una stretta di mano che vale più delle parole.`,
          en: `Some greet her warmly: the blacksmith's wife touches her arm, an old woman smiles at her from a distance, two children run up to her and she crouches down to stroke them, laughing. She knows everyone and everyone knows her. But not everyone greets her: the priest watches her pass without a gesture, his face closed. A woman turns slightly, murmurs something to her neighbour. Beatrice notices. She doesn't show it.

She stops for a moment with the blacksmith's wife, who tells her about a little girl running a fever for three days. Beatrice listens, asks precise questions. In the end she says what to try — not as though prescribing, but as though remembering aloud what she already knows. The blacksmith's wife thanks her with a handshake worth more than words.`
        }
      },
      {
        img: 'assets/storia/scena1/panel-02b.jpg',
        text: {
          it: `Poco più avanti la accoglie la vicina di casa, con affetto genuino — le chiede dei bambini, le offre un pezzo di formaggio stagionato avvolto in un panno. Vuole sapere se Ludovico ha ancora il ginocchio gonfio. Beatrice dice di no, che è passato. Le due donne parlano come parlano le donne che si conoscono da sempre.

Il parroco, invece, non la cerca. Quando Beatrice gli si avvicina, lui risponde con la cortesia minima che la sua posizione impone — non di più. C'è qualcosa nella sua voce quando parla con lei. Non è ostilità aperta. È distanza. Come se notasse qualcosa che gli altri hanno imparato a non guardare.`,
          en: `A little further on, her neighbour greets her with real affection — asks after the children, offers her a piece of aged cheese wrapped in cloth. She wants to know if Ludovico's knee is still swollen. Beatrice says no, it's passed. The two women talk the way women talk when they've known each other all their lives.

The priest, on the other hand, doesn't seek her out. When Beatrice approaches him, he answers with the minimum courtesy his position demands — no more. There's something in his voice when he speaks to her. Not open hostility. Distance. As if he notices something everyone else has learned not to look at.`
        }
      },
      {
        img: 'assets/storia/scena1/panel-03.jpg',
        text: {
          it: `Poi vede Rinaldo, suo marito.

Lui è dall'altra parte del mercato, sta discutendo con un venditore di erbe secche — indica qualcosa, scuote la testa, indica di nuovo. Fa il medico anche quando non è necessario. Il venditore alla fine cede, cambia qualcosa nel prezzo, lo chiama *maestro* quando si volta. Beatrice lo guarda un momento prima che lui si accorga di lei.`,
          en: `Then she sees Rinaldo, her husband.

He's on the other side of the market, arguing with a dried-herb seller — pointing at something, shaking his head, pointing again. He plays the physician even when it isn't necessary. The seller finally gives in, changes something in the price, calls him *master* as he turns. Beatrice watches him for a moment before he notices her.`
        }
      },
      {
        img: 'assets/storia/scena1/panel-04.jpg',
        text: {
          it: `Poi i loro sguardi si incrociano e Rinaldo si dimentica immediatamente del venditore.`,
          en: `Then their eyes meet and Rinaldo forgets the seller instantly.`
        }
      },
      {
        img: 'assets/storia/scena1/panel-05.jpg',
        text: {
          it: `Si avvicinano. Non c'è niente di teatrale in questo momento — è la familiarità di due persone che si conoscono così bene da non aver bisogno di parole per dirsi che sono contenti di vedersi.

*"Non fare sempre così,"* gli dice lei non appena è abbastanza vicina, con un cenno verso il venditore che si allontana. *"Quelle erbe sono difficili da raccogliere, lo sai bene — specie le più rare. Se continui a tirare sul prezzo in quel modo, prima o poi smetterà di vendertele."*

Lui non risponde subito. La sta ancora ascoltando, ma con un'espressione che non c'entra niente con le erbe. *[R]"Sei bella quando ti arrabbi per queste cose,"* dice, come se fosse la conclusione più logica del mondo.

Beatrice si interrompe a metà frase. *"Non cambiare discorso."* Ma sta già sorridendo, e lo sa anche lui.

*[R]"Non lo cambio,"* replica lui, per niente pentito. Le prende il cesto dalla mano, lei glielo lascia fare. *[R]"Un po' di sana contrattazione non ha mai fatto male a nessuno. E la gente sembra dimenticare con chi ha a che fare: sono il marito della migliore erborista che ci sia da qui a Bologna. Il minimo che posso fare è difendere il nome di famiglia."*

Beatrice scuote la testa, ma sta già ridendo per davvero. *"Da qui a Bologna. Certo."*

*[R]"Cercano sempre di rifilarmi il prezzo pieno,"* continua lui, ignorandola allegramente. *[R]"Ma a me non la fanno."*`,
          en: `They come together. There's nothing theatrical about this moment — it's the familiarity of two people who know each other so well they need no words to say they're glad to see one another.

*"Don't always do that,"* she says, close enough now, glancing at the vendor as he walks off. *"Those herbs are hard to gather, you know that well — especially the rare ones. Keep haggling like that and sooner or later he'll stop selling to you at all."*

He doesn't answer right away. He's still listening, but with an expression that has nothing to do with herbs. *[R]"You're beautiful when you get worked up about these things,"* he says, as if it were the most logical conclusion in the world.

Beatrice stops mid-sentence. *"Don't change the subject."* But she's already smiling, and he knows it.

*[R]"I'm not changing it,"* he replies, not remotely sorry. He takes the basket from her hand, she lets him. *[R]"A little honest bargaining never hurt anyone. Besides, people seem to forget who they're dealing with: I'm married to the best herbalist there is, all the way to Bologna. The least I can do is defend the family name."*

Beatrice shakes her head, but she's really laughing now. *"All the way to Bologna. Of course."*

*[R]"They always try to charge me full price,"* he goes on, cheerfully ignoring her. *[R]"But they never get away with it with me."*`
        }
      },
      {
        img: 'assets/storia/scena1/panel-05b.jpg',
        text: {
          it: `Camminano insieme tra le bancarelle, il cesto ora nella mano di lui. Salutano altre facce note lungo la strada — un cenno al mugnaio, una battuta veloce con il vecchio che vende ceste di vimini, che chiede a Rinaldo, ridacchiando, se ha ancora tutte le dita dopo l'ultima "trattativa". Nessuno si stupisce di vederli insieme: sono i due di sempre, il medico e l'erborista, la coppia che il villaggio conosce da prima che i loro figli imparassero a camminare.`,
          en: `They walk together among the stalls, the basket now in his hand. They greet other familiar faces along the way — a nod to the miller, a quick joke with the old man who sells wicker baskets, who asks Rinaldo, chuckling, whether he still has all his fingers after that last "negotiation." No one is surprised to see them together: they're the usual two, the physician and the herbalist, the couple the village has known since before their children learned to walk.`
        }
      },
      {
        img: 'assets/storia/scena1/panel-06.jpg',
        text: {
          it: `Poi, in mezzo alla folla, senza che nessuno dei due lo decida davvero, il rumore del mercato comincia ad allontanarsi. Non smette — continua a muoversi intorno a loro, voci, carri, richiami dei venditori — ma per un momento loro smettono di sentirlo. Ci sono solo loro due, fermi in mezzo a tutto il resto.

Lui le sistema una ciocca di capelli che le è scivolata sul viso — un gesto meccanico, lo stesso di sempre — e per un attimo le dita si fermano su quella striscia di capelli bianchi che Beatrice porta da quando è nata, proprio sopra la tempia sinistra. Rinaldo ci ha posato gli occhi sopra centinaia di volte. Non la guarda come se fosse una cosa strana — la guarda come si guarda qualcosa che si è amato così a lungo da non riuscire più a immaginarlo assente.

Lei si accorge dello sguardo. Sa già dove sta guardando.`,
          en: `Then, in the middle of the crowd, without either of them really deciding it, the noise of the market begins to drift away. It doesn't stop — it keeps moving around them, voices, carts, vendors calling out — but for a moment they stop hearing it. There's only the two of them, standing still in the middle of everything else.

He tucks back a lock of hair that's slipped loose across her face — a mechanical gesture, the same as always — and for a moment his fingers linger on that streak of white hair Beatrice has carried since birth, just above her left temple. Rinaldo has laid eyes on it hundreds of times. He doesn't look at it as if it were strange — he looks at it the way one looks at something loved for so long it's impossible to imagine it gone.

She notices the look. She already knows where he's looking.`
        }
      },
      {
        img: 'assets/storia/scena1/panel-07.jpg',
        text: {
          it: `Poi lui alza gli occhi su di lei con un'espressione precisa — non dice niente, ma è un'espressione che Beatrice conosce benissimo. Lei impara a leggerla anni fa, quando erano ancora giovani e lui non sapeva ancora nasconderla. Adesso non prova nemmeno a nasconderla.`,
          en: `Then he raises his eyes to her with a precise expression — he says nothing, but it's an expression Beatrice knows very well. She learned to read it years ago, when they were still young and he didn't yet know how to hide it. Now he doesn't even try.`
        }
      },
      {
        img: 'assets/storia/scena1/panel-08.jpg',
        text: {
          it: `Beatrice ride, nello stesso modo in cui ride ogni volta che lui le fa quella faccia — e gliela fa spesso, dopo tutti questi anni. Scuote la testa come per dire *adesso, qui?* — ma non è un no.`,
          en: `Beatrice laughs, the same way she laughs every time he makes that face — and he makes it often, after all these years. She shakes her head as if to say *now, here?* — but it isn't a no.`
        }
      },
      {
        img: 'assets/storia/scena1/panel-09.jpg',
        text: {
          it: `Poi una voce li raggiunge da dietro, dal fondo del mercato, e li sveglia da quella bolla come uno scossone. Il rumore del mondo torna tutto insieme, più forte di prima.

Un uomo in livrea — i colori del signore locale — si è fermato al centro della piazza. Tira fuori un rotolo, aspetta che il rumore si abbassi. Il mercato non si ferma del tutto, ma rallenta. Le persone si voltano. Lui legge: uomini abili tra una certa età, il signore chiede leve per la campagna, chi è tenuto al servizio si presenti entro la prossima luna. Chi non si presenta risponde al signore. E poi, quasi di passaggio: chi esercita l'arte del medicare o della chirurgia è anch'egli chiamato a presentarsi.

Il banditore riavvolge il rotolo. Il mercato riprende.`,
          en: `Then a voice reaches them from behind, from the far end of the market, and shakes them out of that bubble like a jolt. The noise of the world rushes back all at once, louder than before.

A man in livery — the local lord's colors — has stopped at the center of the square. He pulls out a scroll, waits for the noise to settle. The market doesn't stop entirely, but it slows. People turn. He reads: able-bodied men within a certain age, the lord calls for levies for the campaign, those bound to service must present themselves by the next moon. Those who don't answer to the lord himself. And then, almost in passing: those who practice the art of medicine or surgery are likewise called to present themselves.

The herald rolls up the scroll. The market picks up again.`
        }
      },
      {
        img: 'assets/storia/scena1/panel-10.jpg',
        text: {
          it: `Beatrice non guarda il banditore. Guarda Rinaldo che ascolta.

Lui sta fermo, il cesto di lei in mano, gli occhi sul banditore anche dopo che ha smesso di parlare. Non è sorpreso. È la faccia di chi aspettava questa voce da settimane e adesso l'ha sentita. Non è un soldato e lo sanno tutti e due — ma i medici in campo muoiono quasi quanto i combattenti.

La risata di prima è finita da qualche parte mentre il banditore leggeva. Non è tornata.`,
          en: `Beatrice isn't watching the herald. She's watching Rinaldo listen.

He stands still, her basket in his hand, eyes on the herald even after he's stopped speaking. He isn't surprised. It's the face of someone who's been expecting this voice for weeks and has now heard it. He isn't a soldier and they both know it — but physicians in the field die almost as often as the fighters do.

The laugh from before has gone somewhere while the herald read. It doesn't come back.`
        }
      },
      {
        img: 'assets/storia/scena1/panel-11.jpg',
        text: {
          it: `*"La guerra,"* dice Beatrice alla fine. Non è una domanda.

Lui abbassa gli occhi sul cesto che tiene in mano. Poi: *[R]"Non ancora."*

Lei annuisce. Gli prende il cesto. Camminano.`,
          en: `*"The war,"* Beatrice says finally. It isn't a question.

He lowers his eyes to the basket in his hands. Then: *[R]"Not yet."*

She nods. Takes the basket from him. They walk.`
        }
      }
    ]
  }
  ,
  {
    id: 'S2',
    title: { it: 'Scena 2 — La Casa', en: 'Scene 2 — The House' },
    panels: [
      { img: 'assets/storia/scena2/panel-01.jpg', text: { it: `La casa è piccola e bassa, con le travi del soffitto scurite dal fumo. Il camino è acceso. Dall'ingresso si vede tutto: il tavolo, i pagliericci nell'angolo, i mazzi di erbe appesi ad asciugare lungo la parete. L'aria odora di legna e di qualcosa che bolle.`, en: `The house is small and low, its ceiling beams darkened by smoke. The hearth is lit. From the doorway you can see everything: the table, the pallets in the corner, bunches of herbs hanging to dry along the wall. The air smells of wood and something simmering.` } },
      { img: 'assets/storia/scena2/panel-02.jpg', text: { it: `Il cesto del mercato è sul tavolo. Beatrice cucina: prende le verdure dal cesto, le taglia, le aggiunge alla pentola sul fuoco. Mescola. Aggiunge le erbe — sceglie con precisione, non a caso: tocca i mazzi appesi uno per uno, ne stacca il giusto, lo sbricola tra le dita prima di metterlo nella pentola. La cucina sa quello che fa. Non è routine: è conoscenza.`, en: `The market basket sits on the table. Beatrice cooks: she takes vegetables from the basket, chops them, adds them to the pot on the fire. Stirs. Adds the herbs — chosen with precision, not at random: she touches the hanging bunches one by one, pulls off the right one, crumbles it between her fingers before dropping it in the pot. The cooking knows what it's doing. It isn't routine: it's knowledge.` } },
      { img: 'assets/storia/scena2/panel-03.jpg', text: { it: `Un mazzo nell'angolo più in ombra lo guarda un momento più a lungo degli altri. Non lo tocca. Aggiusta solo il filo che lo tiene. Poi torna alla pentola.`, en: `One bunch in the darkest corner holds her gaze a moment longer than the others. She doesn't touch it. Only adjusts the string that holds it. Then returns to the pot.` } },
      { img: 'assets/storia/scena2/panel-04.jpg', text: { it: `Quando il pranzo è pronto, va a chiamare i bambini. Il campanellino è appeso al gancio accanto al camino — piccolo, scuro, con l'ansa consumata dal tempo. Beatrice si avvicina, lo prende. Non è un gesto meccanico: c'è qualcosa nel modo in cui lo solleva che assomiglia al modo in cui si prende in mano qualcosa di prezioso, qualcosa che è stato di altri prima e sarà di altri dopo.`, en: `When lunch is ready, she goes to call the children. The campanellino hangs on its hook beside the hearth — small, dark, its handle worn smooth by time. Beatrice steps closer, takes it. It isn't a mechanical gesture: there's something in the way she lifts it that resembles the way one holds something precious, something that belonged to others before and will belong to others after.` } },
      { img: 'assets/storia/scena2/panel-05.jpg', text: { it: `Suona il campanellino. Due volte. Il suono è breve, pulito, inconfondibile.`, en: `She rings the campanellino. Twice. The sound is short, clean, unmistakable.` } },
      { img: 'assets/storia/scena2/panel-06.jpg', text: { it: `Fuori le voci dei bambini cambiano tono di colpo. Poi i passi — veloci, sul terreno ghiacciato.

Isabella entra per prima, come sempre. Ha sette anni e corre ancora come se il peso non esistesse. Si ferma appena dentro la porta, la faccia rossa per il freddo, guarda subito Beatrice. *[I]"Cosa c'è?"* Poi annusa l'aria. *[I]"Buono."* Si siede.`, en: `Outside, the children's voices change tone at once. Then footsteps — fast, on the frozen ground.

Isabella enters first, as always. She is seven and still runs as if weight didn't exist. She stops just inside the door, face flushed from the cold, looks straight at Beatrice. *[I]"What is it?"* Then sniffs the air. *[I]"Good."* She sits down.` } },
      { img: 'assets/storia/scena2/panel-07.jpg', text: { it: `Ludovico entra un passo dopo, più composto — nove anni e già qualcosa del padre nel modo di varcare le soglie. Si avvicina al tavolo. Vede le erbe rimaste dal mercato, ne prende una tra le dita. *[L]"Questo cos'è?"*

Beatrice glielo dice — è melissa, serve per calmare lo stomaco, la usano in molte case. Lui la annusa, annuisce come se stesse archiviando l'informazione.`, en: `Ludovico enters a step behind, more composed — nine years old and already something of his father in the way he crosses a threshold. He goes to the table. Sees the herbs left from the market, picks one up between his fingers. *[L]"What's this?"*

Beatrice tells him — it's lemon balm, good for settling the stomach, used in many houses. He smells it, nods as if filing the information away.` } },
      { img: 'assets/storia/scena2/panel-08.jpg', text: { it: `Nel frattempo Beatrice torna al fuoco. Stacca dal muro il mazzo nell'angolo più in ombra — quello che prima aveva solo sistemato senza toccare. Lo sbricola tra le dita con attenzione e lo aggiunge alla pentola.

Ludovico la guarda. *[L]"E quello cos'è?"*

*"Dipende da quanto ne usi e come."* Beatrice non si gira. *"Poca, aiuta a dormire. Tanta, non ti svegli più."*

Ludovico non risponde. Guarda le mani di sua madre sulla pentola con un rispetto nuovo — non verso l'erba, verso lei.`, en: `Meanwhile Beatrice returns to the fire. She takes down the bunch from the darkest corner of the wall — the one she'd only adjusted without touching before. She crumbles it carefully between her fingers and adds it to the pot.

Ludovico watches her. *[L]"And that one?"*

*"Depends how much you use, and how."* Beatrice doesn't turn around. *"A little helps you sleep. Too much, you don't wake up."*

Ludovico doesn't answer. He watches his mother's hands on the pot with a new respect — not for the herb, for her.` } },
      { img: 'assets/storia/scena2/panel-09.jpg', text: { it: `Isabella nel frattempo ha preso il campanellino dal posto dove Beatrice lo ha rimesso e lo sta esaminando. *[I]"Era della nonna?"*

*"Sì."*

*[I]"E prima della nonna?"*

*"Prima ancora."* Beatrice sorride. *"Viene da lontano."*

Isabella lo suona una volta, piano. Ascolta il suono fino in fondo. Poi lo rimette a posto come se avesse capito che non è un giocattolo.`, en: `Meanwhile Isabella has picked up the campanellino from where Beatrice set it down and is examining it. *[I]"Was it grandmother's?"*

*"Yes."*

*[I]"And before grandmother?"*

*"Before that too."* Beatrice smiles. *"It comes from far away."*

Isabella rings it once, softly. Listens to the sound until it fades. Then puts it back as if she's understood it isn't a toy.` } },
      { img: 'assets/storia/scena2/panel-10.jpg', text: { it: `Rinaldo entra quando la minestra è già nei piatti. Ha la giacca sporca di fango — è stato fuori, qualcosa che riguarda il bando. Non lo dice. Si lava le mani, si siede.

La cena è viva. Isabella parla senza fermarsi, racconta qualcosa che è successo fuori che diventa sempre più elaborato a ogni frase. Ludovico la corregge su un dettaglio, lei lo ignora e continua. Rinaldo ascolta con la faccia di chi sta davvero ascoltando, non di chi aspetta il turno per parlare. Ride quando Isabella arriva alla parte finale, che si è chiaramente inventata.`, en: `Rinaldo comes in when the soup is already in the bowls. His coat is dirty with mud — he's been out, something to do with the proclamation. He doesn't mention it. Washes his hands, sits down.

Dinner is lively. Isabella talks without stopping, telling a story about something that happened outside, growing more elaborate with every sentence. Ludovico corrects her on a detail, she ignores him and carries on. Rinaldo listens with the face of someone truly listening, not waiting for his turn to speak. He laughs when Isabella reaches the ending, which she has clearly invented.` } },
      { img: 'assets/storia/scena2/panel-11.jpg', text: { it: `Poi Isabella si ferma, come se le fosse venuto in mente qualcosa. Guarda Rinaldo. *[I]"Papà, quando parti?"*

La tavola non si ferma — ma rallenta impercettibilmente.

Rinaldo sorride. Non è un sorriso forzato: è il sorriso di un uomo che ha deciso, in questo momento, di non far pesare niente. *[R]"Non ancora."* Poi, come se fosse la cosa più naturale del mondo: *[R]"Finisci la storia."*

Isabella ci pensa sopra un secondo, poi accetta e riprende.`, en: `Then Isabella stops, as if something has just occurred to her. She looks at Rinaldo. *[I]"Papa, when are you leaving?"*

The table doesn't stop — but it slows, almost imperceptibly.

Rinaldo smiles. It isn't a forced smile: it's the smile of a man who has decided, in this moment, not to let anything weigh on the table. *[R]"Not yet."* Then, as if it were the most natural thing in the world: *[R]"Finish the story."*

Isabella thinks it over for a second, then accepts and picks up again.` } },
      { img: 'assets/storia/scena2/panel-11b.jpg', text: { it: `Ludovico non ha detto niente. Ma ha guardato il padre per un momento — non con paura, con qualcosa di più preciso, come se stesse memorizzando qualcosa senza sapere ancora perché.`, en: `Ludovico hasn't said anything. But he looked at his father for a moment — not with fear, with something more precise, as if he were memorizing something without knowing yet why.` } },
      { img: 'assets/storia/scena2/panel-12.jpg', text: { it: `Beatrice non ha alzato gli occhi durante lo scambio. Li alza adesso, quando Isabella è già tornata alla sua storia. Incontra quelli di Rinaldo per un secondo. Lui non dice niente. Lei nemmeno.`, en: `Beatrice hasn't raised her eyes during the exchange. She raises them now, once Isabella has already returned to her story. She meets Rinaldo's for a second. He says nothing. Neither does she.` } },
      { img: 'assets/storia/scena2/panel-12b.jpg', text: { it: `Isabella finisce la storia con un finale improbabile. Tutti e tre ridono — anche Ludovico, che non rideva.

Il fuoco crepita. I piatti si svuotano. La famiglia è al tavolo insieme.`, en: `Isabella finishes the story with an improbable ending. All three laugh — even Ludovico, who hadn't been laughing.

The fire crackles. The plates empty. The family is at the table together.` } }
    ]
  },
  {
    id: 'Bridge23',
    title: { it: 'Ponte 2→3 — Otto mesi', en: 'Bridge 2→3 — Eight Months' },
    panels: [
      { img: 'assets/storia/bridge23/panel-01.jpg', text: { it: `Partì all'alba. Non portava armi — portava le mani, e quello che sapeva fare con quelle mani. Era quello che serviva.`, en: `He left at dawn. He carried no weapons — he carried his hands, and what he knew how to do with them. That was what was needed.` } },
      { img: 'assets/storia/bridge23/panel-02.jpg', text: { it: `Scrisse due volte in due mesi. Scriveva bene, come sempre — parole precise, la grafia diritta. Raccontava dei feriti, di quello che non bastava mai. Non diceva di tornare presto.`, en: `He wrote twice in two months. He wrote well, as always — precise words, straight handwriting. He told of the wounded, of what was never enough. He didn't say he'd be back soon.` } },
      { img: 'assets/storia/bridge23/panel-03.jpg', text: { it: `Quella sera la nebbia era diversa. Non scendeva — premeva. Il silenzio era così fitto da dare fastidio: aveva mangiato tutti i suoni lontani, anche quelli che di solito non si notano finché non spariscono. Il vento sbatteva le ante. I bambini non volevano dormire.`, en: `That evening the fog was different. It didn't settle — it pressed. The silence was so thick it grated: it had swallowed every distant sound, even the ones you never notice until they're gone. The wind banged the shutters. The children didn't want to sleep.` } }
    ]
  }
  ,
  {
    id: 'S3',
    title: { it: 'Scena 3 — La Notte', en: 'Scene 3 — The Night' },
    panels: [
      { img: 'assets/storia/scena3/panel-01.jpg?v=20260709d', text: { it: `Il fuoco è basso. Beatrice non l'ha alimentato — non aveva voglia di muoversi. Le ante sbattono a intervalli irregolari, sempre dalla stessa parte, ogni volta che il vento cambia direzione. Tra un colpo e l'altro il silenzio torna, ed è quel silenzio a fare più paura del colpo stesso.`, en: `The fire is low. Beatrice hasn't fed it — she hasn't felt like moving. The shutters bang at irregular intervals, always on the same side, every time the wind changes direction. Between one bang and the next the silence returns, and it's that silence that's more unsettling than the bang itself.` } },
      { img: 'assets/storia/scena3/panel-02.jpg?v=20260709d', text: { it: `Sul tavolo c'è la lettera di Rinaldo, quella lunga, già consumata dalle pieghe. Beatrice la prende. Non la legge tutta — la conosce già. Gli occhi vanno su un punto a metà pagina, dove la carta è più consumata dagli altri:

*[R]"A volte penso a quello che avrei potuto imparare, se fossi andato a Bologna come volevo. Avrei saputo fare di più, qui. Forse. O forse è tutta la stessa cosa, e le mani restano le mani."*

Rimette la lettera sul tavolo. Rimane lì dov'era, con le stesse pieghe.`, en: `On the table is Rinaldo's letter, the long one, already worn soft at the folds. Beatrice picks it up. She doesn't read all of it — she already knows it. Her eyes go to a spot halfway down the page, where the paper is more worn than the rest:

*[R]"Sometimes I think about what I might have learned, if I'd gone to Bologna like I wanted. I would have known how to do more, here. Maybe. Or maybe it's all the same thing, and hands remain hands."*

She sets the letter back on the table. It stays where it was, with the same folds.` } },
      { img: 'assets/storia/scena3/panel-03.jpg?v=20260709d', text: { it: `Neanche i bambini dormono, stanotte.

Poi dal fondo della stanza — dai pagliericci nell'angolo — un movimento.

*[I]"Non riesco a dormire."*

Isabella. Voce sveglia, non assonnata — è sveglia da un pezzo.

Beatrice si avvicina. Ludovico è sveglio anche lui, seduto, le ginocchia al petto. Non ha detto niente ma è lì.`, en: `Not even the children are asleep, tonight.

Then from the far end of the room — from the pallets in the corner — movement.

*[I]"I can't sleep."*

Isabella. Her voice awake, not drowsy — she's been awake for a while.

Beatrice comes closer. Ludovico is awake too, sitting up, knees to his chest. He hasn't said anything, but he's there.` } },
      { img: 'assets/storia/scena3/panel-04.jpg?v=20260709d', text: { it: `Isabella vuole sapere quando torna il padre. Beatrice risponde che non lo sa — presto, spera. Isabella non si accontenta: *[I]"Ma ha detto qualcosa?"* Beatrice dice che ha scritto. Isabella chiede cosa ha scritto. Beatrice dice: *"Che va bene."*

Un momento di silenzio.

Poi Ludovico, piano, senza alzare gli occhi dal fuoco: *[L]"Non è vero."*

Beatrice lo guarda.

*[L]"Non ha detto che va bene. L'hai già letta così tante volte che sai cosa dice e cosa non dice."*`, en: `Isabella wants to know when their father is coming back. Beatrice says she doesn't know — soon, she hopes. Isabella isn't satisfied: *[I]"But did he say something?"* Beatrice says he wrote. Isabella asks what he wrote. Beatrice says: *"That things are fine."*

A moment of silence.

Then Ludovico, quietly, without raising his eyes from the fire: *[L]"That's not true."*

Beatrice looks at him.

*[L]"He didn't say things are fine. You've read it so many times already, you know what it says and what it doesn't."*` } },
      { img: 'assets/storia/scena3/panel-05.jpg?v=20260709d', text: { it: `Beatrice non risponde. È vero, e lui lo sa, e lei sa che lui lo sa.

Isabella li guarda tutti e due. Poi si sdraia, tira la coperta. Non chiede altro.`, en: `Beatrice doesn't answer. It's true, and he knows it, and she knows that he knows.

Isabella looks at them both. Then she lies down, pulls up the blanket. She doesn't ask anything else.` } },
      { img: 'assets/storia/scena3/panel-06.jpg?v=20260709d', text: { it: `Beatrice si alza, va verso il camino a preparare una tisana per farli dormire. Accanto alla finestra della cucina c'è la mensola con i barattoli — le polveri, le foglie secche, le miscele. Le sue mani si muovono con la stessa precisione di sempre. La luce è bassa, la candela quasi finita.`, en: `Beatrice gets up, goes to the hearth to prepare a tisane to help them sleep. Beside the kitchen window is the shelf with the jars — the powders, the dried leaves, the blends. Her hands move with their usual precision. The light is low, the candle nearly spent.` } },
      { img: 'assets/storia/scena3/panel-07.jpg?v=20260709d', text: { it: `Poi dal fondo della casa — dalla stanza dei bambini — un colpo secco, forte. Un'anta che sbatte contro il muro. E subito dopo: Isabella.

Beatrice lascia la pentola sul fuoco e raggiunge la stanza. La finestra dei bambini è aperta — il vento ha forzato il gancio. Isabella è seduta sul pagliericcio, la faccia spaventata.`, en: `Then from the far end of the house — from the children's room — a sharp, loud impact. A shutter slamming against the wall. And right after: Isabella.

Beatrice leaves the pot on the fire and reaches the room. The children's window is open — the wind has forced the latch. Isabella is sitting on the pallet, her face frightened.` } },
      { img: 'assets/storia/scena3/panel-08.jpg?v=20260709d', text: { it: `Beatrice chiude la finestra. Fissa bene il gancio. Si siede un momento accanto a Isabella, le appoggia una mano sulla testa.

*"Non è successo niente, piccola. Ora la mamma vi dà qualcosa per rilassarvi e dormire meglio."*

Isabella annuisce. Ludovico non ha detto niente — era già mezzo addormentato, o faceva finta di esserlo.`, en: `Beatrice closes the window. Secures the latch firmly. Sits for a moment beside Isabella, rests a hand on her head.

*"Nothing happened, little one. Now mama's going to give you something to help you relax and sleep better."*

Isabella nods. Ludovico hasn't said anything — he was already half asleep, or pretending to be.` } },
      { img: 'assets/storia/scena3/panel-09.jpg?v=20260709d', text: { it: `Nella cucina, intanto, la pentola continua a scaldarsi sul fuoco, il vapore che sale. Nell'angolo in ombra, appeso al chiodo più alto, c'è il mazzo che Beatrice aveva messo lì mesi fa — lo stesso che Ludovico aveva guardato, allora, quando era ancora verde e fresco da seccare. Adesso è rinsecchito. I rametti sono fragili, le foglie ridotte quasi a niente.`, en: `In the kitchen, meanwhile, the pot keeps warming over the fire, steam rising. In the shadowed corner, hanging from the highest nail, is the bunch Beatrice put there months ago — the same one Ludovico had watched, back then, when it was still green and fresh to dry. Now it's withered. The twigs are brittle, the leaves reduced to almost nothing.` } },
      { img: 'assets/storia/scena3/panel-10.jpg?v=20260709d', text: { it: `La finestra della cucina si muove — piano, come spinta da fuori. Il gancio non era chiuso bene, o qualcosa preme dall'esterno. Si apre di un palmo.

La nebbia entra. Non si diffonde — preme. Uno sbuffo denso, diretto, come se avesse una direzione.

Raggiunge il mazzo nell'angolo. Le foglie secche si staccano — silenziosamente, come fanno le cose rinsecchite quando arriva il vento. Alcune cadono a terra. Alcune nell'aria. Alcune nella pentola.

La superficie dell'acqua si increspa appena, poi torna ferma. Non lascia traccia.

La nebbia si ritrae dalla finestra. La forma di come si ritira — il profilo, nell'ultimo istante, se era un profilo — potrebbe essere qualcosa. Potrebbe non essere niente. È nebbia.

Il mazzo è ancora al chiodo. Le foglie rimaste oscillano ancora un poco, poi si fermano.

Beatrice torna in cucina. La finestra è socchiusa — il vento, pensa. La chiude. Il mazzo nell'angolo è ancora al suo posto, un po' più spoglio di prima. Beatrice non lo guarda. Non vede niente di diverso da come l'ha lasciato.`, en: `The kitchen window moves — slowly, as if pushed from outside. The latch wasn't quite closed, or something is pressing from outside. It opens a hand's width.

The fog comes in. It doesn't spread — it presses. A dense gust, direct, as if it had a direction.

It reaches the bunch in the corner. The dry leaves come loose — silently, the way withered things do when the wind arrives. Some fall to the floor. Some into the air. Some into the pot.

The surface of the water ripples slightly, then stills. It leaves no trace.

The fog withdraws from the window. The shape it makes as it pulls back — the outline, in that last instant, if it was an outline — could be something. Could be nothing. It's fog.

The bunch is still on the nail. The remaining leaves sway a little longer, then stop.

Beatrice comes back to the kitchen. The window is ajar — the wind, she thinks. She closes it. The bunch in the corner is still in its place, a little barer than before. Beatrice doesn't look at it. She sees nothing different from how she left it.` } },
      { img: 'assets/storia/scena3/panel-10b.jpg?v=20260709d', text: { it: `Torna alla pentola. Mescola. Aspetta che il colore cambi. Poi versa il liquido caldo in due tazze di legno, una per Isabella, una per Ludovico — lo stesso gesto di sempre, tranquillo, quasi meccanico.`, en: `She goes back to the pot. Stirs. Waits for the color to change. Then pours the hot liquid into two wooden cups, one for Isabella, one for Ludovico — the same gesture as always, calm, almost mechanical.` } },
      { img: 'assets/storia/scena3/panel-11.jpg?v=20260709d', text: { it: `Porta le due tazze ai bambini — prima a Isabella, poi a Ludovico. I bambini bevono in silenzio. Nessuno dei due protesta — la tisana è calda, la notte è fredda, sono stanchi anche loro.

Beatrice si siede sul bordo del pagliericcio. Aspetta che il calore si faccia sentire. Poi, come ha sempre fatto, comincia a cantare — piano, quasi sottovoce, la stessa ninna nanna che ha sempre cantato loro, che sentiva cantare da piccola, che Rinaldo conosce anche lui perché da queste parti la conoscono tutti:

*"Ninna nanna, la Borda*
*lega i bei bambini con la corda.*
*Con la corda e con il laccio*
*porta via chi fa chiasso.*
*Dormi, dormi, piccolin,*
*svegliati sano al mattìn."*

Isabella chiude gli occhi a metà canzone. Ludovico resiste un poco di più — poi anche lui.

Beatrice rimane seduta ancora un momento. Li guarda. Poi si alza, torna nella stanza principale.`, en: `She brings the two cups to the children — first Isabella, then Ludovico. The children drink in silence. Neither protests — the tisane is warm, the night is cold, they're tired too.

Beatrice sits on the edge of the pallet. Waits for the warmth to take hold. Then, as she has always done, she starts to sing — softly, almost under her breath, the same lullaby she has always sung them, that she heard sung as a child, that Rinaldo knows too because everyone around here knows it:

*"Hush now, hush now, the Borda*
*binds the pretty children with her cord.*
*With the cord and with the snare*
*she carries off whoever makes a racket.*
*Sleep, sleep, little one,*
*wake up well in the morning sun."*

Isabella closes her eyes halfway through the song. Ludovico holds out a little longer — then he too.

Beatrice stays seated a moment longer. Watches them. Then gets up, returns to the main room.` } },
      { img: 'assets/storia/scena3/panel-12.jpg?v=20260709d', text: { it: `Prima di sedersi, prende dalla mensola una candela nuova — più lunga delle altre, quasi intera — e un piccolo chiodo di ferro. Lo infila di traverso nella cera, a un'altezza precisa. Un'usanza che le aveva insegnato sua nonna: quando la fiamma arriva al chiodo, il metallo cade sul piattino di stagno sottostante — un tintinnio secco, abbastanza per svegliare chi dorme leggero. Non le serve per sapere se si sono addormentati — li ha appena visti chiudere gli occhi. Le serve per non lasciarsi andare troppo, non stanotte: vuole un altro momento per accertarsi che tutto sia ancora tranquillo, prima di potersi coricare anche lei.

Pianta la candela. Si siede vicino al fuoco. Il fuoco è quasi spento — non ha voglia di alimentarlo. Le ante non sbattono più. Il vento si è fermato, o la notte si è fermata, non sa.`, en: `Before sitting down, she takes a new candle from the shelf — longer than the others, almost whole — and a small iron nail. She pushes it crosswise into the wax, at a precise height. A custom her grandmother taught her: when the flame reaches the nail, the metal drops onto the tin plate below — a sharp little chime, enough to wake a light sleeper. She doesn't need it to know if they've fallen asleep — she just watched them close their eyes. She needs it so she doesn't let herself drift too far, not tonight: she wants one more moment to make sure everything is still quiet, before she can lie down herself.

She plants the candle. Sits by the fire. The fire is nearly out — she doesn't feel like feeding it. The shutters have stopped banging. The wind has stopped, or the night has stopped, she doesn't know.` } },
      { img: 'assets/storia/scena3/panel-12b.jpg', text: { it: `Prima di chiudere gli occhi, prende il diario dal cassetto accanto al focolare — lo stesso che tiene da anni, la copertina di cuoio scuro consumata agli angoli. Scrive al lume della candela, veloce, la grafia piccola e ferma di sempre.

*Ho riletto la lettera di Rinaldo, stanotte. Mi manca più di quanto vorrei ammettere, anche a queste pagine.*

*I bambini non riuscivano a dormire. Da settimane è così — Isabella si sveglia, Ludovico non dorme. Ho sentito di nuovo qualcosa fuori stanotte, oltre il muro. Non il vento.*

*Ho preparato il solito. Sedano, la proporzione che uso sempre per loro. Li ho fatti bere. Li ho visti addormentarsi.*

*Ho cantato la ninna nanna di mia nonna. Non so perché — è venuta fuori da sola.*

Richiude il diario. Lo rimette nel cassetto. Chiude gli occhi.`, en: `Before closing her eyes, she takes the diary from the drawer beside the hearth — the same one she's kept for years, its dark leather cover worn at the corners. She writes by candlelight, quickly, in the same small, steady hand as always.

*I reread Rinaldo's letter, tonight. I miss him more than I'd like to admit, even to these pages.*

*The children couldn't sleep. It's been like this for weeks — Isabella wakes up, Ludovico doesn't sleep. I heard something outside again tonight, beyond the wall. Not the wind.*

*I made the usual. Celery, the proportion I always use for them. I made them drink it. I watched them fall asleep.*

*I sang my grandmother's lullaby. I don't know why — it just came out on its own.*

She closes the diary. Puts it back in the drawer. Closes her eyes.` } },
      { img: 'assets/storia/scena3/panel-13.jpg?v=20260709d', text: { it: `Il tempo passa. Buio.

Un tintinnio metallico, secco, improvviso. Il chiodo è caduto sul piattino, esattamente come doveva.

Beatrice apre gli occhi di scatto, la testa ancora pesante di sonno. Il fuoco è quasi cenere. Non sa quante ore siano passate.

Si alza. Si muove verso la stanza dei bambini.`, en: `Time passes. Darkness.

A metallic chime, sharp, sudden. The nail has fallen onto the plate, exactly as it should.

Beatrice's eyes snap open, her head still heavy with sleep. The fire is nearly ash. She doesn't know how many hours have passed.

She gets up. Moves toward the children's room.` } }
    ]
  }
  ,
  {
    id: 'S4',
    title: { it: 'Scena 4 — Quello che Resta', en: 'Scene 4 — What Remains' },
    panels: [
      { img: 'assets/storia/scena4/panel-01.jpg', text: { it: `Beatrice entra nella stanza dei bambini. La candela che tiene in mano trema — non per il vento, per la sua mano.

I due pagliericci. Ludovico e Isabella, immobili, come li aveva lasciati poche ore prima. Troppo immobili.`, en: `Beatrice enters the children's room. The candle in her hand trembles — not from the wind, from her hand.

The two pallets. Ludovico and Isabella, motionless, just as she had left them a few hours before. Too motionless.` } },
      { img: 'assets/storia/scena4/panel-02.jpg', text: { it: `Si inginocchia. Tocca Ludovico. Poi Isabella.

Non c'è calore. Non c'è respiro.`, en: `She kneels. Touches Ludovico. Then Isabella.

No warmth. No breath.` } },
      { img: 'assets/storia/scena4/panel-03.jpg', text: { it: `Beatrice non urla. Non subito. Rimane immobile un tempo che non sa misurare —`, en: `Beatrice doesn't scream. Not at first. She stays motionless for a length of time she can't measure —` } },
      { img: 'assets/storia/scena4/panel-03b.jpg', text: { it: `Poi qualcosa in lei si rompe e si alza di scatto, la candela le cade dalle mani, si spegne.`, en: `Then something in her breaks and she jerks upright, the candle falls from her hands, goes out.` } },
      { img: 'assets/storia/scena4/panel-04.jpg', text: { it: `Esce di corsa nella notte, nella nebbia, verso la casa del medico, la voce che si assottiglia via via che si allontana, a chiamare aiuto.`, en: `She runs out into the night, into the fog, toward the doctor's house, her voice thinning as it grows distant, calling for help.` } },
      { img: 'assets/storia/scena4/panel-05.jpg', text: { it: `La casa resta vuota. Sul fuoco, la pentola. Nell'aria immobile della cucina, qualcosa che assomiglia a un soffio di vento passa dietro le pareti, fuori tempo rispetto a qualunque folata reale — e poi una risata sommessa, appena percettibile, e un respiro pesante, troppo vicino perché in quella stanza non ci sia nessuno. Non si vede niente. C'è solo il sospetto che qualcosa sia entrato mentre la casa era vuota. Il suono si placa quando fuori cominciano a crescere le luci di lanterna e le voci che si avvicinano.

Beatrice rientra in casa, il medico e il capovillaggio dietro di lei, con le lanterne. Lei li ha svegliati, li ha trascinati fin lì a metà notte, terrorizzata, incoerente — *"i miei figli, i miei figli, venite, fate presto"* — e loro l'hanno seguita senza capire bene cosa aspettarsi.`, en: `The house stays empty. On the fire, the pot. In the still air of the kitchen, something like a gust of wind passes behind the walls, out of step with any real draft — and then a low laugh, barely perceptible, and a heavy breath, too close for there to be no one in that room. Nothing can be seen. There's only the suspicion that something came in while the house was empty. The sound settles as, outside, lantern light and approaching voices begin to grow.

Beatrice comes back into the house, the doctor and the village headman behind her, with lanterns. She woke them, dragged them there in the middle of the night, terrified, incoherent — *"my children, my children, come, hurry"* — and they followed her without quite understanding what to expect.` } },
      { img: 'assets/storia/scena4/panel-06.jpg', text: { it: `Entrano nella stanza dei bambini.

I pagliericci sono vuoti.

Non ci sono corpi. Non c'è sangue. Non c'è segno di lotta. Le coperte sono ancora nella forma di chi le aveva lasciate — come se qualcuno si fosse semplicemente sollevato e fosse svanito, senza scomporre nulla attorno a sé.`, en: `They enter the children's room.

The pallets are empty.

No bodies. No blood. No sign of a struggle. The blankets are still in the shape of whoever left them — as if someone had simply risen and vanished, without disturbing anything around them.` } },
      { img: 'assets/storia/scena4/panel-07.jpg', text: { it: `Beatrice si blocca sulla soglia. Non capisce quello che vede — o meglio, quello che non vede.

*"Erano qui. Erano qui, li ho toccati, erano—"*

Non finisce la frase.

Il capovillaggio guarda i pagliericci vuoti, poi guarda Beatrice, in silenzio, senza sapere cosa dire.`, en: `Beatrice freezes in the doorway. She doesn't understand what she's seeing — or rather, what she isn't seeing.

*"They were here. They were here, I touched them, they were—"*

She doesn't finish the sentence.

The village headman looks at the empty pallets, then looks at Beatrice, in silence, not knowing what to say.` } },
      { img: 'assets/storia/scena4/panel-08.jpg', text: { it: `Il medico non guarda i pagliericci. Guarda il tavolo della cucina — il mazzo di erbe rinsecchito appeso al chiodo più alto, e accanto, sul piano, qualche fogliolina caduta che lui riconosce a colpo d'occhio, per mestiere. Cicuta.`, en: `The doctor isn't looking at the pallets. He's looking at the kitchen table — the withered bunch of herbs hanging from the highest nail, and beside it, on the counter, a few fallen leaves he recognizes at a glance, by trade. Hemlock.` } },
      { img: 'assets/storia/scena4/panel-09.jpg', text: { it: `*[M]"Cos'hai dato ai tuoi figli?"*

Beatrice lo guarda, senza capire subito la domanda dietro la domanda.

*[M]"Cosa gli hai dato, stanotte?"*

*"Solo... solo la tisana di sempre. Per farli dormire—"*

Il medico non dice altro. Non deve. La sua espressione è già un verdetto.`, en: `*[M]"What did you give your children?"*

Beatrice looks at him, not immediately understanding the question behind the question.

*[M]"What did you give them, tonight?"*

*"Just... just the usual tisane. To help them sleep—"*

The doctor says nothing more. He doesn't need to. His expression is already a verdict.` } },
      { img: 'assets/storia/scena4/panel-10.jpg', text: { it: `*"Non sono stata io."* La voce di Beatrice si rompe. *"Dovete credermi. Io amo i miei figli. Qualcuno li ha portati via — qualcuno è entrato, io non—"*

Nessuno dei due le risponde subito.

Il capovillaggio è il primo a riprendersi da quel silenzio.

Guarda ancora una volta i pagliericci vuoti, poi il mazzo di cicuta sul tavolo, poi Beatrice. Quando parla, la voce è bassa e ferma — la voce di chi ha già deciso qualcosa e lo sta solo comunicando.`, en: `*"It wasn't me."* Beatrice's voice breaks. *"You have to believe me. I love my children. Someone took them — someone came in, I didn't—"*

Neither of them answers right away.

The village headman is the first to recover from that silence.

He looks once more at the empty pallets, then at the bunch of hemlock on the table, then at Beatrice. When he speaks, his voice is low and firm — the voice of someone who has already decided something and is only announcing it.` } },
      { img: 'assets/storia/scena4/panel-11.jpg', text: { it: `*[C]"Portatela via."*

Non lo dice a Beatrice. Lo dice a due uomini rimasti sulla soglia, dietro di lui, che fino a quel momento nessuno aveva notato.

Beatrice indietreggia di un passo, poi si ferma — non c'è dove andare.

*"Non ho fatto niente. Non ho fatto niente, ve lo giuro, i miei figli—"*

Gli uomini la prendono per le braccia. Non con violenza — con la fermezza pratica di chi ha già fatto questo lavoro altre volte e sa esattamente quanta forza serve, non una di più.

Beatrice non si divincola. Per un istante sembra che voglia farlo, poi qualcosa in lei cede — non è resa, è il corpo che smette di credere che valga la pena lottare in quella stanza, in quel momento, contro quelle due mani.`, en: `*[C]"Take her away."*

He doesn't say it to Beatrice. He says it to two men left in the doorway, behind him, whom no one had noticed until that moment.

Beatrice steps back, then stops — there's nowhere to go.

*"I didn't do anything. I didn't do anything, I swear it, my children—"*

The men take her by the arms. Not with violence — with the practical firmness of those who've done this work before and know exactly how much force is needed, not a grain more.

Beatrice doesn't struggle. For a moment she seems about to, then something in her gives way — it isn't surrender, it's the body giving up on believing it's worth fighting, in that room, in that moment, against those two hands.` } },
      { img: 'assets/storia/scena4/panel-12.jpg', text: { it: `La trascinano fuori, verso la nebbia e il freddo. L'ultima cosa che si vede di lei, prima che la porta le chiuda dietro le spalle, è lo sguardo che getta indietro — non verso il medico, non verso il capovillaggio. Verso i pagliericci vuoti.

La porta, lasciata andare da chi è uscito per ultimo, oscilla un istante nel vento gelido — poi si richiude di scatto. Un tonfo secco, pieno, riempie la stanza vuota.`, en: `They drag her outside, toward the fog and the cold. The last glimpse of her, before the door closes behind her, is the look she throws back — not at the doctor, not at the headman. At the empty pallets.

The door, let go by the last one out, swings for an instant in the freezing wind — then slams shut. A sharp, full thud fills the empty room.` } }
    ]
  }
  ,
  {
    id: 'S5',
    title: { it: 'Scena 5 — Il Ritorno', en: 'Scene 5 — The Return' },
    panels: [
      { img: 'assets/storia/scena5/panel-01.jpg', text: { it: `Il foglio del congedo è ripiegato in tre, in fondo al sacco, insieme al resto. Rinaldo non l'ha più guardato da quando gliel'hanno messo in mano.

In mano tiene altro: l'ultima lettera di Beatrice, la carta ormai morbida ai bordi per quante volte l'ha aperta e richiusa in questi mesi. Non la sta leggendo — la conosce a memoria, riga per riga — la tiene solo stretta, come si tiene qualcosa per sentirne il peso.

Un carrettiere diretto a nord lo ha caricato in cambio di due monete e un po' di compagnia. Rinaldo siede dietro, tra sacchi di grano e attrezzi, la lettera ancora in mano, e guarda la strada srotolarsi lenta tra i solchi lasciati dall'inverno.`, en: `The discharge paper is folded in three, at the bottom of the sack, with the rest. Rinaldo hasn't looked at it again since they put it in his hand.

What he holds instead is Beatrice's last letter, the paper gone soft at the edges from how many times he's opened and folded it these past months. He isn't reading it — he knows it by heart, line by line — he just holds it, the way you hold something to feel its weight.

A carter heading north took him on in exchange for two coins and some company. Rinaldo sits in the back, among sacks of grain and tools, the letter still in hand, watching the road unroll slowly between the ruts winter left behind.` } },
      { img: 'assets/storia/scena5/panel-02.jpg', text: { it: `Pensa a maggio. Maggio in Romagna è il mese più lungo dell'anno, nel senso buono — le giornate durano fino a tardi, l'aria è ancora fresca al mattino ma il sole arriva quasi subito, e c'è sempre qualcosa da fare, non nel senso pesante dell'autunno: nel senso vivo di quando tutto cresce insieme e basta stargli dietro.

Pensa all'orto — ai trapianti che avrebbe dovuto fare lui ad aprile, al basilico nei vasi sotto la finestra del laboratorio, alla mezza ombra del salice che Beatrice sapeva calibrare a memoria. Pensa alla panchina che ha costruito sotto quel salice, larga per due. Pensa all'altalena appesa ai rami più bassi, alle due corde e l'asse levigata per Isabella.

Pensa a Ludovico — se lo immagina seduto sul muretto, le braccia conserte, ad aspettare senza venirgli incontro, nel modo in cui aspetta lui. Pensa a Isabella — se la immagina correre, cominciare a parlare prima ancora di arrivargli vicino, le domande su tutto, sui soldati, sui cavalli, sui posti che ha visto.

Sta pensando a cosa raccontare per primo quando sente, nella memoria, il suono del campanellino — il tintinnio secco, due o tre volte, che Beatrice usava per chiamare a tavola. *Smettila con tutto il resto, vieni, è pronto, siamo qui.*

Chiude gli occhi un momento. Il carretto continua a muoversi verso nord.`, en: `He thinks of May. May in Romagna is the longest month of the year, in the good sense — the days last late, the air is still cool in the morning but the sun arrives almost at once, and there's always something to do, not in autumn's heavy sense: in the living sense of when everything grows together and you just have to keep up.

He thinks of the garden — the transplanting he should have done in April, the basil in the pots under the workshop window, the willow's half-shade that Beatrice knew how to gauge by heart. He thinks of the bench he built under that willow, wide enough for two. He thinks of the swing hanging from the lower branches, the two ropes and the smoothed board for Isabella.

He thinks of Ludovico — pictures him sitting on the low wall, arms crossed, waiting without coming to meet him, the way he waits. He thinks of Isabella — pictures her running, starting to talk before she's even close, questions about everything, about the soldiers, the horses, the places he's seen.

He's thinking about what to tell first when he hears, in memory, the sound of the campanellino — the short chime, two or three times, that Beatrice used to call them to the table. *Stop whatever else you're doing, come, it's ready, we're here.*

He closes his eyes for a moment. The cart keeps moving north.` } },
      { img: 'assets/storia/scena5/panel-03.jpg', text: { it: `Il carrettiere lo lascia a un bivio, dove la strada di pianura comincia a salire verso una piccola altura. *"Eccoci arrivati"*, dice. *"Io giro qui."*

Rinaldo scende, si carica il sacco in spalla, e sale l'ultimo tratto a piedi.`, en: `The carter drops him at a fork, where the flat road begins climbing toward a low rise. *"Here we are,"* he says. *"I turn off here."*

Rinaldo gets down, hoists the sack onto his shoulder, and climbs the last stretch on foot.` } },
      { img: 'assets/storia/scena5/panel-04.jpg', text: { it: `Dalla sommità vede il villaggio in basso — i tetti, il campanile, un velo di nebbia bassa che si muove appena sopra i campi. Da lì sembra lo stesso posto che ha lasciato otto mesi prima.`, en: `From the top he sees the village below — the roofs, the bell tower, a veil of low fog barely moving above the fields. From up here it looks like the same place he left eight months before.` } },
      { img: 'assets/storia/scena5/panel-05.jpg', text: { it: `Un sentiero scende dal crinale verso l'abitato. Il villaggio si allarga man mano che il sentiero scende. Da vicino, non è più lo stesso posto.

Non è una cosa che si può indicare con un dito. È la qualità dell'aria — quel modo in cui i posti che si conoscono hanno un tono preciso, riconoscibile, e quando il tono è cambiato lo si sente prima di capirlo. Il villaggio ha sempre avuto una sua cadenza: i rumori del pomeriggio, i bambini nel vicolo, le voci delle donne agli usci. Adesso c'è silenzio dove non dovrebbe esserci silenzio.`, en: `A path descends from the ridge toward the village. The village widens as the path drops. Up close, it's no longer the same place.

It isn't something you can point to. It's the quality of the air — the way places you know have a precise, recognizable tone, and when the tone has changed you feel it before you understand it. The village always had its own cadence: the afternoon noises, children in the lane, women's voices at the doorways. Now there's silence where there shouldn't be silence.` } },
      { img: 'assets/storia/scena5/panel-06.jpg', text: { it: `Un paio di persone lo vedono attraversare la strada principale. Non lo salutano. Non distolgono nemmeno lo sguardo — lo guardano un momento con l'espressione precisa di chi sa qualcosa che non sa come dire, poi abbassano gli occhi.`, en: `A couple of people see him cross the main street. They don't greet him. They don't even look away — they watch him a moment with the precise expression of someone who knows something they don't know how to say, then lower their eyes.` } },
      { img: 'assets/storia/scena5/panel-07.jpg', text: { it: `Rinaldo arriva a casa sua e non riconosce la porta.

Non la porta in sé — è la stessa, lo stesso legno scurito, lo stesso chiavistello. È quello che c'è sopra: un sigillo di cera rossa, con l'impronta del capovillaggio, e sotto, scritto con una mano che non è la sua né quella di Beatrice, il nome del provvedimento e una data.

Aprile.

Prova il chiavistello. Non cede. Gira intorno alla casa — l'orto è ancora lì, alcune piante cresciute troppo perché nessuno le ha curate. Nessun segno di vita. Nessun suono da dentro.`, en: `Rinaldo reaches his house and doesn't recognize the door.

Not the door itself — it's the same, the same darkened wood, the same latch. It's what's on it: a seal of red wax, stamped with the headman's mark, and below, written in a hand that is neither his nor Beatrice's, the name of the order and a date.

April.

He tries the latch. It doesn't give. He walks around the house — the garden is still there, some plants grown too tall because no one has tended them. No sign of life. No sound from inside.` } },
      { img: 'assets/storia/scena5/panel-08.jpg', text: { it: `Il fabbro lo trova prima che sia lui a cercarlo — o forse è il contrario. Rinaldo non lo ricorderà con chiarezza.

L'uomo lo guarda per un momento lungo, poi dice quello che c'è da dire, senza girarci intorno, perché è fatto così.

*[F]"I tuoi figli sono spariti in gennaio. Nessuno li ha più trovati."*`, en: `The blacksmith finds him before he can go looking — or maybe it's the other way around. Rinaldo won't remember clearly.

The man looks at him for a long moment, then says what needs saying, without dancing around it, because that's how he's made.

*[F]"Your children disappeared in January. No one has found them since."*` } },
      { img: 'assets/storia/scena5/panel-09.jpg', text: { it: `Per un istante Rinaldo non capisce — o capisce, ma il corpo rifiuta di crederci prima della testa. Poi si muove, un passo verso il fabbro, gli afferra il braccio, la voce che sale, spezzata:

*[R]"Dove sono? Dove sono i miei figli — e Beatrice, dov'è Beatrice, dov'è—"*

Non aspetta la risposta prima della domanda successiva.

*[R]"Parla. Parla!"*`, en: `For an instant Rinaldo doesn't understand — or he understands, but his body refuses to believe it before his mind does. Then he moves, a step toward the blacksmith, grips his arm, his voice rising, breaking:

*[R]"Where are they? Where are my children — and Beatrice, where's Beatrice, where—"*

He doesn't wait for an answer before the next question.

*[R]"Talk. Talk!"*` } },
      { img: 'assets/storia/scena5/panel-10.jpg', text: { it: `Il fabbro non si scosta, non gli toglie il braccio di dosso. Aspetta solo che finisca, poi dice il resto — perché a quel punto non può più fermarsi a metà:

*[F]"Beatrice è stata giudicata colpevole. L'hanno bruciata ad aprile."*

Rinaldo si ferma di colpo, come se qualcosa gli avesse tagliato il fiato a metà di un respiro.

La presa sul braccio del fabbro si allenta da sola.

Non risponde. Non subito. Non per molto tempo.`, en: `The blacksmith doesn't pull away, doesn't shake off his arm. He only waits for him to finish, then says the rest — because at this point he can't stop halfway:

*[F]"Beatrice was found guilty. They burned her in April."*

Rinaldo stops dead, as if something had cut his breath in half.

His grip on the blacksmith's arm loosens on its own.

He doesn't answer. Not right away. Not for a long time.` } }
    ]
  }
  ,
  {
    id: 'S6',
    title: { it: 'Scena 6 — Il Fabbro', en: 'Scene 6 — The Blacksmith' },
    panels: [
      { img: 'assets/storia/scena6/panel-01.jpg', text: { it: `Rinaldo non lascia il braccio del fabbro finché non si accorge di tenerlo ancora stretto. Lo lascia andare. Non si scusa.

Le domande arrivano una dietro l'altra, più calme di come sarebbe lecito aspettarsi da un uomo che ha appena smesso di urlare — come se una parte di lui avesse già deciso che urlare non serve a niente, e l'altra parte non sapesse ancora cos'altro fare.

*[R]"Cosa è successo, quella notte?"*

Il fabbro scuote la testa. *[F]"Quello che sappiamo lo sappiamo tutti allo stesso modo — niente di diretto. Spariti dai pagliericci. Nessun segno di lotta, nessuna traccia fuori."* Una pausa. *[F]"Hanno cercato nei campi, lungo i canali, per giorni. Con questa nebbia..."* Non finisce la frase. Non serve.

*[R]"Perché l'hanno condannata?"*

*[F]"Il medico ha trovato la cicuta sul tavolo."* Il fabbro abbassa la voce, come se la domanda gli costasse qualcosa. *[F]"Qualcuno doveva rispondere — la gente aveva paura da mesi, e la paura vuole un nome, non una spiegazione."* Poi, più piano ancora: *[F]"Io non ero convinto come gli altri. Ma non è bastato."*

Rinaldo lo guarda un momento. *[R]"Secondo te è stata lei?"*

Il fabbro non risponde subito. *[F]"Non lo so."* Poi, più duro: *[F]"E nemmeno loro lo sapevano, per come la vedo io — avevano solo bisogno che qualcuno pagasse."* Una pausa più lunga. *[F]"Beatrice ha guarito metà di questo villaggio. Non riesco a mettere quella donna vicino a quello che dicono abbia fatto."* Distoglie lo sguardo. *[F]"Ma non ero nella stanza, quella notte. Nessuno di noi c'era."*`, en: `Rinaldo doesn't let go of the blacksmith's arm until he realizes he's still gripping it. He releases it. He doesn't apologize.

The questions come one after another, calmer than you'd expect from a man who has just stopped shouting — as if part of him has already decided that shouting is useless, and the other part doesn't yet know what else to do.

*[R]"What happened, that night?"*

The blacksmith shakes his head. *[F]"What we know, we all know the same way — nothing direct. Gone from their pallets. No sign of a struggle, no trace outside."* A pause. *[F]"They searched the fields, along the canals, for days. With this fog..."* He doesn't finish the sentence. He doesn't need to.

*[R]"Why did they condemn her?"*

*[F]"The doctor found the hemlock on the table."* The blacksmith lowers his voice, as if the question costs him something. *[F]"Someone had to answer for it — people had been afraid for months, and fear wants a name, not an explanation."* Then, even quieter: *[F]"I wasn't as convinced as the others. But it wasn't enough."*

Rinaldo looks at him a moment. *[R]"Do you think it was her?"*

The blacksmith doesn't answer right away. *[F]"I don't know."* Then, harder: *[F]"And neither did they, the way I see it — they just needed someone to pay."* A longer pause. *[F]"Beatrice healed half this village. I can't put that woman next to what they say she did."* He looks away. *[F]"But I wasn't in the room, that night. None of us were."*` } },
      { img: 'assets/storia/scena6/panel-02.jpg', text: { it: `Qualcosa in Rinaldo si tende. *[R]"Come hai potuto lasciare che accadesse?"*

Il fabbro incassa il colpo senza muoversi. *[F]"Lasciare?"* La voce scende ancora. *[F]"Tu non c'eri. Io c'ero."* Un silenzio che pesa più delle parole che non dice. *[F]"Non è stato facile per nessuno guardare, Rinaldo. Non per tutti, almeno."*

Rinaldo non insiste. C'è un limite a quanto può ancora reggere in una sola mattina, e lo ha già superato due volte.

*[R]"E la casa? Posso entrarci?"*

*[F]"Sigillata, dal giorno della condanna."* Il fabbro guarda verso la fine della strada. *[F]"Cera e ordine del capovillaggio — solo lui ha la chiave, solo lui può romperlo."*

*[R]"Sai se adesso è in casa?"*

*[F]"Dovrebbe, a quest'ora."* Il fabbro gli posa una mano sulla spalla — breve, pesante. *[F]"Vai. Io gli dico che sei arrivato."*

Rinaldo fa per andare. Si ferma.

*[R]"Perché sei stato tu a dirmelo?"*

Il fabbro ci pensa un momento, come se non si fosse mai fatto la domanda fino a ora. *[F]"Perché qualcuno doveva, e nessun altro si è fatto avanti."* Una pausa. *[F]"Voi due eravate... non lo so come dirlo."* Guarda la propria mano, la apre e la richiude. *[F]"Beatrice mi ha aggiustato questa, due inverni fa, quando il medico diceva di tagliarla. Non l'ho dimenticato."*

Non aggiunge altro. Non serve.

Rinaldo annuisce — un gesto piccolo, quasi automatico — e si incammina verso la fine della strada.`, en: `Something in Rinaldo tightens. *[R]"How could you let it happen?"*

The blacksmith takes the blow without moving. *[F]"Let it?"* His voice drops further. *[F]"You weren't there. I was."* A silence that weighs more than the words he doesn't say. *[F]"It wasn't easy for anyone to watch, Rinaldo. Not for everyone, at least."*

Rinaldo doesn't push further. There's a limit to how much he can still take in a single morning, and he's already crossed it twice.

*[R]"And the house? Can I go in?"*

*[F]"Sealed, since the day of the sentence."* The blacksmith looks toward the end of the street. *[F]"Wax and the headman's order — only he has the key, only he can break it."*

*[R]"Do you know if he's home now?"*

*[F]"He should be, at this hour."* The blacksmith rests a hand on his shoulder — brief, heavy. *[F]"Go. I'll tell him you've arrived."*

Rinaldo turns to go. Stops.

*[R]"Why were you the one to tell me?"*

The blacksmith thinks about it a moment, as if he'd never asked himself the question until now. *[F]"Because someone had to, and no one else stepped forward."* A pause. *[F]"You two were... I don't know how to put it."* He looks at his own hand, opens and closes it. *[F]"Beatrice fixed this for me, two winters ago, when the doctor said to cut it off. I haven't forgotten."*

He doesn't add anything else. He doesn't need to.

Rinaldo nods — a small gesture, almost automatic — and sets off toward the end of the street.` } }
