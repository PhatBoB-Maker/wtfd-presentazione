  {
    id: 'S6B',
    title: { it: 'Scena 6B — Il Capovillaggio', en: 'Scene 6B — The Headman' },
    panels: [
      { img: 'assets/storia/scena6b/panel-01.jpg', text: { it: `Rinaldo non rallenta il passo — non si ferma nemmeno quando è già troppo vicino, il fiato corto, la voce che si spacca a metà tra la rabbia e qualcosa che non riesce a nominare.

*[R]"Come avete potuto?"* Non è una domanda. È quasi un urlo tenuto giù a forza. *[R]"L'avete bruciata viva. Viva. E la chiamate giustizia."*

Il capovillaggio non indietreggia, non alza la voce. *[C]"Il fabbro ti ha già detto quello che sa."*

*[R]"Mi ha detto che non era convinto. Mi ha detto della cicuta sul tavolo."* La voce di Rinaldo trema — non di paura, di qualcosa che sta per rompersi del tutto. *[R]"Non mi ha detto perché. Perché lei. Perché così."*`, en: `Rinaldo doesn't slow his pace — he doesn't stop even when he's already too close, his breath short, his voice splitting in two between anger and something he can't name.

*[R]"How could you?"* It isn't a question. It's almost a scream held down by force. *[R]"You burned her alive. Alive. And you call it justice."*

The headman doesn't step back, doesn't raise his voice. *[C]"The blacksmith already told you what he knows."*

*[R]"He told me he wasn't convinced. He told me about the hemlock on the table."* Rinaldo's voice shakes — not with fear, with something about to break completely. *[R]"He didn't tell me why. Why her. Why like this."*` } },
      { img: 'assets/storia/scena6b/panel-02v2.jpg', text: { it: `Un silenzio, breve ma pieno. *[C]"Non te lo dirò qui, sulla soglia, in due parole, come se bastassero."* Il capovillaggio lo guarda senza scomporsi, la fermezza di chi ha già deciso come affrontare questo momento molto prima che arrivasse. *[C]"Vai dal parroco. Vai dal medico. Senti quello che hanno da dire, ognuno per la sua parte."* Una pausa. *[C]"Poi torna qui, e ti dirò il resto. Tutto — non solo quello che mi conviene raccontarti per primo."*

*[R]"E se non voglio aspettare?"*

*[C]"Puoi anche non aspettare."* Non si sposta dalla soglia. *[C]"Ma la chiave resta qui finché non torni."* La voce si fa più piana, quasi gentile — non è una minaccia. *[C]"Non è una punizione, Rinaldo. È perché tu sappia con chi te la devi prendere, prima di decidere con chi prendertela davvero."*

Rinaldo lo fissa un momento più lungo del necessario, come se cercasse in quella faccia qualcosa da odiare subito, senza dover aspettare. Non lo trova — non ancora. Si volta senza rispondere, verso il sagrato della chiesa.`, en: `A silence, brief but full. *[C]"I won't tell you here, on the doorstep, in a few words, as if that would be enough."* The headman looks at him without flinching, the steadiness of a man who decided how to face this moment long before it arrived. *[C]"Go to the priest. Go to the doctor. Hear what they have to say, each for their own part."* A pause. *[C]"Then come back here, and I'll tell you the rest. All of it — not just what suits me to tell you first."*

*[R]"And if I don't want to wait?"*

*[C]"You can not wait."* He doesn't move from the doorway. *[C]"But the key stays here until you come back."* His voice softens, almost gentle — it isn't a threat. *[C]"It isn't a punishment, Rinaldo. It's so you know who to blame, before deciding who to truly blame."*

Rinaldo holds his gaze a moment longer than necessary, as if searching that face for something to hate right away. He doesn't find it — not yet. He turns without answering, toward the church square.` } }

  {
    id: 'S7',
    title: { it: 'Scena 7 — Il Parroco', en: 'Scene 7 — The Priest' },
    panels: [
      { img: 'assets/storia/scena7/panel-01.jpg', text: { it: `Il sagrato della chiesa — piccola, di pietra, al centro del villaggio. Rinaldo trova il parroco fuori, intento a sistemare qualcosa vicino alla soglia. Non sembra sorpreso di vederlo.

*[R]"Cosa puoi dirmi, padre?"*

*[P]"Quello che ho visto, se è quello che cerchi. Non di più."* Il parroco lo guarda un momento prima di continuare, come se stesse decidendo quanto della verità gli servisse davvero. *[P]"So che la gente in guerra sente solo la metà delle cose, e quasi sempre la metà sbagliata."*

*[R]"Perché sei venuto a interrogarla?"*

*[P]"Perché era mio dovere, non mia scelta."* Una pausa, le mani giunte davanti a sé, un gesto abituale più che devoto. *[P]"Le ho chiesto cos'era successo. Me l'ha detto senza nascondere niente — la notte, i bambini, il preparato."* Esita. *[P]"E la Borda."*

*[R]"Perché ha parlato della Borda?"*

*[P]"Ha detto che la sentiva. Che per settimane, prima di quella notte, c'era stato qualcosa fuori — movimenti, presenze che non sapeva nominare meglio. Che la nebbia, quell'inverno, non era come le altre nebbie."* Il parroco scuote la testa, piano. *[P]"Non l'ho creduta superstiziosa, Rinaldo. L'ho creduta spaventata. Ma agli occhi degli altri, quelle parole sono bastate da sole."*

*[R]"Cosa pensi tu delle superstizioni? Della Borda?"*

*[P]"La Chiesa le condanna. Tutte, senza distinzioni — è la posizione ufficiale, ed è quella che insegno."* Una pausa più lunga di quanto servirebbe. *[P]"Ma sono cresciuto in questi campi prima di indossare quest'abito. Ho sentito le stesse storie di tutti gli altri, alla stessa età, dalla stessa nonna che le raccontava a tutti."* Guarda altrove. *[P]"Dire a un contadino che la Borda non esiste non gli toglie la paura. Gli toglie solo un nome da dare a quella paura. E una paura senza nome è peggio, non meglio."*

*[R]"Perché tutti hanno avuto così tanta paura, così in fretta?"*

*[P]"Non è cominciata con lei."* Il parroco guarda verso i campi, oltre la spalla di Rinaldo. *[P]"Da mesi arrivavano voci — sparizioni in altri villaggi, lungo la strada verso sud. Rumori nella notte che nessuno sapeva spiegare bene. Il villaggio aspettava che succedesse qualcosa qui, prima ancora che succedesse."* Una pausa. *[P]"Quando è successo, la paura aveva già un nome pronto. Le è bastato dargli un volto."*

*[R]"Secondo te è stata lei?"*

*[P]"Il tribunale ha deciso sulla base di quello che c'era da vedere. Io non sono un giudice, Rinaldo — non spettava a me deciderlo."* Una pausa lunga, più lunga delle altre. *[P]"Ma se mi chiedi cosa penso io, in coscienza... non lo so. E mi turba non saperlo, più di quanto vorrei ammettere davanti a te."*`, en: `The church courtyard — small, stone, at the village center. Rinaldo finds the priest outside, busy fixing something near the threshold. He doesn't seem surprised to see him.

*[R]"What can you tell me, father?"*

*[P]"What I saw, if that's what you're after. No more."* The priest looks at him a moment before continuing, as if deciding how much of the truth he really needed. *[P]"I know that men at war hear only half of things, and almost always the wrong half."*

*[R]"Why did you come to question her?"*

*[P]"Because it was my duty, not my choice."* A pause, hands clasped in front of him, a habitual gesture more than a devout one. *[P]"I asked her what had happened. She told me without hiding anything — the night, the children, the preparation."* He hesitates. *[P]"And the Borda."*

*[R]"Why did she speak of the Borda?"*

*[P]"She said she'd felt it. That for weeks, before that night, there had been something outside — movements, presences she couldn't name any better. That the fog, that winter, wasn't like other fogs."* The priest shakes his head, slowly. *[P]"I didn't think her superstitious, Rinaldo. I thought her frightened. But to everyone else's eyes, those words were enough on their own."*

*[R]"What do you think of the superstitions? Of the Borda?"*

*[P]"The Church condemns them. All of them, without distinction — that's the official position, and it's what I teach."* A pause longer than it needs to be. *[P]"But I grew up in these fields before I wore this robe. I heard the same stories as everyone else, at the same age, from the same grandmother who told them to all of us."* He looks away. *[P]"Telling a farmer the Borda doesn't exist doesn't take away his fear. It only takes away a name to give that fear. And a fear without a name is worse, not better."*

*[R]"Why did everyone become so afraid, so quickly?"*

*[P]"It didn't start with her."* The priest looks toward the fields, past Rinaldo's shoulder. *[P]"For months there had been word — disappearances in other villages, along the road south. Noises in the night no one could quite explain. The village was waiting for something to happen here, even before it happened."* A pause. *[P]"By the time it did, the fear already had a name ready. It only had to give it a face."*

*[R]"Do you think it was her?"*

*[P]"The tribunal decided based on what there was to see. I'm not a judge, Rinaldo — it wasn't mine to decide."* A long pause, longer than the others. *[P]"But if you ask what I think, in conscience... I don't know. And it troubles me not to know, more than I'd like to admit in front of you."*` } },
      { img: 'assets/storia/scena7/panel-02.jpg', text: { it: `*[R]"Perché non hai fatto niente per fermarlo?"*

Il parroco non risponde subito. Quando lo fa, la voce ha perso la sicurezza istituzionale di poco prima. *[P]"Ho pregato che si trovasse un'altra spiegazione. Non ne è arrivata."* Una pausa. *[P]"Il consiglio ha deciso, Rinaldo. Io ho benedetto la sentenza. Non l'ho scritta io."* Esita, poi aggiunge, quasi a scusarsi per la sottrazione: *[P]"Il capovillaggio la sa più lunga di me su come si è arrivati fin lì. Vai da lui, se vuoi il resto."*

Rinaldo lo osserva un momento, poi fa per andare. Il parroco lo ferma con una domanda propria, non richiesta:

*[P]"Ci credi anche tu, alla Borda?"* Rinaldo non risponde subito, e il parroco non aspetta oltre. *[P]"Credo che ci sia del male nel mondo che non sappiamo nominare meglio."* Una pausa. *[P]"Se questo significhi che la Borda esiste esattamente come la raccontano le vecchie, o che è solo il nome che diamo alla paura... non spetta a me deciderlo. Spetta a Dio, alla fine."*

Prima di lasciarlo andare, Rinaldo si volta un'ultima volta. *[R]"Perché tu, con lei, sei sempre stato... distante?"*

Una pausa lunga — la prima vera esitazione di tutto il dialogo. *[P]"Beatrice sapeva cose che non le aveva insegnate nessun libro che io abbia mai letto."* Una pausa. *[P]"Questo non fa di qualcuno una strega, e non l'ho mai pensato con quella parola. Ma mi ha sempre messo a disagio. Non è una colpa che le do, Rinaldo. È solo la verità, e te la devo."*`, en: `*[R]"Why didn't you do anything to stop it?"*

The priest doesn't answer right away. When he does, his voice has lost the institutional certainty of before. *[P]"I prayed another explanation would be found. None came."* A pause. *[P]"The council decided, Rinaldo. I blessed the sentence. I didn't write it."* He hesitates, then adds, almost apologizing for the omission: *[P]"The headman knows more than I do about how it got that far. Go to him, if you want the rest."*

Rinaldo studies him a moment, then turns to go. The priest stops him with a question of his own, unasked for:

*[P]"Do you believe in the Borda too?"* Rinaldo doesn't answer right away, and the priest doesn't wait any longer. *[P]"I believe there is evil in the world we don't know how to name any better."* A pause. *[P]"Whether that means the Borda exists exactly as the old women tell it, or that it's just the name we give to fear... it isn't mine to decide. That's for God, in the end."*

Before letting him go, Rinaldo turns one last time. *[R]"Why were you always... distant with her?"*

A long pause — the first real hesitation of the whole conversation. *[P]"Beatrice knew things no book I've ever read taught her."* A pause. *[P]"That doesn't make someone a witch, and I never thought that word of her. But she always made me uneasy. It isn't a fault I lay on her, Rinaldo. It's just the truth, and I owe it to you."*` } }

  {
    id: 'S8',
    title: { it: 'Scena 8 — Il Medico', en: 'Scene 8 — The Doctor' },
    panels: [
      { img: 'assets/storia/scena8/panel-01.jpg', text: { it: `La casa del medico, poco distante dalla piazza — la porta è aperta, un tavolo ingombro di vasetti e strumenti visibile dall'ingresso. Il medico alza lo sguardo quando Rinaldo entra, e per un istante, prima che il resto arrivi, c'è qualcosa che assomiglia a un vecchio riflesso professionale: due colleghi che si riconoscono.

*[R]"Cosa hai visto, quella notte?"*

*[M]"Quello che ti hanno già detto è vero: sono venuto, ho guardato i pagliericci vuoti, e ho visto le foglie sul tavolo."* Una pausa, le mani che si muovono quasi da sole, il gesto di chi maneggia erbe da una vita. *[M]"Non ho dovuto indovinare, Rinaldo. Le conosco fin troppo bene, quelle foglie."*

*[R]"Come fai a esserne così sicuro?"*

*[M]"Conium maculatum. Cicuta comune."* La voce è quella professionale, quasi da lezione — un rifugio. *[M]"Foglia diversa dal sedano selvatico, se sai cosa cercare: il bordo, l'odore anche da secco."* Una pausa. *[M]"Beatrice lo sapeva meglio di chiunque altro in questo villaggio. Meglio di me, se vogliamo essere onesti."*

*[R]"Che rapporto avevi con lei?"*

*[M]"Professionale."* Lo dice troppo in fretta, forse. Poi, con uno sforzo visibile per restare misurato: *[M]"Curava a modo suo. Io al mio. Il villaggio sceglieva."* Una pausa, la voce si indurisce appena. *[M]"Sceglieva lei, più spesso che no. Non che questo conti qualcosa, per la cicuta sul tavolo."* Distoglie lo sguardo un istante di troppo.`, en: `The doctor's house, not far from the square — the door is open, a table cluttered with jars and instruments visible from the entrance. The doctor looks up when Rinaldo enters, and for an instant, before the rest arrives, there's something like an old professional reflex: two colleagues recognizing each other.

*[R]"What did you see, that night?"*

*[M]"What they've already told you is true: I came, I looked at the empty pallets, and I saw the leaves on the table."* A pause, his hands moving almost on their own, the gesture of someone who's handled herbs his whole life. *[M]"I didn't have to guess, Rinaldo. I know those leaves all too well."*

*[R]"How can you be so sure?"*

*[M]"Conium maculatum. Common hemlock."* His voice turns professional, almost a lecture — a refuge. *[M]"A different leaf from wild celery, if you know what to look for: the edge, the smell even dried."* A pause. *[M]"Beatrice knew it better than anyone else in this village. Better than me, if we're being honest."*

*[R]"What was your relationship with her?"*

*[M]"Professional."* He says it too quickly, perhaps. Then, with a visible effort to stay measured: *[M]"She treated her way. I treated mine. The village chose."* A pause, his voice hardening slightly. *[M]"They chose her, more often than not. Not that it counts for anything, with the hemlock on the table."* He looks away a moment too long.` } },
      { img: 'assets/storia/scena8/panel-02.jpg', text: { it: `*[R]"Secondo te è stata lei?"*

*[M]"Ho visto la cicuta. Ho visto i pagliericci vuoti."* Una pausa, più lunga. *[M]"Il resto — se l'ha fatto sapendo quello che faceva, se non lo sapeva, se c'entra la Borda come dice la gente — quello non lo so, e ti mentirei se dicessi che m'interessa saperlo. Io guardo quello che c'è sul tavolo. È l'unica cosa di cui posso rispondere."*

*[R]"Perché non hai fatto niente per fermarlo?"*

Il medico si volta di scatto, quasi offeso. *[M]"Fermarlo?"* Un attimo, poi la difesa si abbassa quanto basta per lasciar passare qualcosa di più vero. *[M]"Non decidevo io da solo, Rinaldo. Non sono stato l'unico a dire la mia."* Una pausa, più lunga delle altre. *[M]"Come sia andata davvero, come si sia arrivati alla sentenza — quello chiedilo al capovillaggio. È lui che ha tenuto tutti i fili in mano. Io ho detto la mia parte, come tutti gli altri."* La voce quasi si spezza sul controllo che si sta imponendo. *[M]"Non voglio che tu creda sia stata colpa mia sola, Rinaldo. Non lo è stata."*

Rinaldo lo guarda a lungo prima di chiedere l'ultima cosa. *[R]"Ti sei mai chiesto se aveva ragione lei, sulla Borda?"*

Il medico quasi ride — non un riso allegro, il riso di chi si aggrappa a qualcosa di solido. *[M]"Alla Borda?"* Scuote la testa. *[M]"Ci credi tu, Rinaldo? Un uomo che ha studiato quanto te?"* Una pausa, la voce che torna a farsi professionale, quasi didattica. *[M]"Sono storie che le vecchie raccontano ai bambini per farli stare buoni la sera. Utili, forse — tengono i piccoli vicino al fuoco invece che nei canali al buio. Ma non sono scienza."* Distoglie lo sguardo un istante di troppo, come se la propria sicurezza gli servisse più a convincere se stesso che Rinaldo. *[M]"Io guardo quello che si può vedere e misurare. Il resto è superstizione. E la superstizione non ha mai salvato nessun bambino."*`, en: `*[R]"Do you think it was her?"*

*[M]"I saw the hemlock. I saw the empty pallets."* A pause, longer. *[M]"The rest — whether she did it knowing what she was doing, whether she didn't know, whether the Borda has anything to do with it like people say — that I don't know, and I'd be lying if I said I cared to know. I look at what's on the table. It's the only thing I can answer for."*

*[R]"Why didn't you do anything to stop it?"*

The doctor turns sharply, almost offended. *[M]"Stop it?"* A moment, then the defensiveness drops just enough to let something truer through. *[M]"I wasn't the one deciding alone, Rinaldo. I wasn't the only one who spoke his mind."* A pause, longer than the others. *[M]"How it really went, how the sentence came about — ask the headman that. He's the one who held all the threads. I said my part, like everyone else."* His voice nearly breaks under the control he's forcing on himself. *[M]"I don't want you to think it was my fault alone, Rinaldo. It wasn't."*

Rinaldo watches him a long while before asking the last thing. *[R]"Did you ever wonder if she was right, about the Borda?"*

The doctor almost laughs — not a cheerful laugh, the laugh of someone grasping for something solid. *[M]"The Borda?"* He shakes his head. *[M]"Do you believe it, Rinaldo? A man as educated as you?"* A pause, his voice turning professional again, almost instructive. *[M]"They're stories old women tell children to keep them well-behaved at night. Useful, maybe — they keep little ones by the fire instead of in the canals in the dark. But they aren't science."* He looks away a moment too long, as if his own certainty were meant to convince himself more than Rinaldo. *[M]"I look at what can be seen and measured. The rest is superstition. And superstition has never saved a single child."*` } }

  {
    id: 'S9',
    title: { it: 'Scena 9 — Il Capovillaggio', en: 'Scene 9 — The Headman' },
    panels: [
      { img: 'assets/storia/scena9/panel-01.jpg', text: { it: `La casa del capovillaggio, portico di legno, fine della strada. Il capovillaggio è già sulla soglia quando Rinaldo arriva: lo aspettava.

*[R]"Ho fatto come mi hai chiesto."* Rinaldo non lo saluta. *[R]"Ho sentito il fabbro. Il parroco. Il medico."*

*[C]"E allora?"*

Qualcosa nella voce piana di Rinaldo si incrina, ma non nel modo in cui si incrina il pianto. È più duro. *[R]"Il fabbro non era convinto — mai stato, dice. Il parroco pregava per un'altra spiegazione, e non gliel'avete data. Il medico ha visto la cicuta sul tavolo e ha guardato da un'altra parte quando è stato il momento di scegliere da che parte stare."* Una pausa. *[R]"Pochi l'hanno difesa, in questo villaggio. Una donna che ha curato ognuno di voi almeno una volta, che non ha mai chiesto niente in cambio a chi non poteva permetterselo."* La voce sale appena, la prima vera crepa. *[R]"E quando non avete saputo come spiegarvi le sparizioni, ve la siete presa con lei."*

Il capovillaggio non nega. Non abbassa nemmeno lo sguardo. *[C]"Ti ho mandato dagli altri prima di parlare con me per un motivo, Rinaldo."* Una pausa, come se stesse scegliendo le parole con cura, non per proteggersi ma perché gli costano davvero. *[C]"Volevo che tu sentissi tutta la storia, non solo la mia versione. E volevo che arrivassi qui sapendo già che non sono stato solo io a deciderlo. Se fossi venuto prima da me, avresti sentito solo la voce di chi porta il peso più grande. Non era giusto che fosse l'unica che sentivi."*`, en: `The headman's house, wooden porch, end of the street. The headman is already on the threshold when Rinaldo arrives: he was waiting for him.

*[R]"I did as you asked."* Rinaldo doesn't greet him. *[R]"I heard the blacksmith. The priest. The doctor."*

*[C]"And?"*

Something in Rinaldo's level voice cracks, but not the way weeping cracks it. It's harder. *[R]"The blacksmith wasn't convinced — never was, he says. The priest prayed for another explanation, and you didn't give him one. The doctor saw the hemlock on the table and looked the other way when it came time to choose a side."* A pause. *[R]"Few defended her, in this village. A woman who healed every one of you at least once, who never asked anything in return from those who couldn't afford it."* His voice rises slightly, the first real crack. *[R]"And when you couldn't explain the disappearances, you turned on her."*

The headman doesn't deny it. He doesn't even lower his eyes. *[C]"I sent you to the others before speaking to me for a reason, Rinaldo."* A pause, as if choosing his words carefully, not to protect himself but because they truly cost him something. *[C]"I wanted you to hear the whole story, not just my version of it. And I wanted you to arrive here already knowing I wasn't the only one who decided it. If you'd come to me first, you'd have heard only the voice of the one who carries the heaviest weight. It wasn't right that his should be the only one you heard."*` } },
      { img: 'assets/storia/scena9/panel-02.jpg', text: { it: `*[R]"Perché l'hai condannata?"*

*[C]"Perché il villaggio aveva bisogno che qualcuno pagasse, e io ho il compito di dare al villaggio quello di cui ha bisogno per restare un villaggio, e non qualcos'altro."* Una pausa. *[C]"Non sono orgoglioso di questa frase. Ma è vera."*

*[R]"Cosa intendi, 'qualcos'altro'?"*

*[C]"Un villaggio che non trova un colpevole quando i suoi bambini spariscono non resta un villaggio a lungo."* Una pausa più lunga. *[C]"Diventa una massa di gente spaventata che si guarda intorno e comincia a chiedersi chi è stato — il vicino, il forestiero, io stesso, magari. Un uomo del villaggio accanto mi ha raccontato di una casa data alle fiamme dalla folla stessa, senza nessun processo, senza nessuna decisione presa insieme. Solo paura che trova una direzione da sola."* Pausa più lunga ancora. *[C]"Io non volevo quello. Ho preferito decidere io, con ordine, piuttosto che lasciare che decidesse la paura."*

*[R]"Come hai deciso, allora?"*

*[C]"Ho chiamato ogni capofamiglia, uno alla volta — non tutti insieme in piazza."* Una pausa. *[C]"Meglio uno alla volta: in piazza la gente si guarda, si convince a vicenda, urla più forte di quanto pensi davvero. Da solo, ognuno mi ha detto quello che pensava per davvero."* Distoglie lo sguardo un istante. *[C]"Quasi tutti pensavano che dovesse pagare. Non tutti. Il fabbro no, per esempio. Ma quasi tutti."*

*[R]"Tu cosa pensavi, davvero?"*

Il capovillaggio non risponde subito. Quando parla, la voce ha perso ogni traccia dell'autorità di poco prima. *[C]"Che forse non era stata lei a scegliere quella cicuta, sapendo cosa fosse."* Una pausa. *[C]"Ma un villaggio non può vivere di 'forse', Rinaldo. Vive di risposte, anche quando sono sbagliate. Io ho dato una risposta."*`, en: `*[R]"Why did you condemn her?"*

*[C]"Because the village needed someone to pay, and my task is to give the village what it needs to remain a village, and not something else."* A pause. *[C]"I'm not proud of that sentence. But it's true."*

*[R]"What do you mean, 'something else'?"*

*[C]"A village that finds no one guilty when its children disappear doesn't stay a village for long."* A longer pause. *[C]"It becomes a mass of frightened people looking around, starting to wonder who did it — the neighbor, the stranger, myself, maybe. A man from the next village told me about a house burned down by the crowd itself, with no trial, no decision made together. Just fear finding its own direction."* An even longer pause. *[C]"I didn't want that. I preferred to decide it myself, with order, rather than let fear decide."*

*[R]"How did you decide, then?"*

*[C]"I called in every head of household, one at a time — not all together in the square."* A pause. *[C]"Better one at a time: in the square people watch each other, talk each other into things, shout louder than they really mean. Alone, each one told me what he truly thought."* He looks away for a moment. *[C]"Almost everyone thought she should pay. Not everyone. The blacksmith didn't, for one. But almost everyone."*

*[R]"What did you think, really?"*

The headman doesn't answer right away. When he speaks, his voice has lost every trace of the authority from before. *[C]"That maybe it wasn't her who chose that hemlock, knowing what it was."* A pause. *[C]"But a village can't live on 'maybe,' Rinaldo. It lives on answers, even wrong ones. I gave an answer."*` } },
      { img: 'assets/storia/scena9/panel-03.jpg', text: { it: `Si volta, stacca una chiave di ferro dal chiodo alla parete. Non gliela porge subito — la tiene un momento in mano, come se pesasse più del metallo. *[C]"Questa è tua. La casa è tua. Vai a vedere cosa è rimasto — forse è l'unica risposta vera che troverai oggi."*

Rinaldo gli chiede se ha figli lui. *[C]"Due. Vivi."* Il capovillaggio si concede una pausa più lunga di quanto la domanda giustificherebbe. *[C]"Ogni notte da allora ringrazio qualcosa che non so nemmeno nominare, che non sono stati loro."*

Rinaldo prende la chiave. Non ringrazia.

*[R]"Hai fatto quello che pensavi fosse giusto per il villaggio."* La voce è piatta, quasi gentile — ed è proprio per questo che fa più male. *[R]"Non ti biasimo per aver avuto paura. Ti biasimo per non aver protetto lei, quando bastava che una persona con la tua autorità dicesse una parola diversa."* Si ferma sulla soglia, la chiave stretta in pugno. *[R]"Per questo non ti perdonerò mai."*

Il capovillaggio non risponde. Non c'è niente da rispondere a una cosa vera.

Rinaldo si volta e si incammina verso casa sua, per la prima volta in otto mesi con la chiave in mano.`, en: `He turns, takes an iron key down from the hook on the wall. He doesn't hand it over right away — he holds it a moment, as if it weighed more than the metal. *[C]"This is yours. The house is yours. Go see what's left — maybe it's the only true answer you'll find today."*

Rinaldo asks if he has children of his own. *[C]"Two. Alive."* The headman allows himself a pause longer than the question warrants. *[C]"Every night since, I thank something I can't even name, that it wasn't them."*

Rinaldo takes the key. He doesn't thank him.

*[R]"You did what you thought was right for the village."* His voice is flat, almost gentle — and that's exactly why it hurts more. *[R]"I don't blame you for being afraid. I blame you for not protecting her, when all it would have taken was one person with your authority saying something different."* He stops in the doorway, the key clenched in his fist. *[R]"For that, I will never forgive you."*

The headman doesn't answer. There's nothing to answer to something true.

Rinaldo turns and walks toward his house, for the first time in eight months with the key in his hand.` } }
    ]

  {
    id: 'S10',
    title: { it: 'Scena 10 — Dentro la Casa', en: 'Scene 10 — Inside the House' },
    panels: [
      { img: 'assets/storia/scena10/panel-01.jpg', text: { it: `Il sigillo di cera cede sotto il coltello senza cerimonie — nessuno lì a farlo con lui, nessuno a cui restituire lo sguardo dopo. Rinaldo gira la chiave nel chiavistello. La porta si apre sul buio della casa chiusa da mesi.

La prima cosa è l'aria — non di marcio, non di abbandono pesante, ma di tempo che si è depositato su tutto come polvere sottile. Legno, terra secca, qualcosa di vegetale che viene dal laboratorio. Familiare nella sostanza, estraneo nella quiete.

La cucina è come l'aveva lasciata, quasi. Il tavolo, le scodelle, il fuoco spento da mesi con le ceneri ancora dentro. Le cose di Beatrice appese, poggiate, ordinate nel modo in cui le ordinava lei — una logica sua, mai stata la sua.`, en: `The wax seal gives way under the knife without ceremony — no one there to do it with him, no one to meet eyes with afterward. Rinaldo turns the key in the latch. The door opens onto the darkness of a house closed for months.

The first thing is the air — not of rot, not of heavy abandonment, but of time settled over everything like fine dust. Wood, dry earth, something plant-like from the workshop. Familiar in substance, foreign in its stillness.

The kitchen is almost as he left it. The table, the bowls, the fire out for months with the ashes still inside. Beatrice's things hung, set down, ordered the way she ordered them — a logic of her own, never his.` } },
      { img: 'assets/storia/scena10/panel-02.jpg', text: { it: `Va prima dai bambini. Non sa perché lo fa per primo — forse perché è la cosa più difficile e preferisce toglierla subito, forse perché è quello che avrebbe fatto Beatrice.

I pagliericci sono ancora lì. Ancora con la forma dei bambini dentro — le coperte come le avevano lasciate, o come le avevano trovate quella mattina di gennaio. Qualcuno le ha ripiegate, probabilmente la vicina o qualcun altro entrato subito dopo, cercando. Piegate troppo in ordine. Beatrice non le avrebbe piegate così.

Rimane in piedi nel piccolo spazio per un momento che non sa misurare.`, en: `He goes to the children's room first. He doesn't know why he does it first — maybe because it's the hardest thing and he'd rather get it over with, maybe because it's what Beatrice would have done.

The pallets are still there. Still holding the shape of the children — the blankets as they'd left them, or as they'd been found that January morning. Someone has folded them, probably the neighbor or someone else who came in right after, searching. Folded too neatly. Beatrice wouldn't have folded them that way.

He stands in the small space for a length of time he can't measure.` } },
      { img: 'assets/storia/scena10/panel-03.jpg', text: { it: `Il laboratorio è il posto in cui si sente meno spaesato. Conosce ogni barattolo, ogni fascio di erbe appeso alle travi, ogni contenitore con il suo contenuto scritto nella grafia piccola e precisa di Beatrice. Comincia a muoversi tra i ripiani con la stessa attenzione metodica con cui si muoverebbe in qualunque laboratorio — ci sono cose da controllare, erbe essiccate che potrebbero essere andate a male.

Vede il chiodo a destra della porta. Il campanellino è ancora lì.

Lo guarda un momento senza toccarlo. Poi lo prende dal chiodo.

Sta fermo con il campanellino in pugno, senza scuoterlo, senza fare niente. Non se lo aspettava — non aveva pianto sul campo di battaglia, non davanti al fabbro, non sull'uscio, non in nessuno dei mesi di cammino. Eppure si trova a farlo, lì nel laboratorio, con quel pezzo di ottone chiuso nella mano, senza un momento preciso in cui è cominciato. Le lacrime vengono fuori senza avvisare, senza il conforto di un pensiero che le giustifichi.

Non ci vuole molto. È un uomo pratico — lo sa su di sé. Le cose arrivano e poi se ne vanno, e lui nel mezzo aspetta che passino.

Lo scuote, piano — quasi senza volerlo, il gesto automatico di chi ha sentito quel suono migliaia di volte. Il tintinnio è chiaro e secco nell'aria ferma della stanza.

Non succede niente di visibile. Nessuna luce, nessuna voce. Solo una sensazione — e Rinaldo non è il tipo di uomo che si fida delle sensazioni. Eppure c'è qualcosa nel campanellino che non era lì prima che lo scuotesse. Non calore, non esattamente. La sensazione di non essere completamente solo in quella stanza. Una presenza recente. Una traccia.

Prende un laccio di cuoio dal banco — Beatrice li usava per legare i mazzi di erbe — e lo annoda alla cintura, dove può raggiungerlo con una mano sola.`, en: `The workshop is where he feels least out of place. He knows every jar, every bundle of herbs hanging from the beams, every container with its contents written in Beatrice's small, precise hand. He starts moving among the shelves with the same methodical attention he'd use in any workshop — there are things to check, dried herbs that might have spoiled.

He sees the nail to the right of the door. The campanellino is still there.

He looks at it a moment without touching it. Then takes it down from the nail.

He stands still with the campanellino in his fist, not shaking it, not doing anything. He didn't expect this — he hadn't cried on the battlefield, not in front of the blacksmith, not on the doorstep, not in any of the months of walking. And yet here he is doing it, in the workshop, that piece of brass closed in his hand, with no precise moment when it began. The tears come without warning, without the comfort of a thought to justify them.

It doesn't take long. He's a practical man — he knows this about himself. Things arrive and then they pass, and he waits in the middle for them to pass.

He shakes it, softly — almost without meaning to, the automatic gesture of someone who's heard that sound a thousand times. The chime is clear and sharp in the still air of the room.

Nothing visible happens. No light, no voice. Only a feeling — and Rinaldo isn't the kind of man who trusts feelings. And yet there's something in the campanellino that wasn't there before he shook it. Not warmth, not exactly. The feeling of not being entirely alone in that room. A recent presence. A trace.

He takes a leather cord from the workbench — Beatrice used them to tie the herb bundles — and knots it to his belt, where he can reach it with one hand.` } },
      { img: 'assets/storia/scena10/panel-04.jpg', text: { it: `Sul banco di lavoro, due mucchi di erbe essiccate — mischiati insieme adesso, i bordi delle foglie confusi l'uno nell'altro. Non è così che Beatrice li teneva: lei non lasciava mai due mazzi vicini, tanto meno mescolati — non questi due, mai.

Sedano selvatico — *Apium graveolens*. Lo riconosce subito.

Poi, mescolate dentro: foglie che sembrano quasi identiche, stessa famiglia, stessa forma generale — ma il bordo fogliare è diverso, e l'odore, anche da secco, è diverso se sai cosa cercare.

*Conium maculatum.* Cicuta comune.

La conosce bene — Beatrice la usava per uso esterno, mai mescolata a niente d'altro, mai in laboratorio. Non ci crede, non per un solo istante, che sia stata la sua mano a confonderle: in vent'anni non l'ha mai vista trattare le sue erbe così. Qualcuno, o qualcosa, è passato di qui dopo che l'hanno portata via — gli uomini venuti a perquisire la casa in cerca di altre prove, forse, senza la cura di chi sa cosa sta toccando. O solo il vento, da una finestra rimasta aperta un'ora di troppo prima che sigillassero tutto. Non lo saprà mai con certezza.

Cerca il diario.

Lo trova nel cassetto sotto il banco. Prende quello più recente — la copertina di cuoio scuro che riconosce, l'ultimo che lei usava prima che lui partisse. Lo apre all'ultima pagina scritta. Data di gennaio.

*Ho riletto la lettera di Rinaldo, stanotte. Mi manca più di quanto vorrei ammettere, anche a queste pagine.*

*I bambini non riuscivano a dormire. Da settimane è così — Isabella si sveglia, Ludovico non dorme. Ho sentito di nuovo qualcosa fuori stanotte, oltre il muro. Non il vento.*

*Ho preparato il solito. Sedano, la proporzione che uso sempre per loro. Li ho fatti bere. Li ho visti addormentarsi.*

*Ho cantato la ninna nanna di mia nonna. Non so perché — è venuta fuori da sola.*

Rinaldo smette di leggere. Rimane fermo con il diario aperto in mano, gli occhi fissi sull'ultima riga. Poi guarda il banco. Le foglie essiccate ancora lì, il sedano e la cicuta, mescolati, quasi identici.

*Ho preparato il solito.*

Non ci vuole molto perché lui sappia quello che Beatrice non sapeva — come crescono quelle piante lungo i canali, come si somigliano una volta secche, cosa succede quando due mazzi quasi identici finiscono per mescolarsi. Capisce nel modo in cui si capiscono le cose che non si voleva capire: tutto insieme, senza gradualità.

*Il solito* era sedano. Ma quella notte, in un modo che non riuscirà mai a ricostruire con certezza, della cicuta è finita dove non doveva. Una dose pensata per far dormire un bambino. Il Conium non ha bisogno di dosi da adulto per uccidere un bambino.

Appoggia il diario sul banco. Resta seduto sul bordo per un tempo che non sa misurare.

La domanda arriva da sola, senza che lui la cerchi. Era stata lei? Era stata la Borda? Non c'è modo di saperlo. Non ci sarà mai.

C'è solo una cosa ancora in piedi: nessuno ha mai trovato i loro corpi — non un osso, non un brandello di stoffa, niente. Da medico, Rinaldo sa cosa lascia dietro di sé una morte vera: sangue, segni di lotta, il disordine di un corpo che smette di muoversi. Quella notte non c'era niente di tutto questo — solo due pagliericci vuoti e le coperte ancora nella piega di chi le aveva lasciate, come se nessuno le avesse mai toccate. Non è una prova che siano vivi. Ma non è nemmeno una prova che siano morti. È l'unica crepa a cui può ancora aggrapparsi.

Si alza. Prende il diario e lo mette nel sacco insieme al campanellino. Guarda il laboratorio un'ultima volta — i barattoli, le erbe, le etichette nella grafia precisa di Beatrice.`, en: `On the workbench, two piles of dried herbs — mixed together now, the leaf edges blurred into one another. That's not how Beatrice kept them: she never left two bundles close together, let alone mixed — not these two, never.

Wild celery — *Apium graveolens*. He recognizes it at once.

Then, mixed in: leaves that look almost identical, same family, same general shape — but the leaf edge is different, and the smell, even dried, is different if you know what to look for.

*Conium maculatum.* Common hemlock.

He knows it well — Beatrice used it externally only, never mixed with anything else, never in the workshop. He doesn't believe, not for one instant, that it was her own hand that confused them: in twenty years he's never seen her treat her herbs this way. Someone, or something, came through here after they took her away — the men who searched the house looking for more evidence, maybe, without the care of someone who knows what they're handling. Or just the wind, through a window left open an hour too long before they sealed everything. He'll never know for certain.

He looks for the diary.

He finds it in the drawer under the bench. He takes the most recent one — the dark leather cover he recognizes, the last one she used before he left. He opens it to the last written page. Dated January.

*I reread Rinaldo's letter, tonight. I miss him more than I'd like to admit, even to these pages.*

*The children couldn't sleep. It's been like this for weeks — Isabella wakes up, Ludovico doesn't sleep. I heard something outside again tonight, beyond the wall. Not the wind.*

*I made the usual. Celery, the proportion I always use for them. I made them drink it. I watched them fall asleep.*

*I sang my grandmother's lullaby. I don't know why — it just came out on its own.*

Rinaldo stops reading. He stays still with the diary open in his hand, eyes fixed on the last line. Then he looks at the bench. The dried leaves still there, the celery and the hemlock, mixed, almost identical.

*I made the usual.*

It doesn't take him long to know what Beatrice didn't — how those plants grow along the canals, how alike they look once dried, what happens when two nearly identical bundles end up mixed together. He understands the way you understand things you didn't want to understand: all at once, with no gradual approach.

*The usual* was celery. But that night, in some way he'll never be able to reconstruct for certain, hemlock ended up where it shouldn't have. A dose meant to put a child to sleep. Conium doesn't need an adult dose to kill a child.

He sets the diary on the bench. Stays sitting on its edge for a length of time he can't measure.

The question arrives on its own, without his looking for it. Was it her? Was it the Borda? There's no way to know. There never will be.

Only one thing still stands: no one ever found their bodies — not a bone, not a scrap of cloth, nothing. As a doctor, Rinaldo knows what a real death leaves behind: blood, signs of a struggle, the disorder of a body that stops moving. That night there was none of it — just two empty pallets and blankets still folded the way they'd been left, as if no one had ever touched them. It isn't proof they're alive. But it isn't proof they're dead either. It's the only crack he can still hold onto.

He stands. Takes the diary and puts it in the sack with the campanellino. Looks at the workshop one last time — the jars, the herbs, the labels in Beatrice's precise hand.` } }
