Non ha più bisogno di una risposta. *[R]"Anch'io ti conosco,"* dice, la voce che gli si spezza esattamente a metà della frase, come se il resto non riuscisse a passare per la gola. *[R]"Tu sei... la mia sposa. Tu sei Beatrice."*`, en: `In the trembling light of the vapor, for an instant, something comes into focus that a moment before wasn't there — a single detail, sharp against everything else still indistinct: a streak of white hair, above her left temple. The same one he's kissed a thousand times without thinking, the same one his children used to tug at for fun when they thought she wasn't paying attention.

The world, for an instant, stops having mud, fog, ragged breath. There's only that detail, and everything it carries with it.

He doesn't need an answer anymore. *[R]"I know you too,"* he says, his voice breaking exactly in half, as if the rest of it couldn't make it past his throat. *[R]"You're... my wife. You're Beatrice."*` } },
      { img: 'assets/storia/scena15/panel-09.jpg', text: { it: `Lei resta in silenzio un momento troppo lungo — abbastanza da far temere a Rinaldo che il silenzio sia già la risposta, che quel poco che è tornato sia già finito. Poi: *"Non ricordo niente,"* dice infine, e nella voce c'è qualcosa che assomiglia alla vergogna, o forse solo alla fatica di cercare in un posto che non risponde. *"So solo che nei tuoi occhi vedo me."*

Rinaldo non sa cos'altro provare, se non il bisogno disperato di tenerla lì con qualcosa di suo, qualcosa che nessun'altra donna al mondo potrebbe sapere. *[R]"Mi pare ancora di sentire il tuo profumo,"* dice, la voce che gli si spezza di nuovo, *[R]"quando tornavi dalla raccolta della lavanda, e la sera facevamo il sapone insieme, al camino."*

Qualcosa si sposta dietro i suoi occhi — se di occhi si può ancora parlare, in quella forma che non ne ha di veri. *"La lavanda,"* ripete lei, piano, quasi assaggiando la parola, come se pronunciarla potesse farla risalire più in fretta. *"Forse... forse ora ricordo qualcosa."* Una pausa, poi, con una certezza improvvisa che sembra sorprendere lei stessa più di lui: *"Tu sei Rinaldo. Il mio amato."*

Le parole seguenti le escono incerte, una alla volta, come se dovesse andarle a cercare lontano, in una stanza buia di cui non ha più la chiave. *"Non so perché mi trovo qui. Non so nemmeno perché tu debba subire tutto questo."* Si ferma. *"Non so qual è il mio ruolo in questa cosa. Ma so che ci sarò, al tuo fianco."*

*[R]"Cosa è successo,"* le chiede lui, e la voce trema più di quanto vorrebbe, più di quanto abbia tremato in tutto lo scontro appena finito. *[R]"Raccontami cosa è successo quella notte. Come posso portarti indietro?"*

Lei apre la bocca per rispondere — e per un istante Rinaldo crede davvero che questa volta arriverà una risposta vera, non un altro frammento. *"Sto cercando di ricordare... ho solo..."* Ma mentre parla, i contorni cominciano a perdere consistenza, a sfaldarsi ai bordi come fumo che il vento porta via un pezzo alla volta.`, en: `She stays silent a moment too long — long enough that Rinaldo fears the silence is already the answer, that the little that came back is already gone. Then: *"I don't remember anything,"* she finally says, and there's something in her voice that resembles shame, or maybe just the effort of searching a place that doesn't answer. *"I only know that in your eyes, I see myself."*

Rinaldo doesn't know what else to feel, except the desperate need to hold her there with something of his own, something no other woman on earth could know. *[R]"I still think I can smell you,"* he says, his voice breaking again, *[R]"coming back from gathering lavender, making soap together by the fire in the evening."*

Something shifts behind her eyes — if you can still call them eyes, in that shape that has no real ones. *"Lavender,"* she repeats, quietly, almost tasting the word, as if saying it might bring something back faster. *"Maybe... maybe I remember something now."* A pause, then, with a sudden certainty that seems to surprise even her: *"You're Rinaldo. My beloved."*

The words that follow come out uncertain, one at a time, as if she has to go looking for them somewhere far away, in a dark room she no longer has the key to. *"I don't know why I'm here. I don't even know why you have to go through all this."* She stops. *"I don't know what my place is in all this. But I know I'll be here, at your side."*

*[R]"What happened,"* he asks her, and his voice shakes more than he'd like, more than it shook through the whole fight just ended. *[R]"Tell me what happened that night. How can I bring you back?"*

She opens her mouth to answer — and for an instant Rinaldo truly believes that this time a real answer will come, not another fragment. *"I'm trying to remember... I only..."* But as she speaks, her edges begin to lose their form, crumbling at the borders like smoke carried off by the wind, a piece at a time.` } },
      { img: 'assets/storia/scena15/panel-10.jpg', text: { it: `Rinaldo si getta in avanti, disperato, cerca di afferrarla per le spalle prima che sparisca del tutto — come se un corpo potesse trattenere quello che le parole non sono riuscite a fermare. *[R]"No,"* dice, e non è più una richiesta, è quasi un ordine rivolto a se stesso oltre che a lei. *[R]"Torna da me."*

Le mani chiudono sul vapore che si sfalda sotto le sue dita — non aria vuota, questa volta: qualcosa che cede davvero, che si disperde proprio nell'istante in cui lo tocca, come se il contatto stesso fosse quello che la consuma.

È in quel contatto, in quella frazione di secondo in cui le sue dita sono ancora piene di lei, che Rinaldo comincia a vedere — frammenti sconnessi, come fotografie sbiadite di ricordi lontani ed eterei, che non sono i suoi.`, en: `Rinaldo lunges forward, desperate, trying to grip her by the shoulders before she disappears completely — as if a body could hold on to what words failed to stop. *[R]"No,"* he says, and it isn't a plea anymore, it's almost an order aimed at himself as much as at her. *[R]"Come back to me."*

His hands close on vapor that crumbles under his fingers — not empty air, this time: something truly giving way, dispersing at the exact instant he touches it, as if the touch itself were what consumes her.

It's in that contact, in that fraction of a second while his fingers are still full of her, that Rinaldo begins to see — disconnected fragments, like faded photographs of memories that are distant and ethereal, and not his own.` } },
      { img: 'assets/storia/scena15/panel-11.jpg', text: { it: `*[LP]Fiamme. Una gonna che prende fuoco dall'orlo, poi le caviglie. Un urlo che non è paura — è dolore puro, il corpo che si contorce contro le corde che lo tengono dritto quando le gambe vorrebbero soltanto cedere.*`, en: `*[LP]Flames. A skirt catching fire at the hem, then the ankles. A scream that isn't fear — it's pure pain, the body writhing against the ropes holding it upright when the legs would rather do nothing but give way.*` } },
      { img: 'assets/storia/scena15/panel-12.jpg', text: { it: `*[LP]Poi, di colpo, non più il fuoco: cenere. Cenere fumante ripresa da vicino, il vento che la smuove appena, e oltre il bordo dell'inquadratura la nebbia che avanza lenta, bassa, come se cercasse qualcosa nel terreno. Un istante prima che copra le ceneri per sempre — un fascio di luce sottile, quasi eterea, si stacca da ciò che resta e fugge. Non verso l'alto. Verso una direzione precisa: una casa, ancora in piedi, in lontananza.*`, en: `*[LP]Then, all at once, no more fire: ash. Smoking ashes seen up close, the wind stirring them faintly, and beyond the edge of the frame the fog advancing slow and low, as if searching for something in the ground. An instant before it covers the ashes for good — a thin, almost ethereal beam of light detaches from what remains and flees. Not upward. In one precise direction: a house, still standing, in the distance.*` } },
      { img: 'assets/storia/scena15/panel-13.jpg', text: { it: `Rinaldo è inginocchiato nel fango, gli occhi chiusi, le mani strette attorno al campanellino con una forza che non ricorda di aver deciso — così forte che i bordi metallici gli segnano il palmo, un piccolo dolore concreto a cui aggrapparsi mentre tutto il resto gli scivola addosso senza forma.

Quando riapre gli occhi, non c'è più nessuno. Solo il bosco, la creatura ormai lontana o dissolta o mai davvero esistita in un modo che le parole riescano a contenere, e il silenzio che torna — lo stesso silenzio di sempre, eppure diverso, perché ora sa cosa può nascondersi dietro.`, en: `Rinaldo is on his knees in the mud, eyes closed, hands clenched around the campanellino with a force he doesn't remember deciding on — so tight the metal edges leave marks on his palm, a small, concrete pain to hold on to while everything else slides off him, formless.

When he opens his eyes again, no one is there. Only the woods, the creature now distant or dissolved or never truly having existed in any way words could contain, and the silence returning — the same silence as always, and yet different, because now he knows what it can hide.` } },
      { img: 'assets/storia/scena15/panel-14.jpg', text: { it: `Guarda il campanellino ancora stretto in pugno, quasi sorpreso di trovarlo lì — un piccolo oggetto di ottone, freddo ora, ordinario in ogni modo tranne uno. Per la prima volta da quando lo porta con sé — non saprebbe dire perché proprio ora — è come se lo vedesse davvero, invece di limitarsi a sentirlo appeso alla cintura come un peso in più tra tanti.

Cammina a lungo prima di fermarsi a pensarci per davvero, il corpo che si muove da solo mentre la mente resta ancora indietro, in quel campo, in quella luce. Non è la lama che gli ha risparmiato la vita a tornargli in mente, né il fango sull'argine dove ha rischiato di morire. Quello che non riesce a lasciar andare è il calore — ancora quasi percepibile sul palmo, come un'impronta che il freddo della nebbia non è ancora riuscito a cancellare del tutto.

*Se può ancora tornare,* pensa, *se può ancora toccarlo — anche solo con un ricordo che le scivola via un istante prima di riuscire a trattenerlo — allora forse quello che dorme sotto terra, ovunque sia, non è mai davvero perso del tutto.*

Non lo dice a voce alta. Non c'è nessuno a cui dirlo, e in ogni caso non è ancora pronto a sentire come suonerebbe detto a voce alta. Ma per la prima volta da quando è tornato in questo villaggio pieno di nebbia e di assenze, la domanda che porta dentro da settimane — se i suoi figli siano ancora vivi da qualche parte, in un posto che nessuna mappa disegna — ha finalmente qualcosa a cui aggrapparsi che non sia solo disperazione.`, en: `He looks at the campanellino still gripped in his fist, almost surprised to find it there — a small brass object, cold now, ordinary in every way but one. For the first time since he's carried it with him — he couldn't say why, exactly now — it's as if he truly sees it, instead of merely feeling it hanging at his belt like one more weight among many.

He walks a long while before stopping to really think about it, his body moving on its own while his mind stays behind, still in that field, in that light. It isn't the blade that spared his life that comes back to him, nor the mud on the embankment where he nearly died. What he can't let go of is the warmth — still almost perceptible on his palm, like an imprint the cold of the fog hasn't managed to erase completely.

*If she can still come back,* he thinks, *if she can still touch him — even just with a memory slipping away an instant before he can hold onto it — then maybe whatever sleeps underground, wherever it is, isn't ever truly lost.*

He doesn't say it aloud. There's no one to say it to, and in any case he isn't ready yet to hear how it would sound spoken aloud. But for the first time since he came back to this village full of fog and absences, the question he's carried inside for weeks — whether his children might still be alive somewhere, in a place no map draws — finally has something to hold on to that isn't just despair.` } }
    ]
  },
  {
    id: 'S16',
    title: { it: 'Scena 16 — Il Sacello', en: 'Scene 16 — The Shrine' },
    panels: [
      { img: 'assets/storia/scena16/panel-01.jpg', text: { it: `Il sentiero risale dall'acqua bassa verso un terreno più duro, e per un tratto la nebbia si dirada quel poco che basta a fargli vedere dove mette i piedi senza doverlo indovinare. Rinaldo cammina con la lama ancora sguainata, non perché si aspetti qualcosa — il corpo, semplicemente, non si fida più di rimetterla via.

Il campanellino gli batte contro l'anca a ogni passo, silenzioso, ma non più come un peso morto. Ora sa cosa può fare. Questo dovrebbe bastare a rassicurarlo, e in parte ci riesce — ma sotto la rassicurazione c'è anche un pensiero più freddo, quello che non ha ancora avuto il coraggio di finire: quante volte può ancora aiutarmi, prima che non ci sia più nessuno a fermare la cosa che verrà dopo.`, en: `The path climbs up out of the shallow water toward firmer ground, and for a stretch the fog thins just enough to let him see where he's putting his feet without having to guess. Rinaldo walks with his blade still drawn, not because he expects anything — his body, simply, no longer trusts putting it away.

The campanellino knocks against his hip with every step, silent, but no longer like dead weight. He knows what it can do now. That should be enough to reassure him, and it partly does — but underneath the reassurance there's also a colder thought, one he still hasn't had the courage to finish: how many more times can it help him, before there's no one left to stop whatever comes next.` } },
      { img: 'assets/storia/scena16/panel-02.jpg', text: { it: `Un basso muro di pietra a secco emerge dalla nebbia prima ancora dell'edificio a cui appartiene — e poi eccolo, un piccolo oratorio, tetto in parte crollato, la porta di legno marcita fino a diventare poco più di un'assenza nello stipite. Non è segnato su nessuna mappa che abbia visto al villaggio. Qualcuno lo ha costruito, e poi qualcuno ha smesso di occuparsene, e la differenza tra le due cose si legge in ogni pietra.

Rinaldo si ferma un momento sulla soglia, poi entra.`, en: `A low dry-stone wall emerges from the fog before the building it belongs to does — and then there it is, a small oratory, its roof partly collapsed, the wooden door rotted down to little more than a gap in the frame. It isn't marked on any map he's seen at the village. Someone built it, and then someone stopped tending it, and the difference between the two shows in every stone.

Rinaldo pauses a moment on the threshold, then goes in.` } },
      { img: 'assets/storia/scena16/panel-02b.jpg', text: { it: `Dentro, una sola stanza vuota. Niente altare, niente immagine sacra a cui rivolgersi — solo pietra nuda, umidità che ha annerito gli angoli, foglie marce spinte contro il muro di fondo da chissà quante stagioni di vento.

Davanti al muro di fondo, mezzo marcito, un inginocchiatoio di legno — il cuscino che un tempo doveva imbottirlo ridotto a uno straccio sfondato, la paglia che lo riempiva ormai schiacciata e visibile attraverso lo strappo. Il legno del bordo, dove le ginocchia si sono posate migliaia di volte, è consumato e chiaro rispetto al resto, liscio come pietra levigata da un fiume — non da una singola visita, da anni. Lungo lo stesso bordo, incise nel legno, una fila di piccole tacche, ordinate, contate una per una — non sa dire per cosa, ma il corpo capisce prima della mente cosa significhi contare qualcosa giorno dopo giorno, nello stesso posto, per anni.`, en: `Inside, a single empty room. No altar, no sacred image to turn to — only bare stone, damp that has blackened the corners, rotten leaves pushed against the far wall by who knows how many seasons of wind.

In front of the far wall, half-rotten, a wooden kneeler — the cushion that must once have padded it reduced to a torn, flattened rag, the straw that filled it now crushed and visible through the split. The wood along the edge, where knees have rested a thousand times, is worn pale, lighter than the rest, smooth like stone polished by a river — not from a single visit, from years. Along that same edge, cut into the wood, a row of small tally marks, evenly spaced, counted one by one — he can't say what for, but the body understands before the mind does what it means to count something day after day, in the same place, for years.` } },
      { img: 'assets/storia/scena16/panel-03.jpg', text: { it: `Sul muro di fondo, all'altezza degli occhi, qualcosa è inciso nella pietra. Non un'iscrizione da scalpellino — i solchi sono irregolari, la mano di qualcuno più abituato a tenere una penna che uno scalpello, ma comunque una mano che sapeva scrivere, cosa che la donna che ha consumato quell'inginocchiatoio anno dopo anno, quasi certamente, non sapeva fare.

*"Visse qui in penitenza, convinta della propria colpa. Verso la fine capì: la cosa non era lei. Era l'altra."*

Rinaldo la legge due volte. La seconda volta a voce bassa, quasi senza volerlo, come se dirla piano potesse renderla meno vera o più vera, non sa bene quale delle due lo spaventi di più.`, en: `On the far wall, at eye level, something is carved into the stone. Not the work of a stonemason — the grooves are irregular, the hand of someone more used to holding a pen than a chisel, but a hand that could write all the same, something the woman who wore down that kneeler year after year almost certainly couldn't do.

*"She lived here in penance, convinced of her own guilt. Near the end she understood: the thing was not her. It was the other."*

Rinaldo reads it twice. The second time under his breath, almost without meaning to, as if saying it quietly might make it less true, or more true — he isn't sure which of the two frightens him more.` } },
      { img: 'assets/storia/scena16/panel-04.jpg', text: { it: `Non ha idea di chi l'abbia scritto — un prete di passaggio, forse, uno di quelli che ogni tanto si spingono fin nei luoghi più isolati per non lasciare sole le anime in penitenza; qualcuno che l'ha conosciuta, l'ha ascoltata, e ha inciso queste parole quando lei non poteva più farlo da sola, o non ha mai saputo come. Non ha idea di quando. Ma l'inginocchiatoio consumato e le tacche gli bastano a chiudere il cerchio, senza bisogno di altro: una donna ha vissuto qui, anni, convinta di una colpa che si portava dentro — e solo alla fine, a quanto pare, ha smesso di crederci.

*Questa donna non era come Beatrice,* pensa. *Ha fatto qualcosa, con le proprie mani — quello che il Lampo gli mostrerà tra poco non assomiglierà a niente di quello che ricorda di lei. Eppure, alla fine, qualcuno ha scritto per lei che la colpa non era sua. Che c'era un'altra.*

Non è una certezza, e Rinaldo lo sa. Non gli dice niente di preciso su questa donna, su quello che ha fatto, sul perché. Ma è la prima volta che trova qualcosa fuori dalla sua stessa testa — una pietra, una mano estranea, morta chissà da quanto — a nominare l'altra prima ancora che lui trovasse le parole per farlo. Se un'altra persona, in un altro tempo, senza sapere niente di Beatrice, è arrivata alla stessa idea, allora forse non è solo la disperazione di un marito che si rifiuta di vedere. Forse è più vecchia di lui. Più vecchia di entrambi.

Allunga una mano, quasi senza deciderlo, e tocca i solchi incisi — freddi, ruvidi sotto le dita, l'umidità della pietra che gli si attacca alla pelle. Nello stesso istante il campanellino, appeso al fianco, si fa freddo — non il freddo della nebbia, un freddo che sembra venire da dentro il metallo stesso.`, en: `He has no idea who wrote it — a passing priest, maybe, one of those who sometimes push all the way into the most isolated places so that penitent souls aren't left alone; someone who knew her, listened to her, and carved these words when she could no longer do it herself, or never knew how. He has no idea when. But the worn kneeler and the tally marks are enough to close the circle, without needing anything else: a woman lived here, for years, carrying a guilt inside her — and only at the end, it seems, did she stop believing it.

*This woman wasn't like Beatrice,* he thinks. *She did something, with her own hands — what the vision is about to show him won't resemble anything of what he remembers of her. And yet, in the end, someone wrote for her that the guilt wasn't hers. That there was another.*

It isn't certainty, and Rinaldo knows it. It tells him nothing precise about this woman, about what she did, about why. But it's the first time he finds something outside his own head — a stone, a stranger's hand, dead who knows how long — naming the other before he could find the words for it himself. If another person, in another time, knowing nothing of Beatrice, arrived at the same idea, then maybe it isn't only the desperation of a husband who refuses to see. Maybe it's older than him. Older than both of them.

He reaches out a hand, almost without deciding to, and touches the carved grooves — cold, rough under his fingers, the stone's dampness clinging to his skin. In that same instant the campanellino, hanging at his side, turns cold — not the cold of the fog, a cold that seems to come from inside the metal itself.` } },
      { img: 'assets/storia/scena16/panel-05.jpg', text: { it: `*[LP]Una mano che stringe un cucchiaio di legno sopra una scodella fumante, in una cucina che non è quella di Beatrice.*`, en: `*[LP]A hand gripping a wooden spoon over a steaming bowl, in a kitchen that isn't Beatrice's.*` } },
      { img: 'assets/storia/scena16/panel-06.jpg', text: { it: `*[LP]Un'altra mano, più vecchia, che intreccia una corda sottile mentre canta qualcosa sottovoce — le parole non si distinguono, solo la cadenza, la stessa cadenza di sempre.*`, en: `*[LP]Another hand, older, weaving a thin cord while singing something under her breath — the words don't come through, only the cadence, the same cadence as always.*` } },
      { img: 'assets/storia/scena16/panel-08-v2.jpg', text: { it: `*[LP]Un fiume, una veste che scompare sotto la superficie grigia, un grido soffocato dall'acqua prima ancora di uscire dalla gola. La stessa acqua, poco dopo — o poco prima, non è chiaro quale — la donna immobile nella corrente bassa, e accanto a lei due sagome piccole e indistinte che galleggiano a faccia in giù, ferme, mosse appena dalla corrente. Ogni immagine si interrompe un istante prima o un istante dopo — mai il gesto stesso, mai il momento esatto, solo quello che viene subito prima o quello che resta subito dopo, ripetuto con mani diverse, volti diversi, in luoghi che non sembrano essere lo stesso luogo né lo stesso tempo.*`, en: `*[LP]A river, a garment vanishing beneath the grey surface, a scream smothered by the water before it can even leave the throat. The same water, a moment later — or a moment before, it isn't clear which — the woman motionless in the shallow current, and beside her two small indistinct shapes floating face-down, still, barely stirred by the current. Every image cuts off an instant before or an instant after — never the act itself, never the exact moment, only what comes just before or what's left just after, repeated with different hands, different faces, in places that don't seem to be the same place or the same time.*` } },
      { img: 'assets/storia/scena16/panel-08b.jpg', text: { it: `Rinaldo si ritrova piegato in avanti, una mano ancora contro la pietra, l'altra stretta al petto attorno al campanellino senza ricordare di averla portata lì. Il fiato gli esce a scatti, come dopo una corsa che il corpo non ha fatto. Non erano ricordi suoi. Non erano nemmeno — ne è quasi certo, per quanto la certezza su queste cose gli sembri sempre più un lusso che non può permettersi — ricordi di Beatrice.

*Quante altre,* pensa, e la domanda gli pesa più di quanto si aspettasse. *Quante altre madri, quante altre notti, quante altre volte prima che arrivasse fino a lei.*`, en: `Rinaldo finds himself doubled over, one hand still against the stone, the other clutched to his chest around the campanellino without remembering putting it there. His breath comes in gasps, like after a run his body never made. They weren't his memories. They weren't even — he's almost certain, though certainty about these things feels more and more like a luxury he can't afford — Beatrice's.

*How many others,* he thinks, and the question weighs on him more than he expected. *How many other mothers, how many other nights, how many other times before it reached her.*` } },
      { img: 'assets/storia/scena16/panel-09.jpg', text: { it: `Esce all'aperto più in fretta di quanto sarebbe necessario, come se l'aria ferma della stanza di pietra potesse ancora trattenerlo. Fuori la nebbia lo aspetta uguale a prima, indifferente a quello che ha appena visto.

Cammina ancora per un tratto, il pensiero della pietra e del Lampo che gli resta addosso come l'umidità sui vestiti, prima che un movimento, lontano, oltre una fila di alberi spogli, gli faccia fermare il passo di colpo.

È lei. O è quella cosa che porta il suo nome sbagliato — Rinaldo non ha ancora deciso come chiamarla dentro di sé, e in questo momento non ha nemmeno il tempo di provarci.

La sagoma incappucciata si muove tra gli alberi con lo stesso passo innaturale della prima volta, né lento né rapido, il cappuccio che non lascia mai intravedere niente sotto — non un profilo, non un'ombra di volto, solo il buio che un cappuccio dovrebbe contenere e invece sembra contenere qualcosa di più fitto del buio normale. Questa volta, però, vede anche la corda: le pende da una mano — se di mano si tratta — trascinata a mezz'aria dietro di lei, e lungo la corda, a intervalli, delle piccole forme — troppo piccole, troppo immobili — che l'oscillazione del passo fa dondolare appena. Non distingue altro. Non riesce a distinguere altro, e in un angolo di sé è quasi grato di non riuscirci.`, en: `He steps outside faster than necessary, as if the still air of the stone room might still hold him back. Outside the fog waits for him just as before, indifferent to what he's just seen.

He walks on for a while, the thought of the stone and the vision still clinging to him like damp on his clothes, before a movement, far off, past a row of bare trees, stops him dead.

It's her. Or it's the thing that carries her name wrongly — Rinaldo hasn't decided yet what to call it inside himself, and right now he doesn't even have time to try.

The hooded shape moves among the trees with the same unnatural gait as the first time, neither slow nor fast, the hood never letting anything show underneath — no profile, no shadow of a face, only a darkness a hood should contain and instead seems to hold something denser than ordinary dark. This time, though, he sees the cord too: it hangs from a hand — if it is a hand — dragged through the air behind her, and along the cord, at intervals, small shapes — too small, too still — that the sway of her stride makes barely swing. He can't make out anything else. He can't manage to make out anything else, and in some corner of himself he's almost grateful he can't.` } },
      { img: 'assets/storia/scena16/panel-10.jpg', text: { it: `Il primo istinto è lo stesso di sempre — abbassarsi, restare invisibile. Ma qualcosa in lui questa volta lo rifiuta, con una violenza che lo sorprende più della paura stessa. Non dopo l'iscrizione. Non con quelle forme piccole e indistinte che pendono dalla corda, troppo piccole per essere altro da quello che il suo istinto grida che siano.

Si getta avanti senza deciderlo davvero, il muretto a secco già alle spalle, i piedi che affondano nel terreno molle mentre corre verso la radura. *[R]"Fermati!"* Non gli esce come un ordine — gli esce come una richiesta, quasi una preghiera, la voce che si spezza sulla seconda sillaba.`, en: `The first instinct is the same as always — crouch down, stay unseen. But something in him refuses this time, with a violence that surprises him more than the fear itself. Not after the inscription. Not with those small, indistinct shapes hanging from the cord, too small to be anything other than what his instinct is screaming they are.

He throws himself forward without really deciding to, the dry-stone wall already behind him, his feet sinking into the soft ground as he runs toward the clearing. *[R]"Stop!"* It doesn't come out as an order — it comes out as a request, almost a prayer, his voice breaking on the second syllable.` } },
      { img: 'assets/storia/scena16/panel-11.jpg', text: { it: `La sagoma non accelera. Non sembra nemmeno accorgersi di lui. Eppure la distanza tra loro non si accorcia di un passo — come se lo spazio stesso, tra Rinaldo e quella cosa, si allungasse alla stessa velocità con cui lui cerca di divorarlo. Attraversa la radura con lo stesso passo indifferente di sempre, diretta verso qualcosa che solo lei conosce, in una direzione precisa che non ha nulla a che fare con Rinaldo.`, en: `The shape doesn't speed up. It doesn't even seem to notice him. And yet the distance between them doesn't close by a single step — as if the space itself, between Rinaldo and that thing, kept stretching at exactly the speed he tries to devour it. It crosses the clearing with the same indifferent pace as always, heading toward something only it knows, in a precise direction that has nothing to do with Rinaldo.` } },
      { img: 'assets/storia/scena16/panel-12.jpg', text: { it: `Corre finché il fiato non gli basta più, aspettandosi — sperando, senza nemmeno ammetterlo a se stesso — che il calore torni, che il campanellino gli dia la stessa forza che gli ha dato sull'argine. Non succede niente. Nessun calore, nessun freddo, nessuna presenza. Solo un pezzo di metallo che gli sbatte contro l'anca a ogni passo, ordinario come una pietra.`, en: `He runs until his breath fails him, expecting — hoping, without even admitting it to himself — that the warmth will come back, that the campanellino will give him the same strength it gave him on the embankment. Nothing happens. No warmth, no cold, no presence. Only a piece of metal knocking against his hip with every step, as ordinary as a stone.` } },
      { img: 'assets/storia/scena16/panel-13.jpg', text: { it: `Le gambe cedono prima della volontà. Cade in avanti sulle mani e le ginocchia, il fiato che gli brucia in gola, la nebbia che gli si stringe intorno più fitta di quanto sembrasse un momento fa. Quando riesce a rialzare lo sguardo, la sagoma è già solo un'ombra più scura tra le altre ombre, e poi nemmeno quello.

Resta lì, a quattro zampe nel fango gelato, per un tempo che non saprebbe misurare. Non è la stanchezza a tenerlo a terra. È il vuoto — quel silenzio del campanellino che si aggiunge a tutto il resto, un'assenza in più in una giornata che ne ha già portate troppe.

*Perché non mi ha aiutato,* pensa, e la domanda gli fa più male di quanto si aspettasse — più della corsa, più delle ginocchia sbucciate contro la terra dura. *Se può salvarmi una volta, perché non sempre? Cosa le impedisce di esserci, proprio adesso che ne avrei più bisogno?*

Non trova una risposta. Si rialza soltanto quando il corpo smette di tremare abbastanza da fidarsi di se stesso di nuovo, e riprende a camminare — nella stessa direzione di prima, verso qualunque cosa lo aspetti ancora oltre la nebbia.`, en: `His legs give out before his will does. He falls forward onto his hands and knees, breath burning in his throat, the fog closing in around him thicker than it seemed a moment ago. When he manages to lift his eyes, the shape is already just a darker shadow among the other shadows, and then not even that.

He stays there, on all fours in the freezing mud, for a stretch of time he couldn't measure. It isn't exhaustion keeping him down. It's the emptiness — that silence from the campanellino added to everything else, one more absence in a day that has already carried too many.

*Why didn't it help me,* he thinks, and the question hurts more than he expected — more than the run, more than his knees scraped raw against the hard ground. *If it can save me once, why not always? What keeps it from being there, exactly now that I need it most?*

He finds no answer. He gets up only when his body stops shaking enough to trust itself again, and starts walking — in the same direction as before, toward whatever still waits for him beyond the fog.` } }
    ]
  },
  {
    id: 'S17',
    title: { it: 'Scena 17 — Il Marito', en: 'Scene 17 — The Husband' },
    panels: [
      { img: 'assets/storia/scena17/panel-01.jpg', text: { it: `Rinaldo si rialza quando il corpo smette di tremare abbastanza da fidarsi di nuovo di se stesso, e riprende a camminare nella stessa direzione di prima — non perché sappia cosa lo aspetta, ma perché fermarsi, in questo momento, gli sembra più pericoloso che continuare.

La nebbia non si dirada, ma cambia consistenza — meno acqua, più fumo, come se qualcosa la stesse bruciando da qualche parte davanti a lui. Poi lo sente: un colpo secco, legno contro legno, e poi un altro, alla stessa distanza esatta dal primo. Non il rumore di un ramo che cade, non il vento. Qualcuno sta spaccando legna, con la regolarità ostinata di chi lo fa da una vita.

È il suono più ordinario che abbia sentito da giorni, e proprio per questo lo disorienta più di un grido lo farebbe.`, en: `Rinaldo gets up when his body stops shaking enough to trust itself again, and starts walking in the same direction as before — not because he knows what awaits him, but because stopping, right now, feels more dangerous than going on.

The fog doesn't thin, but it changes texture — less water, more smoke, as if something were burning somewhere ahead of him. Then he hears it: a sharp crack, wood against wood, and then another, at the exact same distance from the first. Not the sound of a falling branch, not the wind. Someone is splitting logs, with the stubborn regularity of someone who has done it their whole life.

It's the most ordinary sound he's heard in days, and that's exactly why it unsettles him more than a scream would.` } },
      { img: 'assets/storia/scena17/panel-02.jpg', text: { it: `Segue il rumore finché la nebbia non gli mostra cosa lo genera: un casolare basso, il tetto rattoppato più volte con materiali diversi, un piccolo fienile addossato al fianco. Fumo sottile da un comignolo storto. Un orto piccolo, curato solo quel tanto che basta a tenerlo vivo, non un filo di più.

Un uomo anziano è fermo davanti a un ceppo, l'ascia sollevata a metà del prossimo colpo. Si è fermato senza voltarsi del tutto — ha sentito i passi di Rinaldo nel fango prima ancora di vederlo.`, en: `He follows the sound until the fog shows him what's making it: a low farmhouse, its roof patched more than once with mismatched materials, a small barn leaning against one side. Thin smoke from a crooked chimney. A small vegetable patch, kept just alive enough, not a thread more.

An old man stands before a stump, axe raised halfway through the next swing. He has stopped without fully turning around — he heard Rinaldo's footsteps in the mud before he even saw him.` } },
      { img: 'assets/storia/scena17/panel-03.jpg', text: { it: `*[BA]"Chi sei."* Non è una domanda, è un'accusa vestita da domanda. L'ascia resta dov'è, ferma a mezz'aria, i muscoli dell'avambraccio ancora tesi come se il colpo potesse ripartire in qualsiasi istante. Negli occhi del vecchio non c'è paura — solo un calcolo silenzioso, lo sguardo di chi ha imparato a misurare un pericolo prima ancora di sapere se lo è davvero. Rinaldo resta immobile, a distanza, e per un momento nessuno dei due sembra intenzionato a essere il primo a muoversi.`, en: `*[BA]"Who are you."* It isn't a question, it's an accusation dressed as one. The axe stays where it is, frozen mid-air, the muscles of his forearm still tensed as if the blow could resume at any instant. There's no fear in the old man's eyes — only a silent calculation, the look of someone who has learned to measure a danger before even knowing whether it is one. Rinaldo stays still, at a distance, and for a moment neither of them seems willing to be the first to move.` } },
      { img: 'assets/storia/scena17/panel-04.jpg', text: { it: `*[R]"Un viandante."* Rinaldo tiene le mani visibili, lontane dalla lama alla cintura. *[R]"Non voglio niente che sia tuo. Ho visto il fumo."*

Il vecchio lo guarda a lungo — non il volto, prima: le mani, i vestiti, il modo in cui sta in piedi. Quello che vede sembra bastargli, o forse è solo troppo stanco per continuare a diffidare. Abbassa l'ascia, la infila nel ceppo con un colpo secco che la lascia dritta, piantata.

*[BA]"Non ho niente da offrirti. Un fuoco, se ti basta."*

Si siedono fuori, vicino al ceppo — il vecchio non lo invita dentro, e Rinaldo non chiede.

*[R]"Vivi solo, qui."*

*[BA]"Da un pezzo."* Guarda il fuoco che ha acceso in una piccola fossa di pietre, non Rinaldo. *[BA]"Il villaggio è a mezza giornata da qui. Non ci vado, se posso evitarlo."*

*[R]"Perché?"*

Silenzio. Poi: *[BA]"Sei tu quello della donna bruciata."* Non è crudele — è solo un fatto che gli è arrivato, e che ha riconosciuto. *[BA]"La notizia arriva anche qui, alla fine. Sempre in ritardo, ma arriva."*

Rinaldo non nega. *[R]"Sì."*

*[BA]"E cerchi cosa. Vendetta? Una risposta?"*

*[R]"Non lo so più."* La stessa risposta che ha dato all'eremita, e lo sorprende scoprire quanto sia ancora vera. *[R]"Voglio solo capire cosa è successo davvero. A lei. Ai miei figli."*

Il vecchio annuisce, piano, come se quella risposta gli avesse tolto qualcosa da addosso invece di aggiungerlo. Passa un momento lungo, in cui l'unico suono è il fuoco.`, en: `*[R]"A traveler."* Rinaldo keeps his hands visible, away from the blade at his belt. *[R]"I want nothing that's yours. I saw the smoke."*

The old man studies him for a long moment — not the face, first: the hands, the clothes, the way he stands. Whatever he sees seems to be enough, or maybe he's simply too tired to keep distrusting. He lowers the axe, sinks it into the stump with a sharp blow that leaves it standing straight.

*[BA]"I have nothing to offer you. A fire, if that's enough."*

They sit outside, near the stump — the old man doesn't invite him in, and Rinaldo doesn't ask.

*[R]"You live alone, here."*

*[BA]"For a good while now."* He looks at the fire he's lit in a small ring of stones, not at Rinaldo. *[BA]"The village is half a day from here. I don't go, if I can help it."*

*[R]"Why?"*

Silence. Then: *[BA]"You're the one with the burned woman."* It isn't cruel — it's simply a fact that reached him, and that he recognized. *[BA]"News gets here too, eventually. Always late, but it gets here."*

Rinaldo doesn't deny it. *[R]"Yes."*

*[BA]"And you're looking for what. Revenge? An answer?"*

*[R]"I don't know anymore."* The same answer he gave the hermit, and he's surprised to find it's still true. *[R]"I just want to understand what really happened. To her. To my children."*

The old man nods, slowly, as if that answer had taken something off him instead of adding to it. A long moment passes, in which the only sound is the fire.` } },
      { img: 'assets/storia/scena17/panel-05.jpg', text: { it: `*[R]"Sono passato da un oratorio, prima di arrivare qui."* Rinaldo lo dice senza pensarci troppo, solo per riempire il silenzio. *[R]"Una stanza di pietra. Un inginocchiatoio consumato. Un'iscrizione."*

Il vecchio si irrigidisce — non un movimento grande, solo le spalle che si alzano di un niente, le mani che si fermano sulle ginocchia.

*[BA]"Lo conosci."* Non è una domanda, questa volta.`, en: `*[R]"I passed a small oratory, before I got here."* Rinaldo says it without thinking much, just to fill the silence. *[R]"A stone room. A worn kneeler. An inscription."*

The old man stiffens — not a large movement, just his shoulders rising a fraction, his hands going still on his knees.

*[BA]"You know it."* It isn't a question, this time.` } },
      { img: 'assets/storia/scena17/panel-06.jpg', text: { it: `Non risponde subito. Quando lo fa, la voce gli è cambiata — più bassa, più lenta.

*[BA]"L'ho costruito io. Quel muro, quel tetto — con le mie mani, tanti anni fa."* Una pausa. *[BA]"Per lei. Perché non sapevo dove altro metterla, e non potevo lasciarla in un fosso come un animale, qualunque cosa avesse fatto."*

*[R]"Chi era?"*

*[BA]"Mia moglie."* Il nome gli esce come se lo tenesse chiuso da tempo, con cura, per non consumarlo. *[BA]"Agnese."*

Rinaldo aspetta. Non fa altre domande — ha imparato, con l'eremita, che certe cose vanno lasciate arrivare da sole, o non arrivano affatto.

*[BA]"Ero un soldato."* Guarda le proprie mani — nodose, segnate, mani che hanno tenuto un'arma molto più a lungo di quanto Rinaldo abbia mai tenuto la sua. *[BA]"Vent'anni a portare la spada per il mio signore, da prima che nascessero i bambini. Tu curi le ferite. Io le ho sempre fatte — quello mi ha insegnato il mestiere, non a salvare nessuno."* Una pausa. *[BA]"Un giorno è arrivata voce, al villaggio, che ero morto in battaglia. Non ero io — un altro caduto, un nome confuso con il mio nella fretta di contare i corpi. Ci ho messo settimane a saperlo, e altrettante a tornare a casa."* Il fuoco scoppietta nel silenzio che segue. *[BA]"Lei l'ha saputo prima di me. E ci ha creduto."*`, en: `He doesn't answer right away. When he does, his voice has changed — lower, slower.

*[BA]"I built it myself. That wall, that roof — with my own hands, many years ago."* A pause. *[BA]"For her. Because I didn't know where else to put her, and I couldn't leave her in a ditch like an animal, whatever she'd done."*

*[R]"Who was she?"*

*[BA]"My wife."* The name comes out of him as if he'd kept it shut away for a long time, carefully, so as not to wear it out. *[BA]"Agnese."*

Rinaldo waits. He asks nothing else — he's learned, with the hermit, that certain things have to arrive on their own, or they don't arrive at all.

*[BA]"I was a soldier."* He looks at his own hands — gnarled, marked, hands that held a weapon far longer than Rinaldo has ever held his. *[BA]"Twenty years carrying a sword for my lord, since before the children were born. You tend wounds. I always made them — that's what the trade taught me, not how to save anyone."* A pause. *[BA]"One day, word reached the village that I'd died in battle. It wasn't me — another man fallen, a name confused with mine in the rush to count the bodies. It took me weeks to learn of it, and just as many to get home."* The fire crackles in the silence that follows. *[BA]"She learned before I did. And she believed it."*` } },
      { img: 'assets/storia/scena17/panel-07.jpg', text: { it: `Il vecchio si ferma. Rinaldo non lo spinge a continuare — ma il silenzio stesso, questa volta, è già una risposta che nessuno dei due vuole dire a voce alta.

*[BA]"Non so cosa le sia passato per la testa quella notte, e ho smesso di cercare di saperlo tanti inverni fa."* La voce gli trema, appena, per la prima volta. *[BA]"So solo che li amava. Che mi amava. E che qualcosa, in lei, in quella notte, si è rotto in un modo che io non ho mai visto rompersi in nessun altro. Non un mostro. Non una strega. Solo... rotta."*

*[R]"E i bambini—"* Rinaldo non riesce a finire la domanda.

*[BA]"Non sono usciti dall'acqua."* Detto piatto, senza colore, come una frase ripetuta così tante volte da aver smesso di fare male nel modo in cui fa male la prima volta. *[BA]"Lei sì. Qualcuno l'ha tirata fuori, non so chi, non l'ho mai chiesto. È vissuta ancora tanti anni, dopo. Il villaggio non l'ha uccisa — l'hanno lasciata vivere, in penitenza, in quel posto. Forse era peggio che ucciderla. Non lo so."*`, en: `The old man stops. Rinaldo doesn't push him to continue — but the silence itself, this time, is already an answer neither of them wants to say out loud.

*[BA]"I don't know what went through her head that night, and I stopped trying to know many winters ago."* His voice shakes, just slightly, for the first time. *[BA]"I only know she loved them. That she loved me. And that something in her, that night, broke in a way I've never seen break in anyone else. Not a monster. Not a witch. Just... broken."*

*[R]"And the children—"* Rinaldo can't finish the question.

*[BA]"They didn't come out of the water."* Said flat, without color, like a sentence repeated so many times it has stopped hurting the way it hurts the first time. *[BA]"She did. Someone pulled her out, I don't know who, I never asked. She lived on for many years after that. The village didn't kill her — they let her live, in penance, in that place. Maybe it was worse than killing her. I don't know."*` } },
      { img: 'assets/storia/scena17/panel-08.jpg', text: { it: `*[R]"L'hai abbandonata?"*

Il vecchio scuote la testa, piano, ma non con la certezza di chi nega una colpa. *[BA]"Non ho più potuto chiamarla mia moglie. Non dopo. Non riuscivo nemmeno a guardarla senza vedere anche l'altra cosa, quella notte, sovrapposta a tutto il resto."* Una pausa lunga. *[BA]"Ma non me ne sono andato del tutto. Le portavo cibo, una coperta quando l'inverno si faceva duro. Certe volte mi sedevo fuori dal Sacello, in silenzio, per ore, senza entrare. Lei sapeva che ero lì. Non parlavamo quasi mai."* Un'altra pausa, più pesante. *[BA]"Sono rimasto vicino a lei, in un modo, fino al giorno in cui è morta. Solo mai abbastanza vicino da poterla chiamare ancora mia moglie. Non so se questo conta come esserci stato, o come un altro modo di abbandonarla."*

*[R]"E tu, adesso?"*

*[BA]"Io non sono più tornato in quella casa. E non potevo nemmeno stare nel villaggio, dove ogni faccia che incontravo sapeva, e mi guardava sapendo."* Alza gli occhi su Rinaldo, per la prima volta da un po'. *[BA]"Tu capisci questo, credo. Meglio di chiunque altro io abbia incontrato."*

*[R]"Perché mi racconti questo?"* chiede infine Rinaldo.

*[BA]"Perché hai gli occhi di uno che sta ancora decidendo se la sua donna sia un mostro o solo qualcuno che amava troppo per reggere quello che le è successo intorno."* Una pausa. *[BA]"Io non ho una risposta per te. Ma so che quelle due cose, a volte, sono la stessa persona."*

Rinaldo si alza. Il vecchio non lo trattiene — annuisce una volta, e torna al ceppo, all'ascia, al ritmo ostinato che lo ha portato fin qui.`, en: `*[R]"Did you abandon her?"*

The old man shakes his head, slowly, but not with the certainty of someone denying a guilt. *[BA]"I couldn't call her my wife anymore. Not after. I couldn't even look at her without seeing that other thing too, that night, laid over everything else."* A long pause. *[BA]"But I never left entirely. I brought her food, a blanket when winter turned hard. Sometimes I'd sit outside the shrine, in silence, for hours, without going in. She knew I was there. We hardly ever spoke."* Another pause, heavier. *[BA]"I stayed close to her, in a way, until the day she died. Just never close enough to call her my wife again. I don't know if that counts as having stayed, or as just another way of abandoning her."*

*[R]"And you, now?"*

*[BA]"I never went back to that house. And I couldn't stay in the village either, where every face I met knew, and looked at me knowing."* He raises his eyes to Rinaldo, for the first time in a while. *[BA]"You understand this, I think. Better than anyone else I've met."*

*[R]"Why are you telling me this?"* Rinaldo finally asks.

*[BA]"Because you have the eyes of a man still deciding whether his woman is a monster, or just someone who loved too much to bear what happened around her."* A pause. *[BA]"I don't have an answer for you. But I know that those two things, sometimes, are the same person."*

Rinaldo gets up. The old man doesn't hold him back — he nods once, and returns to the stump, to the axe, to the stubborn rhythm that brought him this far.` } },
      { img: 'assets/storia/scena17/panel-09.jpg', text: { it: `Cammina senza una direzione precisa, finché il casolare e il fumo non sono più che una macchia grigia dietro di lui. Si ferma quando le gambe smettono di rispondergli come dovrebbero. Non è stanchezza. È il peso di ogni parola del vecchio che si è sistemato da qualche parte dentro il petto e adesso pretende spazio, tutto insieme, senza permesso.

*[R]"Anche lei mi amava,"* pensa, e la frase gli si ripete da sola, con la voce di Bastiano invece che con la propria. *Amava anche i suoi figli. Ed è bastato un attimo, una notizia sbagliata, una paura più grande di quanto un cuore possa reggere.*

Scivola a sedere contro un albero, le ginocchia al petto, e per la prima volta da quando è entrato nella nebbia piange senza cercare di fermarsi.

*[R]"Beatrice,"* dice, a voce alta, a nessuno, alla nebbia. *[R]"Beatrice, dimmi che non l'hai fatto anche tu."*`, en: `He walks without any clear direction, until the farmhouse and the smoke are nothing more than a grey smear behind him. He stops when his legs stop answering the way they should. It isn't tiredness. It's the weight of every word the old man said, settled somewhere inside his chest and now demanding space, all at once, without permission.

*[R]"She loved me too,"* he thinks, and the sentence repeats itself on its own, in Bastiano's voice instead of his own. *She loved her children too. And it took only a moment, a piece of wrong news, a fear bigger than a heart can hold.*

He slides down to sit against a tree, knees to his chest, and for the first time since entering the fog he cries without trying to stop.

*[R]"Beatrice,"* he says, aloud, to no one, to the fog. *[R]"Beatrice, tell me you didn't do it too."*` } },
      { img: 'assets/storia/scena17/panel-10.jpg', text: { it: `Il campanellino, contro il suo fianco, comincia a scaldarsi.`, en: `The campanellino, against his side, begins to grow warm.` } },
      { img: 'assets/storia/scena17/panel-11.jpg', text: { it: `Non è come le altre volte — non un lampo che arriva e se ne va prima che lui possa afferrarlo. Il calore cresce piano, costante, finché l'aria davanti a lui non comincia a piegarsi in una forma che conosce.

Lei è lì prima ancora che lui smetta di piangere abbastanza da vederla bene. Questa volta, però, non aspetta. Si china verso di lui — il gesto di qualcuno che si inginocchia accanto a chi soffre.

*[LP]"Cosa c'è."* Nella voce c'è un'urgenza che non aveva mai avuto prima. *[LP]"Perché piangi così."*

*[LP]"Dicono—"* Si ferma. Ricomincia. *[LP]"Al villaggio dicono che hai ucciso i nostri figli. Con le tue mani."* La voce gli si spezza sull'ultima parola. *[LP]"Ho appena sentito una storia — una donna, come te, che amava suo marito e i suoi figli più di ogni altra cosa, e che comunque... Non so più a chi credere, Beatrice."*

Il silenzio che segue dura più di quanto Rinaldo riesca a sopportare. Quando lei parla, la voce non ha la fermezza di chi nega qualcosa che sa di aver fatto — ha lo smarrimento di chi viene accusata di un delitto in una lingua che non conosce.

*[LP]"Non lo so. Non ricordo — non ricordo di aver fatto una cosa simile. Non riuscirei mai—"* La voce si incrina, non di colpa, ma di un dolore genuino, di chi si trova improvvisamente estranea a sé stessa. *[LP]"Perché mi chiedi questo? Perché mi guardi come se avessi paura di me?"*

Rinaldo non risponde. Non riesce.

E allora, invece di una risposta che nessuno dei due può darsi, il mondo intorno a lui comincia a cedere — non si dissolve nel nulla, si riempie.`, en: `It isn't like the other times — not a flash that arrives and leaves before he can hold onto it. The warmth grows slowly, steadily, until the air in front of him begins to bend into a shape he knows.

She's there before he's even stopped crying enough to see her clearly. This time, though, she doesn't wait. She leans toward him — the gesture of someone kneeling beside a person in pain.

*[LP]"What is it."* There's an urgency in her voice she's never had before. *[LP]"Why are you crying like this."*

*[LP]"They say—"* He stops. Starts again. *[LP]"At the village they say you killed our children. With your own hands."* His voice breaks on the last word. *[LP]"I just heard a story — a woman, like you, who loved her husband and her children more than anything else, and who still... I don't know who to believe anymore, Beatrice."*

The silence that follows lasts longer than Rinaldo can bear. When she speaks, her voice doesn't have the steadiness of someone denying something she knows she did — it has the bewilderment of someone accused of a crime in a language she doesn't know.

*[LP]"I don't know. I don't remember — I don't remember doing anything like that. I could never—"* Her voice cracks, not with guilt, but with genuine pain, the pain of someone suddenly a stranger to herself. *[LP]"Why are you asking me this? Why are you looking at me as if you were afraid of me?"*

Rinaldo doesn't answer. He can't.

And so, instead of an answer neither of them can give, the world around him begins to give way — it doesn't dissolve into nothing, it fills.` } },
      { img: 'assets/storia/scena17/panel-12.jpg', text: { it: `*[LP]La cascata, di notte, molto prima dei bambini. L'acqua fredda contro le caviglie, il rumore che copre ogni altra cosa. Beatrice ride di qualcosa che lui ha detto — non lo ricorda più cosa, solo il suono di quella risata sopra il rumore dell'acqua, e la sua mano che cerca la sua nel buio senza bisogno di guardare per trovarla. La luna sulla superficie che si spezza in mille pezzi ogni volta che uno dei due si muove.*

Rinaldo sente il freddo dell'acqua come se fosse ancora lì dentro, come se il corpo ricordasse quello che la mente aveva quasi lasciato andare.`, en: `*[LP]The waterfall, at night, long before the children. The cold water against their ankles, the roar covering everything else. Beatrice laughs at something he said — he no longer remembers what, only the sound of that laugh over the noise of the water, and her hand finding his in the dark without needing to look for it. The moon on the surface breaking into a thousand pieces every time one of them moves.*

Rinaldo feels the cold of the water as if he were still in it, as if his body remembered what his mind had almost let go of.` } },
      { img: 'assets/storia/scena17/panel-13.jpg', text: { it: `*[LP]Poi un picnic d'estate, anni dopo, all'ombra di un salice vicino al lago. Beatrice stende un plaid sull'erba, Rinaldo apre il cesto — pane, formaggio, quel poco che serve. Isabella e Ludovico giocano poco distante, un cerchio di legno spinto e guidato con un bastone, la corsa dietro di esso che si fa gara ogni volta che uno dei due lo lascia cadere. Beatrice li guarda un istante, sorride, poi torna a ridere di qualcosa che Rinaldo ha appena detto — il sole caldo sulle spalle, l'ombra del salice che si muove appena col vento, niente da fare per un pomeriggio intero se non restare lì.*`, en: `*[LP]Then a summer picnic, years later, in the shade of a willow near the lake. Beatrice spreads a blanket on the grass, Rinaldo opens the basket — bread, cheese, just what's needed. Isabella and Ludovico play a little way off, a wooden hoop pushed and guided with a stick, the chase after it turning into a race every time one of them lets it fall. Beatrice watches them for a moment, smiles, then goes back to laughing at something Rinaldo has just said — the warm sun on their shoulders, the willow's shade stirring faintly in the wind, nothing to do for an entire afternoon but stay there.*` } },
      { img: 'assets/storia/scena17/panel-14.jpg', text: { it: `*[LP]Beatrice che intreccia i capelli di Isabella davanti al fuoco, canticchiando.*`, en: `*[LP]Beatrice braiding Isabella's hair by the fire, humming to herself.*` } },
      { img: 'assets/storia/scena17/panel-15.jpg', text: { it: `*[LP]Ludovico addormentato contro il suo fianco durante un temporale, la mano di lei che non smette di accarezzargli la testa nemmeno quando pensa che nessuno la guardi.*`, en: `*[LP]Ludovico asleep against her side during a storm, her hand never stopping its slow stroke through his hair even when she thinks no one is watching.*` } },
      { img: 'assets/storia/scena17/panel-16.jpg', text: { it: `*[LP]Poi, l'ultima immagine, la più quieta di tutte: tutti e quattro addormentati nello stesso letto, in una notte che non ricorda quale — Isabella di traverso ai piedi, Ludovico rannicchiato contro il fianco di Beatrice, e le mani, tutte e quattro le mani, sovrapposte e intrecciate senza ordine sopra la coperta, come se anche nel sonno nessuno dei quattro avesse voluto smettere di toccare gli altri.*`, en: `*[LP]Then, the last image, the quietest of all: all four of them asleep in the same bed, on a night he can't place — Isabella sideways across the foot of the bed, Ludovico curled against Beatrice's side, and the hands, all four sets of hands, overlapping and loosely laced together on top of the blanket, as if even in sleep none of the four had wanted to stop touching the others.*` } },
      { img: 'assets/storia/scena17/panel-17.jpg', text: { it: `Rinaldo non riesce più a distinguere cosa sta vedendo da cosa sta sentendo nel proprio corpo — il petto gli si stringe non di dolore, questa volta, ma di qualcosa che gli assomiglia e basta.

*Questo,* pensa, e per la prima volta da quando è entrato nella nebbia non è un pensiero-rifugio, non è una speranza che si costringe a credere. È una certezza che gli sale dal corpo prima ancora che dalla mente, la stessa certezza con cui si riconosce il proprio nome. *Questa donna non avrebbe mai fatto del male a un solo capello dei suoi figli. Qualunque cosa sia successa quella notte, non è mai stata questo.*

Il ricordo si sfalda, lentamente, come una carezza che si ritira invece di essere strappata via. Lei torna a fuoco davanti a lui, la forma già più sottile, più stanca — ma per la prima volta da quando è comparsa, Rinaldo non ha più paura di quello che potrebbe dirgli.

*[LP]"Non so rispondere alla tua domanda,"* dice lei, piano. *[LP]"Ma qualunque cosa tu abbia appena visto — era vero. Tutto quello era vero."*

*[LP]"Lo so,"* dice Rinaldo, e per la prima volta da quando ha pronunciato quella domanda, la sua voce non trema.

Si dissolve piano, non di scatto — come se, questa volta, si stesse congedando invece di essere strappata via.`, en: `Rinaldo can no longer tell what he's seeing from what he's feeling in his own body — his chest tightens, not with pain this time, but with something that merely resembles it.

*This,* he thinks, and for the first time since he entered the fog it isn't a thought he's taking refuge in, isn't a hope he's forcing himself to believe. It's a certainty that rises from his body before it even reaches his mind, the same certainty with which one recognizes one's own name. *This woman would never have harmed a single hair on her children's heads. Whatever happened that night, it was never this.*

The memory unravels, slowly, like a caress withdrawing instead of being torn away. She comes back into focus before him, her form already thinner, more tired — but for the first time since she appeared, Rinaldo is no longer afraid of what she might tell him.

*[LP]"I can't answer your question,"* she says, quietly. *[LP]"But whatever you just saw — it was true. All of it was true."*

*[LP]"I know,"* Rinaldo says, and for the first time since he asked that question, his voice doesn't shake.

She dissolves slowly, not abruptly — as if, this time, she were taking her leave rather than being torn away.` } },
      { img: 'assets/storia/scena17/panel-18.jpg', text: { it: `Rinaldo resta seduto contro l'albero ancora a lungo, il campanellino che si raffredda piano contro il palmo. Non piange più. Non è sollevato — è solo più pieno di quanto fosse un'ora prima, di amore e paura nella stessa misura, senza che l'una riesca a cancellare l'altra.

Si rialza quando il corpo, di nuovo, glielo permette. Riprende a camminare, verso qualunque cosa lo aspetti ancora oltre la nebbia.`, en: `Rinaldo stays sitting against the tree for a long while still, the campanellino slowly cooling against his palm. He isn't crying anymore. He isn't relieved — he's only fuller than he was an hour ago, with love and fear in equal measure, neither one able to erase the other.

He gets up when his body, once again, allows it. He starts walking again, toward whatever still waits for him beyond the fog.` } }
    ]
  }
];

/* ============================================================
   MOTORE (non serve modificarlo per aggiungere scene)
   ============================================================ */
let flat = [];
SCENES.forEach((scene, si) => {
  scene.panels.forEach((p, pi) => {
    flat.push({ sceneIdx: si, panelIdx: pi, sceneTitle: scene.title, img: p.img, text: p.text });
  });
});

let cur = 0;
let playing = false;
let timer = null;
let lang = localStorage.getItem('wtfd_storia_lang') || 'it';

const imgEl = document.getElementById('panel-img');
const textInner = document.getElementById('text-inner');
const textEl = document.getElementById('panel-text');
const sceneTitleEl = document.getElementById('scene-title');
const progressEl = document.getElementById('progress-label');
const playBtn = document.getElementById('play-btn');
const langBtn = document.getElementById('lang-toggle');
const chaptersBtn = document.getElementById('chapters-toggle');
const chaptersOverlay = document.getElementById('chapters-overlay');
const chaptersPanel = document.getElementById('chapters-panel');
const resumeBanner = document.getElementById('resume-banner');
const resumeText = document.getElementById('resume-text');
const resumeRestart = document.getElementById('resume-restart');

const UI = {
  it: { back: '&larr; Indietro', panel: 'Pannello', of: '/', chapters: '&#9776; Capitoli', resume: 'Hai ripreso da: ', restart: 'Ricomincia da capo' },
  en: { back: '&larr; Back', panel: 'Panel', of: '/', chapters: '&#9776; Chapters', resume: 'Resumed from: ', restart: 'Start over' }
};

const PROGRESS_KEY = 'wtfd_storia_progress';

function readingDurationMs(text) {
  const words = text.trim().split(/\s+/).length;
  const secs = Math.max(5, Math.min(28, words / 2.6));
  return secs * 1000;
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderText(raw) {
  return escapeHtml(raw)
    .replace(/\*\[(\w{1,2})\](.+?)\*/g, '<em class="spk-$1">$2</em>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/\n\n/g, '<br><br>');
}

function applyLangChrome() {
  document.querySelector('#topbar a').innerHTML = UI[lang].back;
  langBtn.textContent = lang === 'it' ? 'EN' : 'IT';
  chaptersBtn.innerHTML = UI[lang].chapters;
  document.documentElement.lang = lang;
}

function saveProgress() {
  localStorage.setItem(PROGRESS_KEY, String(cur));
}

function loadProgress() {
  const v = localStorage.getItem(PROGRESS_KEY);
  const n = v === null ? NaN : parseInt(v, 10);
  return (isNaN(n) || n < 0 || n >= flat.length) ? null : n;
}

function buildChaptersMenu() {
  chaptersPanel.innerHTML = '';
  SCENES.forEach((scene, si) => {
    const item = document.createElement('div');
    item.className = 'chapter-item';
    const firstFlatIdx = flat.findIndex(f => f.sceneIdx === si);
    item.innerHTML = '<span>' + scene.title[lang] + '</span><span class="chip">' + scene.panels.length + ' ' + (lang === 'it' ? 'pannelli' : 'panels') + '</span>';
    item.addEventListener('click', () => {
      closeChaptersMenu();
      show(firstFlatIdx);
      setPlaying(true);
    });
    chaptersPanel.appendChild(item);
  });
}

function openChaptersMenu() { buildChaptersMenu(); chaptersOverlay.classList.add('open'); }
function closeChaptersMenu() { chaptersOverlay.classList.remove('open'); }

function show(index) {
  if (index < 0) index = 0;
  if (index >= flat.length) index = flat.length - 1;
  cur = index;
  const item = flat[cur];

  imgEl.classList.remove('visible');
  textInner.classList.remove('visible');

  const img = new Image();
  img.onload = () => { imgEl.src = item.img; imgEl.classList.add('visible'); };
  img.src = item.img;

  textEl.innerHTML = renderText(item.text[lang]);
  sceneTitleEl.textContent = item.sceneTitle[lang];
  progressEl.textContent = UI[lang].panel + ' ' + (item.panelIdx + 1) + UI[lang].of + SCENES[item.sceneIdx].panels.length;

  requestAnimationFrame(() => textInner.classList.add('visible'));

  if (cur + 1 < flat.length) { const pre = new Image(); pre.src = flat[cur + 1].img; }

  saveProgress();
  if (playing) scheduleNext();
}

function scheduleNext() {
  clearTimeout(timer);
  const duration = readingDurationMs(flat[cur].text[lang]);
  timer = setTimeout(() => { if (playing) show(cur + 1); }, duration);
}

function setPlaying(val) {
  playing = val;
  playBtn.innerHTML = playing ? '&#10074;&#10074;' : '&#9654;';
  if (playing) scheduleNext();
  else clearTimeout(timer);
}

function setLang(l) {
  lang = l;
  localStorage.setItem('wtfd_storia_lang', l);
  applyLangChrome();
  // ridisegna il pannello corrente nella nuova lingua senza avanzare
  const item = flat[cur];
  textEl.innerHTML = renderText(item.text[lang]);
  sceneTitleEl.textContent = item.sceneTitle[lang];
  progressEl.textContent = UI[lang].panel + ' ' + (item.panelIdx + 1) + UI[lang].of + SCENES[item.sceneIdx].panels.length;
  if (playing) scheduleNext();
}

document.getElementById('prev-btn').addEventListener('click', () => show(cur - 1));
document.getElementById('next-btn').addEventListener('click', () => show(cur + 1));
playBtn.addEventListener('click', () => setPlaying(!playing));
langBtn.addEventListener('click', () => setLang(lang === 'it' ? 'en' : 'it'));
chaptersBtn.addEventListener('click', () => { if (chaptersOverlay.classList.contains('open')) closeChaptersMenu(); else openChaptersMenu(); });

applyLangChrome();

const resumeIdx = loadProgress();
if (resumeIdx !== null && resumeIdx > 0) {
  const item = flat[resumeIdx];
  resumeText.textContent = UI[lang].resume + item.sceneTitle[lang];
  resumeBanner.classList.add('open');
  resumeRestart.addEventListener('click', () => {
    resumeBanner.classList.remove('open');
    show(0);
  });
  show(resumeIdx);
} else {
  show(0);
}
</script>
</body>
</html>
