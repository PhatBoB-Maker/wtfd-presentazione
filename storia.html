  {
    id: 'S6B',
    title: { it: 'Scena 6B — Il Capovillaggio', en: 'Scene 6B — The Headman' },
    panels: [
      { img: 'assets/storia/scena6b/panel-01.jpg', text: { it: `Rinaldo non rallenta il passo — non si ferma nemmeno quando è già troppo vicino, il fiato corto, la voce che si spacca a metà tra la rabbia e qualcosa che non riesce a nominare.

*[R]"Come avete potuto?"* Non è una domanda. È quasi un urlo tenuto giù a forza. *[R]"L'avete bruciata viva. Viva. E la chiamate giustizia."*

Il capovillaggio non indietreggia, non alza la voce. *[C]"Il fabbro ti ha già detto quello che sa."*

*[R]"Mi ha detto che non era convinto. Mi ha detto della cicuta sul tavolo."* La voce di Rinaldo trema — non di paura, di qualcosa che sta per rompersi del tutto. *[R]"Non mi ha detto perché. Perché lei. Perché così."*`, en: `Rinaldo doesn't slow his pace — he doesn't stop even when he's already too close, his breath short, his voice splitting in two between anger and something he can't name.

*[R]"How could you?"* It isn't a question. It's almost a scream held down by force. *[R]"You burned her alive. Alive. And you call it justice."*

The headman doesn't step back, doesn't raise his voice. *[C]"The blacksmith already told you what he knows."*

*[R]"He told me he wasn't convinced. He told me about the hemlock on the table."* Rinaldo's voice shakes — not with fear, with something about to break completely. *[R]"He didn't tell me why. Why her. Why like this."*` } },
      { img: 'assets/storia/scena6b/panel-02v2.jpg', text: { it: `Un silenzio, breve ma pieno. *[C]"Non te lo dirò qui, sulla soglia, in due parole, come se bastassero."* Il capovillaggio lo guarda senza scomporsi, la fermezza di chi ha già deciso come affrontare questo momento molto prima che arrivasse. *[C]"Vai dal parroco. Vai dal medico. Senti quello che hanno da dire, ognuno per la sua parte."* Una pausa. *[C]"Poi torna qui, e ti dirò il resto. Tutto — non solo quello che mi conviene raccontarti per primo."*

*[R]"E se non voglio aspettare?"*

*[C]"Puoi anche non aspettare."* Non si sposta dalla soglia. *[C]"Ma la chiave resta qui finché non torni."* La voce si fa più piana, quasi gentile — non è una minaccia. *[C]"Non è una punizione, Rinaldo. È perché tu sappia con chi te la devi prendere, prima di decidere con chi prendertela davvero."*

Rinaldo lo fissa un momento più lungo del necessario, come se cercasse in quella faccia qualcosa da odiare subito, senza dover aspettare. Non lo trova — non ancora. Si volta senza rispondere, verso il sagrato della chiesa.`, en: `A silence, brief but full. *[C]"I won't tell you here, on the doorstep, in a few words, as if that would be enough."* The headman looks at him without flinching, the steadiness of a man who decided how to face this moment long before it arrived. *[C]"Go to the priest. Go to the doctor. Hear what they have to say, each for their own part."* A pause. *[C]"Then come back here, and I'll tell you the rest. All of it — not just what suits me to tell you first."*

*[R]"And if I don't want to wait?"*

*[C]"You can not wait."* He doesn't move from the doorway. *[C]"But the key stays here until you come back."* His voice softens, almost gentle — it isn't a threat. *[C]"It isn't a punishment, Rinaldo. It's so you know who to blame, before deciding who to truly blame."*

Rinaldo holds his gaze a moment longer than necessary, as if searching that face for something to hate right away. He doesn't find it — not yet. He turns without answering, toward the church square.` } }

  {
    id: 'S7',
    title: { it: 'Scena 7 — Il Parroco', en: 'Scene 7 — The Priest' },
    panels: [
      { img: 'assets/storia/scena7/panel-01.jpg', text: { it: `Il sagrato della chiesa — piccola, di pietra, al centro del villaggio. Rinaldo trova il parroco fuori, intento a sistemare qualcosa vicino alla soglia. Non sembra sorpreso di vederlo.

*[R]"Cosa puoi dirmi, padre?"*

*[P]"Quello che ho visto, se è quello che cerchi. Non di più."* Il parroco lo guarda un momento prima di continuare, come se stesse decidendo quanto della verità gli servisse davvero. *[P]"So che la gente in guerra sente solo la metà delle cose, e quasi sempre la metà sbagliata."*

*[R]"Perché sei venuto a interrogarla?"*

*[P]"Perché era mio dovere, non mia scelta."* Una pausa, le mani giunte davanti a sé, un gesto abituale più che devoto. *[P]"Le ho chiesto cos'era successo. Me l'ha detto senza nascondere niente — la notte, i bambini, il preparato."* Esita. *[P]"E la Borda."*

*[R]"Perché ha parlato della Borda?"*

*[P]"Ha detto che la sentiva. Che per settimane, prima di quella notte, c'era stato qualcosa fuori — movimenti, presenze che non sapeva nominare meglio. Che la nebbia, quell'inverno, non era come le altre nebbie."* Il parroco scuote la testa, piano. *[P]"Non l'ho creduta superstiziosa, Rinaldo. L'ho creduta spaventata. Ma agli occhi degli altri, quelle parole sono bastate da sole."*

*[R]"Cosa pensi tu delle superstizioni? Della Borda?"*

*[P]"La Chiesa le condanna. Tutte, senza distinzioni — è la posizione ufficiale, ed è quella che insegno."* Una pausa più lunga di quanto servirebbe. *[P]"Ma sono cresciuto in questi campi prima di indossare quest'abito. Ho sentito le stesse storie di tutti gli altri, alla stessa età, dalla stessa nonna che le raccontava a tutti."* Guarda altrove. *[P]"Dire a un contadino che la Borda non esiste non gli toglie la paura. Gli toglie solo un nome da dare a quella paura. E una paura senza nome è peggio, non meglio."*

*[R]"Perché tutti hanno avuto così tanta paura, così in fretta?"*

*[P]"Non è cominciata con lei."* Il parroco guarda verso i campi, oltre la spalla di Rinaldo. *[P]"Da mesi arrivavano voci — sparizioni in altri villaggi, lungo la strada verso sud. Rumori nella notte che nessuno sapeva spiegare bene. Il villaggio aspettava che succedesse qualcosa qui, prima ancora che succedesse."* Una pausa. *[P]"Quando è successo, la paura aveva già un nome pronto. Le è bastato dargli un volto."*

*[R]"Secondo te è stata lei?"*

*[P]"Il tribunale ha deciso sulla base di quello che c'era da vedere. Io non sono un giudice, Rinaldo — non spettava a me deciderlo."* Una pausa lunga, più lunga delle altre. *[P]"Ma se mi chiedi cosa penso io, in coscienza... non lo so. E mi turba non saperlo, più di quanto vorrei ammettere davanti a te."*`, en: `The church courtyard — small, stone, at the village center. Rinaldo finds the priest outside, busy fixing something near the threshold. He doesn't seem surprised to see him.

*[R]"What can you tell me, father?"*

*[P]"What I saw, if that's what you're after. No more."* The priest looks at him a moment before continuing, as if deciding how much of the truth he really needed. *[P]"I know that men at war hear only half of things, and almost always the wrong half."*

*[R]"Why did you come to question her?"*

*[P]"Because it was my duty, not my choice."* A pause, hands clasped in front of him, a habitual gesture more than a devout one. *[P]"I asked her what had happened. She told me without hiding anything — the night, the children, the preparation."* He hesitates. *[P]"And the Borda."*

*[R]"Why did she speak of the Borda?"*

*[P]"She said she'd felt it. That for weeks, before that night, there had been something outside — movements, presences she couldn't name any better. That the fog, that winter, wasn't like other fogs."* The priest shakes his head, slowly. *[P]"I didn't think her superstitious, Rinaldo. I thought her frightened. But to everyone else's eyes, those words were enough on their own."*

*[R]"What do you think of the superstitions? Of the Borda?"*

*[P]"The Church condemns them. All of them, without distinction — that's the official position, and it's what I teach."* A pause longer than it needs to be. *[P]"But I grew up in these fields before I wore this robe. I heard the same stories as everyone else, at the same age, from the same grandmother who told them to all of us."* He looks away. *[P]"Telling a farmer the Borda doesn't exist doesn't take away his fear. It only takes away a name to give that fear. And a fear without a name is worse, not better."*

*[R]"Why did everyone become so afraid, so quickly?"*

*[P]"It didn't start with her."* The priest looks toward the fields, past Rinaldo's shoulder. *[P]"For months there had been word — disappearances in other villages, along the road south. Noises in the night no one could quite explain. The village was waiting for something to happen here, even before it happened."* A pause. *[P]"By the time it did, the fear already had a name ready. It only had to give it a face."*

*[R]"Do you think it was her?"*

*[P]"The tribunal decided based on what there was to see. I'm not a judge, Rinaldo — it wasn't mine to decide."* A long pause, longer than the others. *[P]"But if you ask what I think, in conscience... I don't know. And it troubles me not to know, more than I'd like to admit in front of you."*` } },
      { img: 'assets/storia/scena7/panel-02.jpg', text: { it: `*[R]"Perché non hai fatto niente per fermarlo?"*

Il parroco non risponde subito. Quando lo fa, la voce ha perso la sicurezza istituzionale di poco prima. *[P]"Ho pregato che si trovasse un'altra spiegazione. Non ne è arrivata."* Una pausa. *[P]"Il consiglio ha deciso, Rinaldo. Io ho benedetto la sentenza. Non l'ho scritta io."* Esita, poi aggiunge, quasi a scusarsi per la sottrazione: *[P]"Il capovillaggio la sa più lunga di me su come si è arrivati fin lì. Vai da lui, se vuoi il resto."*

Rinaldo lo osserva un momento, poi fa per andare. Il parroco lo ferma con una domanda propria, non richiesta:

*[P]"Ci credi anche tu, alla Borda?"* Rinaldo non risponde subito, e il parroco non aspetta oltre. *[P]"Credo che ci sia del male nel mondo che non sappiamo nominare meglio."* Una pausa. *[P]"Se questo significhi che la Borda esiste esattamente come la raccontano le vecchie, o che è solo il nome che diamo alla paura... non spetta a me deciderlo. Spetta a Dio, alla fine."*

Prima di lasciarlo andare, Rinaldo si volta un'ultima volta. *[R]"Perché tu, con lei, sei sempre stato... distante?"*

Una pausa lunga — la prima vera esitazione di tutto il dialogo. *[P]"Beatrice sapeva cose che non le aveva insegnate nessun libro che io abbia mai letto."* Una pausa. *[P]"Questo non fa di qualcuno una strega, e non l'ho mai pensato con quella parola. Ma mi ha sempre messo a disagio. Non è una colpa che le do, Rinaldo. È solo la verità, e te la devo."*`, en: `*[R]"Why didn't you do anything to stop it?"*

The priest doesn't answer right away. When he does, his voice has lost the institutional certainty of before. *[P]"I prayed another explanation would be found. None came."* A pause. *[P]"The council decided, Rinaldo. I blessed the sentence. I didn't write it."* He hesitates, then adds, almost apologizing for the omission: *[P]"The headman knows more than I do about how it got that far. Go to him, if you want the rest."*

Rinaldo studies him a moment, then turns to go. The priest stops him with a question of his own, unasked for:

*[P]"Do you believe in the Borda too?"* Rinaldo doesn't answer right away, and the priest doesn't wait any longer. *[P]"I believe there is evil in the world we don't know how to name any better."* A pause. *[P]"Whether that means the Borda exists exactly as the old women tell it, or that it's just the name we give to fear... it isn't mine to decide. That's for God, in the end."*

Before letting him go, Rinaldo turns one last time. *[R]"Why were you always... distant with her?"*

A long pause — the first real hesitation of the whole conversation. *[P]"Beatrice knew things no book I've ever read taught her."* A pause. *[P]"That doesn't make someone a witch, and I never thought that word of her. But she always made me uneasy. It isn't a fault I lay on her, Rinaldo. It's just the truth, and I owe it to you."*` } }

  {
    id: 'S8',
    title: { it: 'Scena 8 — Il Medico', en: 'Scene 8 — The Doctor' },
    panels: [
      { img: 'assets/storia/scena8/panel-01.jpg', text: { it: `La casa del medico, poco distante dalla piazza — la porta è aperta, un tavolo ingombro di vasetti e strumenti visibile dall'ingresso. Il medico alza lo sguardo quando Rinaldo entra, e per un istante, prima che il resto arrivi, c'è qualcosa che assomiglia a un vecchio riflesso professionale: due colleghi che si riconoscono.

*[R]"Cosa hai visto, quella notte?"*

*[M]"Quello che ti hanno già detto è vero: sono venuto, ho guardato i pagliericci vuoti, e ho visto le foglie sul tavolo."* Una pausa, le mani che si muovono quasi da sole, il gesto di chi maneggia erbe da una vita. *[M]"Non ho dovuto indovinare, Rinaldo. Le conosco fin troppo bene, quelle foglie."*

*[R]"Come fai a esserne così sicuro?"*

*[M]"Conium maculatum. Cicuta comune."* La voce è quella professionale, quasi da lezione — un rifugio. *[M]"Foglia diversa dal sedano selvatico, se sai cosa cercare: il bordo, l'odore anche da secco."* Una pausa. *[M]"Beatrice lo sapeva meglio di chiunque altro in questo villaggio. Meglio di me, se vogliamo essere onesti."*

*[R]"Che rapporto avevi con lei?"*

*[M]"Professionale."* Lo dice troppo in fretta, forse. Poi, con uno sforzo visibile per restare misurato: *[M]"Curava a modo suo. Io al mio. Il villaggio sceglieva."* Una pausa, la voce si indurisce appena. *[M]"Sceglieva lei, più spesso che no. Non che questo conti qualcosa, per la cicuta sul tavolo."* Distoglie lo sguardo un istante di troppo.`, en: `The doctor's house, not far from the square — the door is open, a table cluttered with jars and instruments visible from the entrance. The doctor looks up when Rinaldo enters, and for an instant, before the rest arrives, there's something like an old professional reflex: two colleagues recognizing each other.

*[R]"What did you see, that night?"*

*[M]"What they've already told you is true: I came, I looked at the empty pallets, and I saw the leaves on the table."* A pause, his hands moving almost on their own, the gesture of someone who's handled herbs his whole life. *[M]"I didn't have to guess, Rinaldo. I know those leaves all too well."*

*[R]"How can you be so sure?"*

*[M]"Conium maculatum. Common hemlock."* His voice turns professional, almost a lecture — a refuge. *[M]"A different leaf from wild celery, if you know what to look for: the edge, the smell even dried."* A pause. *[M]"Beatrice knew it better than anyone else in this village. Better than me, if we're being honest."*

*[R]"What was your relationship with her?"*

*[M]"Professional."* He says it too quickly, perhaps. Then, with a visible effort to stay measured: *[M]"She treated her way. I treated mine. The village chose."* A pause, his voice hardening slightly. *[M]"They chose her, more often than not. Not that it counts for anything, with the hemlock on the table."* He looks away a moment too long.` } },
      { img: 'assets/storia/scena8/panel-02.jpg', text: { it: `*[R]"Secondo te è stata lei?"*

*[M]"Ho visto la cicuta. Ho visto i pagliericci vuoti."* Una pausa, più lunga. *[M]"Il resto — se l'ha fatto sapendo quello che faceva, se non lo sapeva, se c'entra la Borda come dice la gente — quello non lo so, e ti mentirei se dicessi che m'interessa saperlo. Io guardo quello che c'è sul tavolo. È l'unica cosa di cui posso rispondere."*

*[R]"Perché non hai fatto niente per fermarlo?"*

Il medico si volta di scatto, quasi offeso. *[M]"Fermarlo?"* Un attimo, poi la difesa si abbassa quanto basta per lasciar passare qualcosa di più vero. *[M]"Non decidevo io da solo, Rinaldo. Non sono stato l'unico a dire la mia."* Una pausa, più lunga delle altre. *[M]"Come sia andata davvero, come si sia arrivati alla sentenza — quello chiedilo al capovillaggio. È lui che ha tenuto tutti i fili in mano. Io ho detto la mia parte, come tutti gli altri."* La voce quasi si spezza sul controllo che si sta imponendo. *[M]"Non voglio che tu creda sia stata colpa mia sola, Rinaldo. Non lo è stata."*

Rinaldo lo guarda a lungo prima di chiedere l'ultima cosa. *[R]"Ti sei mai chiesto se aveva ragione lei, sulla Borda?"*

Il medico quasi ride — non un riso allegro, il riso di chi si aggrappa a qualcosa di solido. *[M]"Alla Borda?"* Scuote la testa. *[M]"Ci credi tu, Rinaldo? Un uomo che ha studiato quanto te?"* Una pausa, la voce che torna a farsi professionale, quasi didattica. *[M]"Sono storie che le vecchie raccontano ai bambini per farli stare buoni la sera. Utili, forse — tengono i piccoli vicino al fuoco invece che nei canali al buio. Ma non sono scienza."* Distoglie lo sguardo un istante di troppo, come se la propria sicurezza gli servisse più a convincere se stesso che Rinaldo. *[M]"Io guardo quello che si può vedere e misurare. Il resto è superstizione. E la superstizione non ha mai salvato nessun bambino."*`, en: `*[R]"Do you think it was her?"*

*[M]"I saw the hemlock. I saw the empty pallets."* A pause, longer. *[M]"The rest — whether she did it knowing what she was doing, whether she didn't know, whether the Borda has anything to do with it like people say — that I don't know, and I'd be lying if I said I cared to know. I look at what's on the table. It's the only thing I can answer for."*

*[R]"Why didn't you do anything to stop it?"*

The doctor turns sharply, almost offended. *[M]"Stop it?"* A moment, then the defensiveness drops just enough to let something truer through. *[M]"I wasn't the one deciding alone, Rinaldo. I wasn't the only one who spoke his mind."* A pause, longer than the others. *[M]"How it really went, how the sentence came about — ask the headman that. He's the one who held all the threads. I said my part, like everyone else."* His voice nearly breaks under the control he's forcing on himself. *[M]"I don't want you to think it was my fault alone, Rinaldo. It wasn't."*

Rinaldo watches him a long while before asking the last thing. *[R]"Did you ever wonder if she was right, about the Borda?"*

The doctor almost laughs — not a cheerful laugh, the laugh of someone grasping for something solid. *[M]"The Borda?"* He shakes his head. *[M]"Do you believe it, Rinaldo? A man as educated as you?"* A pause, his voice turning professional again, almost instructive. *[M]"They're stories old women tell children to keep them well-behaved at night. Useful, maybe — they keep little ones by the fire instead of in the canals in the dark. But they aren't science."* He looks away a moment too long, as if his own certainty were meant to convince himself more than Rinaldo. *[M]"I look at what can be seen and measured. The rest is superstition. And superstition has never saved a single child."*` } }

  {
    id: 'S9',
    title: { it: 'Scena 9 — Il Capovillaggio', en: 'Scene 9 — The Headman' },
    panels: [
      { img: 'assets/storia/scena9/panel-01.jpg', text: { it: `La casa del capovillaggio, portico di legno, fine della strada. Il capovillaggio è già sulla soglia quando Rinaldo arriva: lo aspettava.

*[R]"Ho fatto come mi hai chiesto."* Rinaldo non lo saluta. *[R]"Ho sentito il fabbro. Il parroco. Il medico."*

*[C]"E allora?"*

Qualcosa nella voce piana di Rinaldo si incrina, ma non nel modo in cui si incrina il pianto. È più duro. *[R]"Il fabbro non era convinto — mai stato, dice. Il parroco pregava per un'altra spiegazione, e non gliel'avete data. Il medico ha visto la cicuta sul tavolo e ha guardato da un'altra parte quando è stato il momento di scegliere da che parte stare."* Una pausa. *[R]"Pochi l'hanno difesa, in questo villaggio. Una donna che ha curato ognuno di voi almeno una volta, che non ha mai chiesto niente in cambio a chi non poteva permetterselo."* La voce sale appena, la prima vera crepa. *[R]"E quando non avete saputo come spiegarvi le sparizioni, ve la siete presa con lei."*

Il capovillaggio non nega. Non abbassa nemmeno lo sguardo. *[C]"Ti ho mandato dagli altri prima di parlare con me per un motivo, Rinaldo."* Una pausa, come se stesse scegliendo le parole con cura, non per proteggersi ma perché gli costano davvero. *[C]"Volevo che tu sentissi tutta la storia, non solo la mia versione. E volevo che arrivassi qui sapendo già che non sono stato solo io a deciderlo. Se fossi venuto prima da me, avresti sentito solo la voce di chi porta il peso più grande. Non era giusto che fosse l'unica che sentivi."*`, en: `The headman's house, wooden porch, end of the street. The headman is already on the threshold when Rinaldo arrives: he was waiting for him.

*[R]"I did as you asked."* Rinaldo doesn't greet him. *[R]"I heard the blacksmith. The priest. The doctor."*

*[C]"And?"*

Something in Rinaldo's level voice cracks, but not the way weeping cracks it. It's harder. *[R]"The blacksmith wasn't convinced — never was, he says. The priest prayed for another explanation, and you didn't give him one. The doctor saw the hemlock on the table and looked the other way when it came time to choose a side."* A pause. *[R]"Few defended her, in this village. A woman who healed every one of you at least once, who never asked anything in return from those who couldn't afford it."* His voice rises slightly, the first real crack. *[R]"And when you couldn't explain the disappearances, you turned on her."*

The headman doesn't deny it. He doesn't even lower his eyes. *[C]"I sent you to the others before speaking to me for a reason, Rinaldo."* A pause, as if choosing his words carefully, not to protect himself but because they truly cost him something. *[C]"I wanted you to hear the whole story, not just my version of it. And I wanted you to arrive here already knowing I wasn't the only one who decided it. If you'd come to me first, you'd have heard only the voice of the one who carries the heaviest weight. It wasn't right that his should be the only one you heard."*` } },
      { img: 'assets/storia/scena9/panel-02.jpg', text: { it: `*[R]"Perché l'hai condannata?"*

*[C]"Perché il villaggio aveva bisogno che qualcuno pagasse, e io ho il compito di dare al villaggio quello di cui ha bisogno per restare un villaggio, e non qualcos'altro."* Una pausa. *[C]"Non sono orgoglioso di questa frase. Ma è vera."*

*[R]"Cosa intendi, 'qualcos'altro'?"*

*[C]"Un villaggio che non trova un colpevole quando i suoi bambini spariscono non resta un villaggio a lungo."* Una pausa più lunga. *[C]"Diventa una massa di gente spaventata che si guarda intorno e comincia a chiedersi chi è stato — il vicino, il forestiero, io stesso, magari. Un uomo del villaggio accanto mi ha raccontato di una casa data alle fiamme dalla folla stessa, senza nessun processo, senza nessuna decisione presa insieme. Solo paura che trova una direzione da sola."* Pausa più lunga ancora. *[C]"Io non volevo quello. Ho preferito decidere io, con ordine, piuttosto che lasciare che decidesse la paura."*

*[R]"Come hai deciso, allora?"*

*[C]"Ho chiamato ogni capofamiglia, uno alla volta — non tutti insieme in piazza."* Una pausa. *[C]"Meglio uno alla volta: in piazza la gente si guarda, si convince a vicenda, urla più forte di quanto pensi davvero. Da solo, ognuno mi ha detto quello che pensava per davvero."* Distoglie lo sguardo un istante. *[C]"Quasi tutti pensavano che dovesse pagare. Non tutti. Il fabbro no, per esempio. Ma quasi tutti."*

*[R]"Tu cosa pensavi, davvero?"*

Il capovillaggio non risponde subito. Quando parla, la voce ha perso ogni traccia dell'autorità di poco prima. *[C]"Che forse non era stata lei a scegliere quella cicuta, sapendo cosa fosse."* Una pausa. *[C]"Ma un villaggio non può vivere di 'forse', Rinaldo. Vive di risposte, anche quando sono sbagliate. Io ho dato una risposta."*`, en: `*[R]"Why did you condemn her?"*

*[C]"Because the village needed someone to pay, and my task is to give the village what it needs to remain a village, and not something else."* A pause. *[C]"I'm not proud of that sentence. But it's true."*

*[R]"What do you mean, 'something else'?"*

*[C]"A village that finds no one guilty when its children disappear doesn't stay a village for long."* A longer pause. *[C]"It becomes a mass of frightened people looking around, starting to wonder who did it — the neighbor, the stranger, myself, maybe. A man from the next village told me about a house burned down by the crowd itself, with no trial, no decision made together. Just fear finding its own direction."* An even longer pause. *[C]"I didn't want that. I preferred to decide it myself, with order, rather than let fear decide."*

*[R]"How did you decide, then?"*

*[C]"I called in every head of household, one at a time — not all together in the square."* A pause. *[C]"Better one at a time: in the square people watch each other, talk each other into things, shout louder than they really mean. Alone, each one told me what he truly thought."* He looks away for a moment. *[C]"Almost everyone thought she should pay. Not everyone. The blacksmith didn't, for one. But almost everyone."*

*[R]"What did you think, really?"*

The headman doesn't answer right away. When he speaks, his voice has lost every trace of the authority from before. *[C]"That maybe it wasn't her who chose that hemlock, knowing what it was."* A pause. *[C]"But a village can't live on 'maybe,' Rinaldo. It lives on answers, even wrong ones. I gave an answer."*` } },
      { img: 'assets/storia/scena9/panel-03.jpg', text: { it: `Si volta, stacca una chiave di ferro dal chiodo alla parete. Non gliela porge subito — la tiene un momento in mano, come se pesasse più del metallo. *[C]"Questa è tua. La casa è tua. Vai a vedere cosa è rimasto — forse è l'unica risposta vera che troverai oggi."*

Rinaldo gli chiede se ha figli lui. *[C]"Due. Vivi."* Il capovillaggio si concede una pausa più lunga di quanto la domanda giustificherebbe. *[C]"Ogni notte da allora ringrazio qualcosa che non so nemmeno nominare, che non sono stati loro."*

Rinaldo prende la chiave. Non ringrazia.

*[R]"Hai fatto quello che pensavi fosse giusto per il villaggio."* La voce è piatta, quasi gentile — ed è proprio per questo che fa più male. *[R]"Non ti biasimo per aver avuto paura. Ti biasimo per non aver protetto lei, quando bastava che una persona con la tua autorità dicesse una parola diversa."* Si ferma sulla soglia, la chiave stretta in pugno. *[R]"Per questo non ti perdonerò mai."*

Il capovillaggio non risponde. Non c'è niente da rispondere a una cosa vera.

Rinaldo si volta e si incammina verso casa sua, per la prima volta in otto mesi con la chiave in mano.`, en: `He turns, takes an iron key down from the hook on the wall. He doesn't hand it over right away — he holds it a moment, as if it weighed more than the metal. *[C]"This is yours. The house is yours. Go see what's left — maybe it's the only true answer you'll find today."*

Rinaldo asks if he has children of his own. *[C]"Two. Alive."* The headman allows himself a pause longer than the question warrants. *[C]"Every night since, I thank something I can't even name, that it wasn't them."*

Rinaldo takes the key. He doesn't thank him.

*[R]"You did what you thought was right for the village."* His voice is flat, almost gentle — and that's exactly why it hurts more. *[R]"I don't blame you for being afraid. I blame you for not protecting her, when all it would have taken was one person with your authority saying something different."* He stops in the doorway, the key clenched in his fist. *[R]"For that, I will never forgive you."*

The headman doesn't answer. There's nothing to answer to something true.

Rinaldo turns and walks toward his house, for the first time in eight months with the key in his hand.` } }
    ]

  {
    id: 'S10',
    title: { it: 'Scena 10 — Dentro la Casa', en: 'Scene 10 — Inside the House' },
    panels: [
      { img: 'assets/storia/scena10/panel-01.jpg', text: { it: `Il sigillo di cera cede sotto il coltello senza cerimonie — nessuno lì a farlo con lui, nessuno a cui restituire lo sguardo dopo. Rinaldo gira la chiave nel chiavistello. La porta si apre sul buio della casa chiusa da mesi.

La prima cosa è l'aria — non di marcio, non di abbandono pesante, ma di tempo che si è depositato su tutto come polvere sottile. Legno, terra secca, qualcosa di vegetale che viene dal laboratorio. Familiare nella sostanza, estraneo nella quiete.

La cucina è come l'aveva lasciata, quasi. Il tavolo, le scodelle, il fuoco spento da mesi con le ceneri ancora dentro. Le cose di Beatrice appese, poggiate, ordinate nel modo in cui le ordinava lei — una logica sua, mai stata la sua.`, en: `The wax seal gives way under the knife without ceremony — no one there to do it with him, no one to meet eyes with afterward. Rinaldo turns the key in the latch. The door opens onto the darkness of a house closed for months.

The first thing is the air — not of rot, not of heavy abandonment, but of time settled over everything like fine dust. Wood, dry earth, something plant-like from the workshop. Familiar in substance, foreign in its stillness.

The kitchen is almost as he left it. The table, the bowls, the fire out for months with the ashes still inside. Beatrice's things hung, set down, ordered the way she ordered them — a logic of her own, never his.` } },
      { img: 'assets/storia/scena10/panel-02.jpg', text: { it: `Va prima dai bambini. Non sa perché lo fa per primo — forse perché è la cosa più difficile e preferisce toglierla subito, forse perché è quello che avrebbe fatto Beatrice.

I pagliericci sono ancora lì. Ancora con la forma dei bambini dentro — le coperte come le avevano lasciate, o come le avevano trovate quella mattina di gennaio. Qualcuno le ha ripiegate, probabilmente la vicina o qualcun altro entrato subito dopo, cercando. Piegate troppo in ordine. Beatrice non le avrebbe piegate così.

Rimane in piedi nel piccolo spazio per un momento che non sa misurare.`, en: `He goes to the children's room first. He doesn't know why he does it first — maybe because it's the hardest thing and he'd rather get it over with, maybe because it's what Beatrice would have done.

The pallets are still there. Still holding the shape of the children — the blankets as they'd left them, or as they'd been found that January morning. Someone has folded them, probably the neighbor or someone else who came in right after, searching. Folded too neatly. Beatrice wouldn't have folded them that way.

He stands in the small space for a length of time he can't measure.` } },
      { img: 'assets/storia/scena10/panel-03.jpg', text: { it: `Il laboratorio è il posto in cui si sente meno spaesato. Conosce ogni barattolo, ogni fascio di erbe appeso alle travi, ogni contenitore con il suo contenuto scritto nella grafia piccola e precisa di Beatrice. Comincia a muoversi tra i ripiani con la stessa attenzione metodica con cui si muoverebbe in qualunque laboratorio — ci sono cose da controllare, erbe essiccate che potrebbero essere andate a male.

Vede il chiodo a destra della porta. Il campanellino è ancora lì.

Lo guarda un momento senza toccarlo. Poi lo prende dal chiodo.

Sta fermo con il campanellino in pugno, senza scuoterlo, senza fare niente. Non se lo aspettava — non aveva pianto sul campo di battaglia, non davanti al fabbro, non sull'uscio, non in nessuno dei mesi di cammino. Eppure si trova a farlo, lì nel laboratorio, con quel pezzo di ottone chiuso nella mano, senza un momento preciso in cui è cominciato. Le lacrime vengono fuori senza avvisare, senza il conforto di un pensiero che le giustifichi.

Non ci vuole molto. È un uomo pratico — lo sa su di sé. Le cose arrivano e poi se ne vanno, e lui nel mezzo aspetta che passino.

Lo scuote, piano — quasi senza volerlo, il gesto automatico di chi ha sentito quel suono migliaia di volte. Il tintinnio è chiaro e secco nell'aria ferma della stanza.

Non succede niente di visibile. Nessuna luce, nessuna voce. Solo una sensazione — e Rinaldo non è il tipo di uomo che si fida delle sensazioni. Eppure c'è qualcosa nel campanellino che non era lì prima che lo scuotesse. Non calore, non esattamente. La sensazione di non essere completamente solo in quella stanza. Una presenza recente. Una traccia.

Prende un laccio di cuoio dal banco — Beatrice li usava per legare i mazzi di erbe — e lo annoda alla cintura, dove può raggiungerlo con una mano sola.`, en: `The workshop is where he feels least out of place. He knows every jar, every bundle of herbs hanging from the beams, every container with its contents written in Beatrice's small, precise hand. He starts moving among the shelves with the same methodical attention he'd use in any workshop — there are things to check, dried herbs that might have spoiled.

He sees the nail to the right of the door. The campanellino is still there.

He looks at it a moment without touching it. Then takes it down from the nail.

He stands still with the campanellino in his fist, not shaking it, not doing anything. He didn't expect this — he hadn't cried on the battlefield, not in front of the blacksmith, not on the doorstep, not in any of the months of walking. And yet here he is doing it, in the workshop, that piece of brass closed in his hand, with no precise moment when it began. The tears come without warning, without the comfort of a thought to justify them.

It doesn't take long. He's a practical man — he knows this about himself. Things arrive and then they pass, and he waits in the middle for them to pass.

He shakes it, softly — almost without meaning to, the automatic gesture of someone who's heard that sound a thousand times. The chime is clear and sharp in the still air of the room.

Nothing visible happens. No light, no voice. Only a feeling — and Rinaldo isn't the kind of man who trusts feelings. And yet there's something in the campanellino that wasn't there before he shook it. Not warmth, not exactly. The feeling of not being entirely alone in that room. A recent presence. A trace.

He takes a leather cord from the workbench — Beatrice used them to tie the herb bundles — and knots it to his belt, where he can reach it with one hand.` } },
      { img: 'assets/storia/scena10/panel-04.jpg', text: { it: `Sul banco di lavoro, due materiali stesi in pile separate — il tipo di lavoro a metà che Beatrice non lasciava mai così a lungo. Mesi lì, immobili.

Sedano selvatico — *Apium graveolens*. Lo riconosce subito.

Poi la seconda pila. Si ferma. Stessa famiglia, stessa forma generale, ma il bordo fogliare è diverso, e l'odore, anche da secco, è diverso se sai cosa cercare.

*Conium maculatum.* Cicuta comune.

La conosce bene — Beatrice la usava per uso esterno, mai mescolata a niente d'altro, mai in laboratorio, mai durante il raccolto. Le due pile erano state sul banco insieme. Di notte, a candela, con le mani che raccolgono in fretta.

Cerca il diario.

Lo trova nel cassetto sotto il banco. Prende quello più recente — la copertina di cuoio scuro che riconosce, l'ultimo che lei usava prima che lui partisse. Lo apre all'ultima pagina scritta. Data di gennaio.

*Ho riletto la lettera di Rinaldo, stanotte. Mi manca più di quanto vorrei ammettere, anche a queste pagine.*

*I bambini non riuscivano a dormire. Da settimane è così — Isabella si sveglia, Ludovico non dorme. Ho sentito di nuovo qualcosa fuori stanotte, oltre il muro. Non il vento.*

*Ho preparato il solito. Sedano, la proporzione che uso sempre per loro. Li ho fatti bere. Li ho visti addormentarsi.*

*Ho cantato la ninna nanna di mia nonna. Non so perché — è venuta fuori da sola.*

Rinaldo smette di leggere. Rimane fermo con il diario aperto in mano, gli occhi fissi sull'ultima riga. Poi guarda il banco. Le foglie essiccate ancora lì, il sedano e la cicuta, mescolati, quasi identici.

*Ho preparato il solito.*

Non ci vuole molto perché lui sappia quello che Beatrice non sapeva — come crescono quelle piante lungo i canali, come si somigliano, cosa succede quando si raccoglie nel freddo e nella nebbia senza smistare subito. Capisce nel modo in cui si capiscono le cose che non si voleva capire: tutto insieme, senza gradualità.

*Il solito* era sedano. Con dentro, quella notte, foglie di cicuta mescolate sul banco. Una dose pensata per far dormire un bambino. Il Conium non ha bisogno di dosi da adulto per uccidere un bambino.

Appoggia il diario sul banco. Resta seduto sul bordo per un tempo che non sa misurare.

La domanda arriva da sola, senza che lui la cerchi. Era stata lei? Era stata la Borda? Non c'è modo di saperlo. Non ci sarà mai.

C'è solo una cosa ancora in piedi: nessuno ha mai trovato i loro corpi — non un osso, non un brandello di stoffa, niente. Da medico, Rinaldo sa cosa lascia dietro di sé una morte vera: sangue, segni di lotta, il disordine di un corpo che smette di muoversi. Quella notte non c'era niente di tutto questo — solo due pagliericci vuoti e le coperte ancora nella piega di chi le aveva lasciate, come se nessuno le avesse mai toccate. Non è una prova che siano vivi. Ma non è nemmeno una prova che siano morti. È l'unica crepa a cui può ancora aggrapparsi.

Si alza. Prende il diario e lo mette nel sacco insieme al campanellino. Guarda il laboratorio un'ultima volta — i barattoli, le erbe, le etichette nella grafia precisa di Beatrice.`, en: `On the workbench, two materials laid out in separate piles — the kind of half-finished work Beatrice never left that long. Months there, untouched.

Wild celery — *Apium graveolens*. He recognizes it at once.

Then the second pile. He stops. Same family, same general shape, but the leaf edge is different, and the smell, even dried, is different if you know what to look for.

*Conium maculatum.* Common hemlock.

He knows it well — Beatrice used it externally only, never mixed with anything else, never in the workshop, never during harvest. The two piles had been on the bench together. At night, by candlelight, with hands gathering in a hurry.

He looks for the diary.

He finds it in the drawer under the bench. He takes the most recent one — the dark leather cover he recognizes, the last one she used before he left. He opens it to the last written page. Dated January.

*I reread Rinaldo's letter, tonight. I miss him more than I'd like to admit, even to these pages.*

*The children couldn't sleep. It's been like this for weeks — Isabella wakes up, Ludovico doesn't sleep. I heard something outside again tonight, beyond the wall. Not the wind.*

*I made the usual. Celery, the proportion I always use for them. I made them drink it. I watched them fall asleep.*

*I sang my grandmother's lullaby. I don't know why — it just came out on its own.*

Rinaldo stops reading. He stays still with the diary open in his hand, eyes fixed on the last line. Then he looks at the bench. The dried leaves still there, the celery and the hemlock, mixed, almost identical.

*I made the usual.*

It doesn't take him long to know what Beatrice didn't — how those plants grow along the canals, how alike they are, what happens when you gather them in the cold and fog without sorting them right away. He understands the way you understand things you didn't want to understand: all at once, with no gradual approach.

*The usual* was celery. With hemlock leaves mixed in on the bench, that night. A dose meant to put a child to sleep. Conium doesn't need an adult dose to kill a child.

He sets the diary on the bench. Stays sitting on its edge for a length of time he can't measure.

The question arrives on its own, without his looking for it. Was it her? Was it the Borda? There's no way to know. There never will be.

Only one thing still stands: no one ever found their bodies — not a bone, not a scrap of cloth, nothing. As a doctor, Rinaldo knows what a real death leaves behind: blood, signs of a struggle, the disorder of a body that stops moving. That night there was none of it — just two empty pallets and blankets still folded the way they'd been left, as if no one had ever touched them. It isn't proof they're alive. But it isn't proof they're dead either. It's the only crack he can still hold onto.

He stands. Takes the diary and puts it in the sack with the campanellino. Looks at the workshop one last time — the jars, the herbs, the labels in Beatrice's precise hand.` } }
    ]

  {
    id: 'S11',
    title: { it: 'Scena 11 — Il Fagotto di Cuoio', en: 'Scene 11 — The Leather Bundle' },
    panels: [
      { img: 'assets/storia/scena11/panel-01.jpg', text: { it: `Il fabbro è nella bottega quando Rinaldo ci passa davanti. Non sta lavorando — è seduto sulla panca all'ingresso, le mani in grembo, la fucina spenta da ore. Lo vede arrivare con il sacco in spalla. Non dice niente per un momento.

Poi: *[F]"Verso la nebbia."*

Non è una domanda.

Rinaldo si ferma. *[R]"Sì."*

Il fabbro annuisce lentamente — non approvazione, riconoscimento. Si alza dalla panca senza aggiungere altro e rientra nella bottega. Rinaldo aspetta fuori, senza capire bene cosa stia aspettando.

Quando il fabbro torna ha in mano un fagotto di cuoio legato con una cinghia. Lo posa sulla panca tra loro. Lo apre.

Una spada corta — vecchia, la guardia consumata, ma buona nell'acciaio. Un coltello da lato. Un giaco di cuoio indurito, leggero da portare, spesso abbastanza da servire a qualcosa. Un paio di guanti da lavoro pesante.

*[F]"Erano miei,"* dice il fabbro. *[F]"Prima di questo."*

Non spiega altro. Non serve — c'è nel modo in cui li ha posati, la precisione di chi conosce ogni oggetto come si conoscono le cose che hanno fatto parte di un'altra vita.

Rinaldo guarda le armi. Guarda le proprie mani.

*[R]"Non so usarla,"* dice, indicando la spada.

*[F]"Lo so."* Il fabbro piega il giaco e lo rimette nel fagotto con la stessa cura con cui lo aveva tolto. *[F]"Ma fa differenza lo stesso, tenerla in mano quando incontri qualcosa."*`, en: `The blacksmith is in his shop when Rinaldo passes by. He isn't working — he's sitting on the bench by the entrance, hands in his lap, the forge cold for hours now. He sees him coming with the sack on his shoulder. He says nothing for a moment.

Then: *[F]"Toward the fog."*

It isn't a question.

Rinaldo stops. *[R]"Yes."*

The blacksmith nods slowly — not approval, recognition. He gets up from the bench without adding anything and goes back into the shop. Rinaldo waits outside, not quite understanding what he's waiting for.

When the blacksmith returns he's carrying a leather bundle tied with a strap. He sets it on the bench between them. Opens it.

A short sword — old, the guard worn, but good steel. A side knife. A hardened leather jerkin, light to wear, thick enough to be of some use. A pair of heavy work gloves.

*[F]"They were mine,"* the blacksmith says. *[F]"Before this."*

He explains nothing else. He doesn't need to — it's in the way he set them down, the precision of someone who knows every object the way you know things that belonged to another life.

Rinaldo looks at the weapons. Looks at his own hands.

*[R]"I don't know how to use it,"* he says, pointing at the sword.

*[F]"I know."* The blacksmith folds the jerkin and puts it back in the bundle with the same care he took it out with. *[F]"But it still makes a difference, holding it in your hand when you meet something."*` } },
      { img: 'assets/storia/scena11/panel-02.jpg', text: { it: `Rinaldo tira fuori quello che gli resta nella borsa — pochi soldi — e li posa sulla panca. Il fabbro li guarda. Non li prende.

*[F]"Era una brava donna,"* dice. *[F]"Non ho fatto niente."*

Resta in silenzio un momento, come se aspettasse che Rinaldo gli dica qualcosa — che lo assolva, o che lo accusi, una delle due. Rinaldo non dice niente. Non ha niente da dire su quello, non oggi, non a lui — il fabbro è l'unico, tra tutti, che ha già dato quello che poteva dare.

Prende il fagotto.

Il fabbro resta sulla panca mentre si allontana. Rinaldo non si volta, ma sente che non è rientrato nella bottega. È ancora lì, fermo, a guardare.`, en: `Rinaldo takes out what's left in his purse — a few coins — and sets them on the bench. The blacksmith looks at them. Doesn't take them.

*[F]"She was a good woman,"* he says. *[F]"I didn't do anything."*

He stays silent a moment, as if waiting for Rinaldo to say something to him — to absolve him, or to accuse him, one or the other. Rinaldo says nothing. He has nothing to say about that, not today, not to him — the blacksmith is the only one, of all of them, who has already given what he could give.

He takes the bundle.

The blacksmith stays on the bench as he walks away. Rinaldo doesn't turn around, but he can feel that he hasn't gone back into the shop. He's still there, still, watching.` } },
      { img: 'assets/storia/scena11/panel-02b.jpg', text: { it: `Torna in casa un'ultima volta. Ha bisogno di cose dal laboratorio — non nel senso domestico. Ha bisogno di quello che sa fare. Prende con cura: qualcosa per le ferite, qualcosa per il dolore, piccoli fasci ben avvolti, che pesano poco e possono servire. Niente di eroico — gli strumenti di chi cura, non di chi combatte.

Prende anche il Conium. Non molto — solo quello rimasto sul banco. Non sa ancora perché. Forse perché è parte della storia, e la storia va portata con sé. Forse perché se c'è qualcosa là fuori che usa quelle piante, vale la pena conoscerlo bene.

Potrebbe restare. Fermarsi in paese un'ultima notte, ripartire domani con la luce del mattino — un tetto sopra la testa invece del fango di un fosso. Ma restare vuol dire dormire in mezzo a loro: gli stessi villani che l'hanno vista bruciare, o hanno guardato altrove mentre bruciava — la stessa gente che ha creduto, o ha lasciato credere agli altri, che sua moglie fosse un mostro. Un'altra notte sotto quegli occhi, dopo tutto quello che ha sentito oggi, non gli sembra riposo. Gli sembra un'altra condanna da scontare.

Restare qui, tra le sue cose, non è meglio. La porta non è più sigillata da quando l'hanno portata via — potrebbe dormirci, in mezzo a quello che resta. Ma la casa ha troppo dentro: le coperte piegate in un modo che non è il suo, i barattoli in un ordine che non ha senso toccare, il chiodo vuoto accanto alla porta del laboratorio. Troppi ricordi per una notte sola, troppo presto.

Meglio partire adesso, e dormire dove lo prenderà la stanchezza — un fosso, un argine, non importa dove. Quello che ha davanti è comunque ignoto. Tanto vale cominciare a conoscerlo subito, invece di rimandarlo di un'altra notte.

Chiude la porta senza serrare il chiavistello. Non ha senso chiudere a chiave quello che è già vuoto.`, en: `He returns to the house one last time. He needs things from the workshop — not in the domestic sense. He needs what he knows how to do. He takes with care: something for wounds, something for pain, small well-wrapped bundles, light to carry and useful. Nothing heroic — the tools of a healer, not a fighter.

He also takes the Conium. Not much — only what's left on the bench. He doesn't yet know why. Maybe because it's part of the story, and the story has to be carried with him. Maybe because if there's something out there that uses those plants, it's worth knowing it well.

He could stay. Stop in the village one last night, set off again tomorrow with the morning light — a roof over his head instead of the mud of a ditch. But staying means sleeping among them: the same villagers who watched her burn, or looked away while she burned — the same people who believed, or let others believe, that his wife was a monster. Another night under those eyes, after everything he's heard today, doesn't feel like rest to him. It feels like another sentence to serve.

Staying here, among his things, isn't better. The door hasn't been sealed since they took her away — he could sleep here, among what's left. But the house holds too much: the blankets folded in a way that isn't his, the jars in an order that makes no sense to disturb, the empty nail beside the workshop door. Too many memories for a single night, too soon.

Better to leave now, and sleep wherever tiredness takes him — a ditch, an embankment, it doesn't matter where. What lies ahead is unknown regardless. Might as well start getting to know it now, instead of putting it off another night.

He closes the door without fastening the latch. There's no point locking what's already empty.` } },
      { img: 'assets/storia/scena11/panel-03.jpg', text: { it: `La strada che esce dal villaggio verso i campi è la stessa che aveva percorso otto mesi prima in direzione contraria — stessa terra battuta, stessi pioppi lungo il canale, stesso orizzonte basso che in Romagna non lascia mai molto spazio tra le cose e il cielo.

È sera. La nebbia sta tornando dai campi bassi — nel tardo pomeriggio di quella stagione risale sempre, riprende il territorio che il sole le aveva tolto per qualche ora. Non sparisce mai del tutto. Aspetta.

Rinaldo cammina senza voltarsi. Non per la stessa ragione per cui non si era voltato otto mesi prima — voltarsi non cambia quello che si ha alle spalle, e quello che ha davanti richiede di guardare avanti.

Sa, a grandi linee, dove andare. Non perché abbia una mappa — non ne esiste una utile per quello che sta cercando. Ma la Borda ha un territorio: i canali, le zone paludose, i margini dove la nebbia si addensa anche d'estate, dove le ombrellifere crescono senza che nessuno le pianti. Lo sa dai racconti, lo sa dalla botanica, lo sa da come Beatrice ha descritto quelle settimane nel diario.

È un territorio, non un posto preciso. Si entra, si cammina, e si capisce dove si sta andando da quello che si trova lungo la strada.

Non è un buon piano.

È l'unico piano.`, en: `The road out of the village toward the fields is the same one he walked eight months before, in the opposite direction — the same packed earth, the same poplars along the canal, the same low horizon that in Romagna never leaves much room between things and the sky.

It's evening. The fog is coming back up from the low fields — in that season's late afternoon it always rises again, reclaiming the ground the sun had taken from it for a few hours. It never disappears entirely. It waits.

Rinaldo walks without looking back. Not for the same reason he hadn't looked back eight months before — looking back doesn't change what's behind you, and what's ahead demands looking forward.

He knows, roughly, where to go. Not because he has a map — none exists that would help with what he's looking for. But the Borda has a territory: the canals, the marshy stretches, the edges where fog thickens even in summer, where umbellifers grow without anyone planting them. He knows it from the stories, from botany, from how Beatrice described those weeks in her diary.

It's a territory, not a precise place. You go in, you walk, and you understand where you're headed from what you find along the way.

It isn't a good plan.

It's the only plan.` } }
    ]
  },
  {
    id: 'S11B',
    title: { it: 'Scena 11B — Il Primo Cippo', en: 'Scene 11B — The First Waystone' },
    panels: [
      { img: 'assets/storia/scena11b/panel-01.jpg', text: { it: `Cammina finché il villaggio non è solo una sagoma bassa alle sue spalle. Il terreno è ancora quello che conosce — campi, argini, lo stesso canale che costeggiava da ragazzo — ma la luce sta calando, e più avanti, oltre una fila di pioppi radi, l'aria comincia già a perdere nettezza.

Lungo il sentiero, piantata di taglio nella terra, c'è una pietra — consumata, isolata, chiaramente posta lì da mano d'uomo e non dal caso. Il primo cippo che incontra nel suo cammino.

Rinaldo non conosce ancora il significato di quella pietra. Ma il modo in cui è piantata — dritta, sola, a bordo strada — gli dice che è un punto pensato per fermarsi.`, en: `He walks until the village is nothing but a low shape behind him. The ground is still the one he knows — fields, embankments, the same canal he walked beside as a boy — but the light is fading, and further on, past a thin row of poplars, the air is already starting to lose its edge.

Along the path, planted upright in the earth, there's a stone — worn, solitary, clearly placed there by human hand and not by chance. The first waystone he meets on his path.

Rinaldo doesn't yet know the meaning of that stone. But the way it's planted — upright, alone, at the roadside — tells him it's a place meant for stopping.` } },
      { img: 'assets/storia/scena11b/panel-02.jpg', text: { it: `Trova un avvallamento riparato accanto al cippo, un albero da un lato, abbastanza erba secca da fare un giaciglio che non sia nuda terra. Raccoglie qualche ramo, accende un fuoco piccolo — abbastanza da tenere lontano il freddo, non abbastanza da farsi notare da lontano. Si sdraia con il sacco sotto la testa e il campanellino alla cintura.

Si addormenta prima di quanto si aspettasse.`, en: `He finds a sheltered hollow beside the waystone, a tree on one side, enough dry grass to make a bed that isn't bare earth. He gathers a few branches, lights a small fire — enough to keep off the cold, not enough to be noticed from a distance. He lies down with the sack under his head and the campanellino at his belt.

He falls asleep sooner than he expected.` } },
      { img: 'assets/storia/scena11b/panel-03.jpg', text: { it: `Il campanellino comincia a muoversi mentre dorme.

Non per il vento — l'aria è ferma. Si agita da solo, piano, con un tintinnio leggero che si perde nel silenzio dei campi. Poi qualcosa comincia a prendere forma vicino a lui — non dalla nebbia, non dal buio: dalla luce piccola del fuoco, come se quella luce avesse deciso di raccogliersi in un punto solo.

Una mano gli sfiora la faccia.

Rinaldo apre gli occhi, ancora dentro il sonno che si rompe.

Beatrice è lì — o qualcosa che porta il suo peso, la sua misura, il modo in cui una presenza nota si fa sentire prima ancora di essere vista con chiarezza. Non un viso disegnato con nettezza, non stanotte: una forma raccolta nella luce del fuoco, vapore più che carne, i contorni che si muovono appena come fa la fiamma da cui sembra nata. Non la nebbia che assume una forma, non un dormiveglia che scivola nel sogno senza avvisare — qualcosa di più presente di entrambe le cose, anche se non riesce a metterlo a fuoco.`, en: `The campanellino begins to move while he sleeps.

Not from the wind — the air is still. It stirs on its own, softly, with a light chime that fades into the silence of the fields. Then something begins to take shape near him — not from the fog, not from the dark: from the small light of the fire, as if that light had decided to gather itself into a single point.

A hand brushes his face.

Rinaldo opens his eyes, still inside the sleep that's breaking.

Beatrice is there — or something carrying her weight, her measure, the way a known presence makes itself felt before it's even clearly seen. Not a face drawn sharply, not tonight: a shape gathered in the firelight, vapor more than flesh, its edges shifting slightly the way the flame it seems born from does. Not fog taking a shape, not a half-sleep sliding into a dream without warning — something more present than either of those, even if he can't bring it into focus.` } },
      { img: 'assets/storia/scena11b/panel-04.jpg', text: { it: `Alza la mano verso di lei — un gesto che non decide, che gli viene prima di ogni pensiero, per cercare la mano che gli tocca la guancia.

Non la trova. Le dita chiudono aria, o qualcosa che non oppone la resistenza che una mano dovrebbe opporre.

Non dice niente. Lei non dice niente.

Lo sguardo gli resta fisso su quella forma indefinita — non con dolore, non con paura. Con qualcosa di più quieto di entrambe, e con un incanto che non gli somiglia: lui che mette sempre le cose in ordine, che nomina, che classifica. Qui non c'è niente da nominare, e in quel momento non gli importa.

Poi non c'è più.`, en: `He raises a hand toward her — a gesture that isn't decided, that comes before any thought, reaching for the hand touching his cheek.

He doesn't find it. His fingers close on air, or on something that offers none of the resistance a hand should offer.

He says nothing. She says nothing.

His gaze stays fixed on that indistinct shape — not with pain, not with fear. With something quieter than either, and with a wonder that isn't like him: a man who always puts things in order, who names, who classifies. Here there's nothing to name, and in that moment he doesn't care.

Then she's gone.` } },
      { img: 'assets/storia/scena11b/panel-05.jpg', text: { it: `Rinaldo resta fermo a lungo, la mano ancora sospesa a mezz'aria, come se aspettasse che tornasse a toccarla.

Non cerca di spiegarsi quello che ha visto. È un uomo che mette da parte le cose per cui non ha ancora gli strumenti, e ci torna quando ne ha di più.

Ma la mano sulla faccia non riesce a metterla da parte allo stesso modo.

Si porta le dita alla guancia. Sente ancora qualcosa lì — o crede di sentirlo, che sono due cose diverse, ma in quel momento non riesce a distinguerle.

Non sa se ha dormito. Non sa se ha sognato.`, en: `Rinaldo stays still for a long while, his hand still suspended in midair, as if waiting for it to come back and touch it.

He doesn't try to explain to himself what he's seen. He's a man who sets aside things he doesn't yet have the tools for, and comes back to them when he has more.

But the hand on his face he can't set aside the same way.

He brings his fingers to his cheek. He still feels something there — or believes he feels it, which are two different things, but in that moment he can't tell them apart.

He doesn't know if he slept. He doesn't know if he dreamed.` } }
    ]
  },
  {
    id: 'S12',
    title: { it: 'Scena 12 — Nella Nebbia', en: 'Scene 12 — Into the Fog' },
    panels: [
      { img: 'assets/storia/scena12/panel-01.jpg', text: { it: `Il fuoco è cenere fredda quando si sveglia. Non c'è altro segno della notte, a parte quello che si porta addosso — la mano sulla guancia, il non sapere se ha dormito o sognato. Non ci pensa più di tanto, non ora: rimette il fagotto in spalla e riprende a camminare.

Cammina per un'ora verso est, lungo il canale, prima che la nebbia cominci a ispessirsi intorno a lui.

Non è il tipo di nebbia che sale dal basso e cresce — è il tipo che si trova quando ci si avvicina a lei. Come se ci fosse un confine, un punto oltre il quale le cose cambiano qualità. I pioppi diventano meno distinti. Il canale smette di riflettere il cielo. Il suono dei passi si fa più ovattato, come quando l'aria è troppo satura d'acqua per portare le cose lontano.

Si ferma un momento. Porta la mano al campanellino alla cintura — non per usarlo, solo per sentirlo lì, un peso familiare in un posto che comincia a sembrargli tutto uguale. Non sa se si aspetta che faccia qualcosa. Non fa niente. Lo lascia dov'è e riprende a camminare.

La nebbia lo riceve senza cerimonie.

Non c'è un momento drammatico — nessuna soglia visibile, nessuna resistenza. Semplicemente, a un certo punto, il villaggio non si vede più. I pioppi sono sagome. Il canale è un suono. Il cielo è bianco e il campo è bianco e la strada davanti è bianca quanto quella dietro — l'unica differenza tra avanti e indietro è la direzione in cui sta camminando.

Questa nebbia non è come quella del villaggio.

Quella la conosce da trent'anni — sa come si muove, dove si addensa, a che ora comincia a ritirarsi. Ha una logica, anche quando sembra non averla: segue il canale, risale dai campi bassi, si ferma dove il terreno sale anche di poco. È nebbia di pianura padana. È normale.

Questa è diversa. Non nella sostanza — è sempre aria e acqua, non ha colore né peso proprio. È diversa nel comportamento. Non si muove con il vento. Non si dirada dove il terreno cambia. Sta ferma intorno a lui con una qualità che non è meteorologica — è intenzionale, anche se sa che pensarlo è irrazionale, e lo pensa lo stesso.

Dopo mezz'ora comincia ad avere problemi a orientarsi.

Non è una cosa che gli capita spesso. Ha la testa fatta per i riferimenti — il sole, l'ombra, la direzione dell'acqua nei canali, la posizione degli alberi rispetto ai punti cardinali. Strumenti che usa senza pensarci, come si usa la vista o l'udito. Qui non funzionano.

Il sole non si vede. Non si vede niente sopra di lui tranne bianco. Il canale ha smesso di fare rumore da un po' — o si è allontanato, o la nebbia assorbe i suoni abbastanza da renderli inutili. I pioppi sono spariti. Sta camminando su terra battuta diventata terra non battuta, poi erba, poi qualcosa di più umido che cede leggermente sotto i piedi senza cedere del tutto.

Si ferma. Guarda da dove è venuto. È identico a dove sta andando.

Non è panico — non ancora, non di quel tipo. È il disagio preciso di chi ha sempre letto il mondo attraverso i suoi strumenti e si trova in un posto dove gli strumenti non danno lettura. Come aprire un libro e trovare le pagine bianche.

Non ha altro modo per procedere che scegliere una direzione e tenerla — un piede dopo l'altro, contando i passi per darsi almeno l'illusione di una misura, correggendo quando il terreno sotto i piedi cambia, più duro o più molle, in salita o in discesa, come fosse l'unica bussola rimasta. Non è un metodo. È l'unica cosa che gli resta.

Cammina per un tempo che non riesce a misurare — senza sole, senza ombre, senza suoni che si avvicinino o si allontanino, è impossibile capire quanto sia passato. I piedi trovano terra più solida. Poi erba corta. Poi il profilo basso di un muro a secco che emerge dalla nebbia a meno di tre passi da lui, senza preavviso.`, en: `The fire is cold ash when he wakes. There's no other sign of the night, apart from what he carries on him — the hand on his cheek, not knowing if he slept or dreamed. He doesn't dwell on it, not now: he shoulders the bundle again and starts walking.

He walks east for an hour, along the canal, before the fog begins to thicken around him.

It isn't the kind of fog that rises from below and grows — it's the kind you find when you're getting close to her. As if there were a boundary, a point beyond which things change quality. The poplars grow less distinct. The canal stops reflecting the sky. The sound of his footsteps grows muffled, the way it does when the air is too saturated with water to carry things far.

He stops for a moment. Puts a hand to the campanellino at his belt — not to use it, just to feel it there, a familiar weight in a place that's starting to feel all the same. He doesn't know if he expects it to do something. It does nothing. He leaves it where it is and walks on.

The fog receives him without ceremony.

There's no dramatic moment — no visible threshold, no resistance. Simply, at some point, the village is no longer visible. The poplars are shapes. The canal is a sound. The sky is white and the field is white and the road ahead is as white as the one behind — the only difference between forward and back is the direction he's walking.

This fog isn't like the one at the village.

That one he's known for thirty years — he knows how it moves, where it thickens, what hour it starts to withdraw. It has a logic, even when it seems not to: it follows the canal, rises from the low fields, stops where the ground climbs even slightly. It's Po valley fog. It's ordinary.

This is different. Not in substance — it's still air and water, no color or weight of its own. It's different in behavior. It doesn't move with the wind. It doesn't thin where the ground changes. It stands still around him with a quality that isn't meteorological — it's intentional, even though he knows the thought is irrational, and he thinks it anyway.

After half an hour he starts having trouble orienting himself.

It isn't something that happens to him often. His mind is built for reference points — the sun, shadow, the direction of water in the canals, the position of trees against the cardinal points. Tools he uses without thinking, the way you use sight or hearing. Here they don't work.

The sun can't be seen. There's nothing above him but white. The canal has been silent for a while — either it's gone further away, or the fog absorbs sound enough to make it useless. The poplars are gone. He's walking on packed earth that's become unpacked earth, then grass, then something wetter that gives slightly underfoot without giving all the way.

He stops. Looks back the way he came. It's identical to where he's going.

It isn't panic — not yet, not that kind. It's the precise unease of someone who has always read the world through his instruments, finding himself in a place where the instruments give no reading. Like opening a book and finding blank pages.

He has no way to proceed except to choose a direction and hold it — one foot after another, counting steps to give himself at least the illusion of a measure, correcting when the ground underfoot changes, harder or softer, uphill or down, as if it were the only compass left. It isn't a method. It's the only thing he has left.

He walks for a length of time he can't measure — with no sun, no shadows, no sounds coming closer or moving away, it's impossible to tell how much has passed. His feet find firmer ground. Then short grass. Then the low profile of a dry-stone wall emerging from the fog less than three steps away, without warning.` } },
      { img: 'assets/storia/scena12/panel-02.jpg', text: { it: `Si ferma. Aspetta.

Oltre il muro c'è una cascina.

È in piedi — non crollata, non bruciata, non devastata nel modo delle cose che hanno subito qualcosa di violento. È semplicemente vuota, nel senso sbagliato. La porta è socchiusa. Le imposte di una finestra sono aperte su un interno buio. Nel cortile c'è un secchio rovesciato vicino al pozzo, e accanto al secchio c'è qualcosa che è stato un fuoco — cenere ancora grigia, non nera, non abbastanza vecchia.`, en: `He stops. Waits.

Beyond the wall is a farmhouse.

It's standing — not collapsed, not burned, not devastated the way things are when something violent has happened to them. It's simply empty, in the wrong sense. The door is ajar. The shutters of a window are open onto a dark interior. In the yard there's an overturned bucket near the well, and beside the bucket something that was once a fire — ash still grey, not black, not old enough.` } },
      { img: 'assets/storia/scena12/panel-03.jpg', text: { it: `Prima di entrare, qualcosa vicino allo stipite gli cattura l'occhio: un segno inciso nel legno, poco sopra l'altezza della mano — linee semplici, un cerchio attraversato, il tipo di marchio che si intaglia per proteggere una casa, non per decorarla. Ne ha visti altri uguali, in altri portali, in altri anni. Non ha mai chiesto a nessuno cosa significassero davvero — erano lì da prima che nascesse, come i segni di croce sugli architravi. Qualcuno, in questa casa, aveva avuto paura abbastanza da inciderlo. Non è servito.`, en: `Before entering, something near the doorframe catches his eye: a mark carved into the wood, just above hand height — simple lines, a circle crossed through, the kind of mark carved to protect a house, not to decorate it. He's seen others like it, on other doorways, in other years. He's never asked anyone what they really mean — they were there before he was born, like the signs of the cross on lintels. Someone, in this house, had been afraid enough to carve it. It didn't help.` } },
      { img: 'assets/storia/scena12/panel-04.jpg', text: { it: `Rimane fermo fuori per un momento. Poi entra.

La cucina ha i segni di una partenza che non è stata pianificata. Il tavolo con le scodelle ancora sopra — tre scodelle, due piccole e una grande, con qualcosa seccato sul fondo che era stato minestra. Una sedia rovesciata. Vicino al fuoco spento, una calza di lana da bambino.`, en: `He stays still outside a moment. Then goes in.

The kitchen shows the signs of a departure that wasn't planned. The table with the bowls still on it — three bowls, two small and one large, something dried at the bottom that had been soup. An overturned chair. Near the dead fire, a child's wool sock.` } },
      { img: 'assets/storia/scena12/panel-05.jpg', text: { it: `Va nell'altra stanza.

Ci sono due pagliericci piccoli. Le coperte sono ancora lì — una tirata su, una rimasta come era stata lasciata, con la forma di un corpo che si era alzato in fretta o non si era alzato del tutto. Sul pavimento vicino al primo pagliericcio c'è un giocattolo di legno — una figura rozza, intagliata male, il tipo che si fa con un coltello da cucina e un pezzo di ramo.

Il campanellino alla cintura fa un suono — secco, chiaro, uno solo. Non l'ha toccato, non l'ha scosso: è rimasto fermo per tutto il cammino, silenzioso anche quando lui si fermava, quando dubitava, quando cercava un segno che non arrivava. Suona adesso, da solo, esattamente come la notte prima al fuoco.

Rinaldo non tocca niente.

Resta in piedi nel mezzo della stanza e guarda i pagliericci per un lungo momento. Conosce quella forma. Conosce cosa significa trovare un letto con ancora dentro la sagoma di qualcuno che non c'è più.

Sulla trave bassa vicino al secondo pagliericcio c'è qualcosa graffiato col carbone — non lettere, un disegno. Una mano di bambino, poco ferma: una forma senza volto, alta, avvolta in qualcosa che potrebbe essere un mantello o potrebbe essere niente, i bordi tracciati e ritracciati come se la mano si fosse fermata più volte a pensare come renderla. Accanto, più piccola, un'altra figura con le braccia alzate — a coprirsi il viso, o a proteggersi.`, en: `He goes into the other room.

There are two small pallets. The blankets are still there — one pulled up, one left as it was, with the shape of a body that had gotten up quickly or not gotten up at all. On the floor near the first pallet there's a wooden toy — a crude figure, badly carved, the kind made with a kitchen knife and a piece of branch.

The campanellino at his belt makes a sound — sharp, clear, just once. He hasn't touched it, hasn't shaken it: it stayed still the whole walk, silent even when he stopped, when he doubted, when he looked for a sign that didn't come. It rings now, on its own, exactly like the night before at the fire.

Rinaldo touches nothing.

He stands in the middle of the room and looks at the pallets for a long moment. He knows that shape. He knows what it means to find a bed still holding the outline of someone who's no longer there.

On the low beam near the second pallet something is scratched in charcoal — not letters, a drawing. A child's hand, unsteady: a faceless shape, tall, wrapped in something that could be a cloak or could be nothing, the edges traced and retraced as if the hand had stopped more than once to think about how to render it. Beside it, smaller, another figure with its arms raised — covering its face, or protecting itself.` } },
      { img: 'assets/storia/scena12/panel-06.jpg', text: { it: `Rinaldo la guarda a lungo. Non ha bisogno di chiedere a nessuno cosa avesse disegnato quella bambina, o quel bambino. Lo sa già. Lo sa da quando ha lasciato il suo villaggio.

Esce.

Nel cortile si ferma vicino al fuoco spento e fa i conti.

La cenere è grigia e asciutta, ma non ha avuto il tempo di disperdersi — è ancora compatta, non ancora polvere. Qualche giorno, forse una settimana. Non di più. I bambini sono spariti di recente — non è una storia vecchia, non è qualcosa successo mesi fa. Sta succedendo adesso, in questo momento, in questo territorio.

Il suo villaggio non è l'unico.

Lo sapeva già — i racconti lungo la strada maestra, le storie di altri posti. Ma saperlo come voce e vederlo come cenere grigia in un cortile vuoto sono due cose diverse.

Vicino al pozzo, mezza affondata nel fango secco dove qualcuno l'aveva lasciata cadere senza fermarsi a raccoglierla, c'è una bambola di pezza — cucita in casa, i tratti del viso ricamati a punti larghi, un braccio slegato dalla spalla e ormai staccato del tutto. Non è vecchia quanto sembra: è solo stata lasciata alla pioggia per qualche giorno.

Rinaldo non la raccoglie. Non c'è niente da fare per una bambola.

Resta un momento a guardarla comunque — non saprebbe dire perché. Forse perché è più facile fermarsi su un oggetto piccolo e innocuo che sul pensiero che gli è passato per la testa entrando in questo cortile: che da qualche parte, in questo stesso territorio, ci sono altri Ludovico, altre Isabella. Non hanno smesso di sparire quando ha smesso di succedere a lui.`, en: `Rinaldo looks at it a long while. He doesn't need to ask anyone what that little girl, or boy, had drawn. He already knows. He's known since he left his village.

He goes out.

In the yard he stops by the dead fire and does the math.

The ash is grey and dry, but it hasn't had time to scatter — it's still compact, not yet dust. A few days, maybe a week. No more. The children disappeared recently — this isn't an old story, something that happened months ago. It's happening now, in this moment, in this territory.

His village isn't the only one.

He already knew that — the tales along the main road, stories of other places. But knowing it as a rumor and seeing it as grey ash in an empty yard are two different things.

Near the well, half sunk in dry mud where someone had let it fall without stopping to pick it up, there's a rag doll — homemade, its face stitched in wide loops, one arm loose at the shoulder and now come away entirely. It isn't as old as it looks: it's just been left out in the rain a few days.

Rinaldo doesn't pick it up. There's nothing to be done for a doll.

He stays a moment looking at it anyway — he couldn't say why. Maybe because it's easier to dwell on a small, harmless object than on the thought that crossed his mind entering this yard: that somewhere, in this same territory, there are other Ludovicos, other Isabellas. They didn't stop disappearing when it stopped happening to him.` } },
      { img: 'assets/storia/scena12/panel-07.jpg', text: { it: `Si rimette il sacco in spalla.

Prima di uscire dal cortile si gira verso la cascina un'ultima volta. Guarda la finestra aperta, le imposte che si muovono appena in qualcosa che non è vento. Guarda la calza di lana che si vede ancora attraverso la porta socchiusa.

Non sa il nome di quei bambini. Non sa il nome dei genitori. Non sa quanti fossero, che età avessero, da quanto tempo fossero spariti. Non sa niente di loro tranne la forma dei loro letti, un giocattolo intagliato male e il disegno di qualcosa che non ha nome ma che tutti, in questo territorio, riconoscerebbero. Non è abbastanza per fare niente, tranne continuare.

Esce dal cortile e riprende a camminare nella nebbia.

Adesso ha una direzione.`, en: `He shoulders the sack again.

Before leaving the yard he turns toward the farmhouse one last time. Looks at the open window, the shutters stirring slightly in something that isn't wind. Looks at the wool sock still visible through the half-open door.

He doesn't know the names of those children. Doesn't know the parents' names. Doesn't know how many there were, what ages, how long they've been gone. He knows nothing about them except the shape of their beds, a badly carved toy, and the drawing of something with no name that everyone, in this territory, would recognize. It isn't enough to do anything, except keep going.

He leaves the yard and starts walking again into the fog.

Now he has a direction.` } }
    ]
  }
];

  return secs * 1000;
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderText(raw) {
  return escapeHtml(raw)
    .replace(/\*\[(\w{1,2})\](.+?)\*/g, '<em class="spk-$1">$2</em>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/\n\n/g, '<br><br>');
}

function applyLangChrome() {
  document.querySelector('#topbar a').innerHTML = UI[lang].back;
  langBtn.textContent = lang === 'it' ? 'EN' : 'IT';
  chaptersBtn.innerHTML = UI[lang].chapters;
  document.documentElement.lang = lang;
}

function saveProgress() {
  localStorage.setItem(PROGRESS_KEY, String(cur));
}

function loadProgress() {
  const v = localStorage.getItem(PROGRESS_KEY);
  const n = v === null ? NaN : parseInt(v, 10);
  return (isNaN(n) || n < 0 || n >= flat.length) ? null : n;
}

function buildChaptersMenu() {
  chaptersPanel.innerHTML = '';
  SCENES.forEach((scene, si) => {
    const item = document.createElement('div');
    item.className = 'chapter-item';
    const firstFlatIdx = flat.findIndex(f => f.sceneIdx === si);
    item.innerHTML = '<span>' + scene.title[lang] + '</span><span class="chip">' + scene.panels.length + ' ' + (lang === 'it' ? 'pannelli' : 'panels') + '</span>';
    item.addEventListener('click', () => {
      closeChaptersMenu();
      show(firstFlatIdx);
      setPlaying(true);
    });
    chaptersPanel.appendChild(item);
  });
}

function openChaptersMenu() { buildChaptersMenu(); chaptersOverlay.classList.add('open'); }
function closeChaptersMenu() { chaptersOverlay.classList.remove('open'); }

function show(index) {
  if (index < 0) index = 0;
  if (index >= flat.length) index = flat.length - 1;
  cur = index;
  const item = flat[cur];

  imgEl.classList.remove('visible');
  textInner.classList.remove('visible');

  const img = new Image();
  img.onload = () => { imgEl.src = item.img; imgEl.classList.add('visible'); };
  img.src = item.img;

  textEl.innerHTML = renderText(item.text[lang]);
  sceneTitleEl.textContent = item.sceneTitle[lang];
  progressEl.textContent = UI[lang].panel + ' ' + (item.panelIdx + 1) + UI[lang].of + SCENES[item.sceneIdx].panels.length;

  requestAnimationFrame(() => textInner.classList.add('visible'));

  if (cur + 1 < flat.length) { const pre = new Image(); pre.src = flat[cur + 1].img; }

  saveProgress();
  if (playing) scheduleNext();
}

function scheduleNext() {
  clearTimeout(timer);
  const duration = readingDurationMs(flat[cur].text[lang]);
  timer = setTimeout(() => { if (playing) show(cur + 1); }, duration);
}

function setPlaying(val) {
  playing = val;
  playBtn.innerHTML = playing ? '&#10074;&#10074;' : '&#9654;';
  if (playing) scheduleNext();
  else clearTimeout(timer);
}

function setLang(l) {
  lang = l;
  localStorage.setItem('wtfd_storia_lang', l);
  applyLangChrome();
  // ridisegna il pannello corrente nella nuova lingua senza avanzare
  const item = flat[cur];
  textEl.innerHTML = renderText(item.text[lang]);
  sceneTitleEl.textContent = item.sceneTitle[lang];
  progressEl.textContent = UI[lang].panel + ' ' + (item.panelIdx + 1) + UI[lang].of + SCENES[item.sceneIdx].panels.length;
  if (playing) scheduleNext();
}

document.getElementById('prev-btn').addEventListener('click', () => show(cur - 1));
document.getElementById('next-btn').addEventListener('click', () => show(cur + 1));
playBtn.addEventListener('click', () => setPlaying(!playing));
langBtn.addEventListener('click', () => setLang(lang === 'it' ? 'en' : 'it'));
chaptersBtn.addEventListener('click', () => { if (chaptersOverlay.classList.contains('open')) closeChaptersMenu(); else openChaptersMenu(); });

applyLangChrome();

const resumeIdx = loadProgress();
if (resumeIdx !== null && resumeIdx > 0) {
  const item = flat[resumeIdx];
  resumeText.textContent = UI[lang].resume + item.sceneTitle[lang];
  resumeBanner.classList.add('open');
  resumeRestart.addEventListener('click', () => {
    resumeBanner.classList.remove('open');
    show(0);
  });
  show(resumeIdx);
} else {
  show(0);
}
</script>
</body>
</html>
